<script>
const E=[{"title": "Becoming Presence", "year": "2026", "cat": "Writer", "type": "Interview", "what": "10:AM Dialogue with Freja, a Copenhagen-born in New York, on kindness, water rituals, and still becoming.", "why": "A Copenhagen on kindness and still becoming — a New Yorker caught mid-transformation.", "who": "Author", "imgs": ["SA_WEBSITE/122-2026_Writer_Becoming-Presence_10AM_NewYork/1_2026_Writer_Becoming-Presence_10AM_NewYork_04.jpg", "SA_WEBSITE/122-2026_Writer_Becoming-Presence_10AM_NewYork/2026_Writer_Becoming-Presence_10AM_NewYork_01.jpg", "SA_WEBSITE/122-2026_Writer_Becoming-Presence_10AM_NewYork/2026_Writer_Becoming-Presence_10AM_NewYork_02.jpg", "SA_WEBSITE/122-2026_Writer_Becoming-Presence_10AM_NewYork/2026_Writer_Becoming-Presence_10AM_NewYork_03.jpg"], "vids": [], "bodyp": ["Freja, a creative with roots in Copenhagen and life in New York, moves through the city with a presence that is both soft and magnetic. In our 10:AM Dialogue, she shares how kindness feels like true connection, why water rituals ground her in moments of stillness, and how 10:AM embraces every side of her identity; confident, vulnerable, and always becoming.", "Q: What kind of energy do you feel drawn to, the kind that makes you feel seen without needing to explain yourself?", "A: Living in New York, energy is often something borrowed; a temporary transaction, not always equal. Your energy can quickly disappear into someone who has no intention of returning it. Many people put up walls to protect their energy.", "But whenever I meet someone with their guard down, someone who meets my eyes, makes me smile, maybe even laugh, I feel something shift. It could be someone I know, or a stranger at Trader Joe’s or on the subway. Whenever I meet someone who is kind without precaution, that’s when I feel most seen. That’s why I love wearing pieces from 10:AM; They’re conversation starters and create a soft, yet clear presence in a chaotic world.", "Q: Where do you go when you want to return to yourself, not your role, not your look; just you?", "A: Whenever I feel the need to return to my core, I have one trick that always works: be quiet with water. When I lived in Copenhagen, I would bike to the nearest body of clean water and jump in - all year round. In NYC, I walk to the Seaport or the West Side Highway, close my eyes, and listen to the waves. There’s nothing more soothing. When I leave, I breathe deeper, and my mind feels clearer. Like I’ve returned to myself.", "Q: What part of your presence feels most like 10:AM; soft, clear, and impossible to ignore?", "A: 10:AM embraces the many different parts of my presence. When I feel confident, when I want to take up space, when I feel vulnerable, strong, soft, loud, or quiet. 10:AM makes me feel comfortable in my skin, comfortable standing out and creating connections with the city and its people. It reflects who I am, even as I’m still becoming."]}, {"title": "2025_Creative-Director_Postline_NewYork", "year": "2025", "cat": "Creative Director", "type": "Collection", "what": "Full brand identity for Postline — a production house bringing film, fashion and music under one visual language. Cinematic in spirit, minimal in form, built on timeless typography.", "why": "They needed a definition before anything else — what the company actually stood for. So I gave them the tone, the positioning, and a visual language cinematic enough to hold all three worlds at once.", "who": "Creative Director", "imgs": ["SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/1_2025_Creative-Director_Postline_NewYork_34.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2_2025_Creative-Director_Postline_NewYork_46.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/3_2025_Creative-Director_Postline_NewYork_15.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/4_2025_Creative-Director_Postline_NewYork_10.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/5_2025_Creative-Director_Postline_NewYork_01.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/6_2025_Creative-Director_Postline_NewYork_54.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/7_2025_Creative-Director_Postline_NewYork_51.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/8_2025_Creative-Director_Postline_NewYork_58.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/9_2025_Creative-Director_Postline_NewYork_57.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/11_2025_Creative-Director_Postline_NewYork_63.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/12_2025_Creative-Director_Postline_NewYork_64.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/13_2025_Creative-Director_Postline_NewYork_65.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_19.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_31.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_36.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_39.png", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_59.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_61.jpg", "SA_WEBSITE/124-2025_Creative-Director_Postline_NewYork/2025_Creative-Director_Postline_NewYork_62.jpg"], "vids": [], "bodyp": ["Idea A production house imagined as a collective identity: a space where film, fashion, and music could meet under one visual language. Cinematic in spirit, minimal in form, Postline was designed as a platform for collaboration and experimentation.", "Execution Built on timeless typography and cultural references, the identity was stripped back yet strong. The design carried the gravitas of cinema while staying flexible enough to hold fashion campaigns, music videos, and cross-disciplinary projects.", "Impact Even in its earliest stage, Postline’s presence was recognizable for its cinematic atmosphere and bold identity. It positioned itself alongside global cultural references (MTV, A24, Paramount), showing how a brand can communicate scale and ambition before scale arrives.", "Meaning Postline represents how identity can be both open and focused: open to collaborations across mediums, focused in its design clarity. It remains a blueprint for collective creativity with a strong and consistent voice."]}, {"title": "C24 What If", "year": "2025", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 24th collection, built around the question “What if.”", "why": "New York runs on what ifs — what if it works, what if it doesn’t, what if I become someone I’m not yet. This tee is part of our first New York drop, carrying that quiet tension.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/123-2025_Creative-Director_C24_What-If_10AM_NewYork/1_2025_Creative-Director_C24_What-If_10AM_NewYork_04.jpg", "SA_WEBSITE/123-2025_Creative-Director_C24_What-If_10AM_NewYork/2025_Creative-Director_C24_What-If_10AM_NewYork_01.jpg", "SA_WEBSITE/123-2025_Creative-Director_C24_What-If_10AM_NewYork/2025_Creative-Director_C24_What-If_10AM_NewYork_02.jpg", "SA_WEBSITE/123-2025_Creative-Director_C24_What-If_10AM_NewYork/2025_Creative-Director_C24_What-If_10AM_NewYork_03.jpg"], "vids": [], "bodyp": ["The first New York release. Handwritten graphics on heavyweight pieces, shaped around the gap between where you are and where you hope to be.\nNew York runs on what ifs — what if it works, what if it doesn’t, what if I become someone I’m not yet. This tee is part of our first New York drop, carrying that quiet tension with a minimal handwritten “New York” on the chest. A reminder of the strange distance between who you are and who you hope to be — the space every newcomer learns to live in..\nNY WHAT IF TEE\nNew York is built on a what if.\n What if I become something more?\nWhat if it finally happens here?\nWhat if I take the risk?\nWhat if I start again?\nEverybody comes here with a possibility — and everybody learns the weight of it.\nNot just immigrants.\nNot just dreamers.\nEveryone.\nThis city holds your hope and your fear at the exact same time.\nIt lifts you and drowns you.\nIt brings you close enough to touch what you want, but never close enough to rest.\nNew York isn’t the city of dreams.\nIt’s the city of what ifs —\na place where possibility and pressure live together,\nand where everyone is quietly negotiating the distance between who they are\nand who they hope to be.", "For the people who moved here on a maybe. What if it works, what if I try anyway."]}, {"title": "Honest Belonging", "year": "2025", "cat": "Writer", "type": "Interview", "what": "10:AM Dialogue with Nazlı of the Lower East Side, on small joys as rebellion and raw, imperfect art.", "why": "Small joys as quiet rebellion, and art left raw — belonging without sanding yourself down.", "who": "Author", "imgs": ["SA_WEBSITE/121-2025_Writer_Honest-Belonging_10AM_NewYork/1_2025_Writer_Honest-Belonging_10AM_NewYork_01.jpg", "SA_WEBSITE/121-2025_Writer_Honest-Belonging_10AM_NewYork/2_2025_Writer_Honest-Belonging_10AM_NewYork_02.jpg", "SA_WEBSITE/121-2025_Writer_Honest-Belonging_10AM_NewYork/3_2025_Writer_Honest-Belonging_10AM_NewYork_03.jpg", "SA_WEBSITE/121-2025_Writer_Honest-Belonging_10AM_NewYork/4_2025_Writer_Honest-Belonging_10AM_NewYork_04.jpg", "SA_WEBSITE/121-2025_Writer_Honest-Belonging_10AM_NewYork/5_2025_Writer_Honest-Belonging_10AM_NewYork_05.jpg", "SA_WEBSITE/121-2025_Writer_Honest-Belonging_10AM_NewYork/6_2025_Writer_Honest-Belonging_10AM_NewYork_06.jpg"], "vids": [], "bodyp": ["Nazlı lives in the Lower East Side, a neighborhood defined by contrast, creativity, and constant change. In our 10:AM Dialogue, she shares how small acts of joy become quiet rebellions, why she’s drawn to raw and imperfect expressions of art, and how New York’s energy inspires her to keep becoming. For Nazlı, 10:AM resonates because it reflects honesty and presence in a city that never stops moving.", "Q: What kind of spaces -digital or real- make you feel most seen or understood these days?", "A: With everything going on in the world, the weight, the noise, the rising sense that even basic freedoms can’t be taken for granted, I find myself craving safety in small, joyful moments. I feel most seen when I’m with friends, laughing about something silly, sweating through a dance class, or out on a run. Those moments to me become a kind of rebellion in themselves, like we’re creating our own little bubble of freedom, presence, and joy. That’s when I feel most like myself. It’s the same energy I feel when I come across something that doesn’t try too hard but still says something, like 10:AM’s way of making space for being real.", "Q: What kind of expression makes you feel like you’re in it, like it sees you and you see yourself in it?", "A: I connect the most with expressions that hold contrast like chaos and beauty. That’s why I love stumbling on graffiti in the city that says something raw and real, like “you are exactly where you’re supposed to be” scrawled on a brick wall, or hearing a song that captures what I can’t put into words, like when I listen to The Blaze or Max Richter’s recomposition of Vivaldi’s Four Seasons and feel like someone’s reading my journal. It’s those unfiltered, imperfect forms of art that make me pause and think, yes, this sees me.", "Q: We’re curious about what really speaks to people like us, who are figuring things out in New York, staying grounded, and finding what matters along the way.", "A: New York is a city of constant becoming. Everyone’s chasing something like an idea, a feeling, a future. You’re surrounded by people who’ve come from all over the world, bringing their stories, their style, their vision. There are strangers who inspire you without even realizing it. It’s overwhelming at times, but also full of possibility. What speaks to me here is the permission to experiment, to keep evolving, and to find your own version of “making it” on your terms. That’s why I connect with brands like 10:AM. There’s no pretense, just honest expression and space to be in process, not polished. It feels like it’s for people still shaping their own rhythm."]}, {"title": "Living Present", "year": "2025", "cat": "Writer", "type": "Interview", "what": "10:AM Dialogue with Luis, 25 years in Brooklyn, on rejecting nostalgia and dressing for the present.", "why": "Twenty-five years in Brooklyn, refusing nostalgia — dressing for the present, not the memory.", "who": "Author", "imgs": ["SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/1_2025_Writer_Living-Present_10AM_NewYork_01.png", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/2_2025_Writer_Living-Present_10AM_NewYork_05.jpg", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/3_2025_Writer_Living-Present_10AM_NewYork_03.png", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/4_2025_Writer_Living-Present_10AM_NewYork_07.jpg", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/5_2025_Writer_Living-Present_10AM_NewYork_04.jpg", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/6_2025_Writer_Living-Present_10AM_NewYork_08.jpg", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/2025_Writer_Living-Present_10AM_NewYork_02.png", "SA_WEBSITE/120-2025_Writer_Living-Present_10AM_NewYork/2025_Writer_Living-Present_10AM_NewYork_06.jpg"], "vids": [], "bodyp": ["Luis has called Brooklyn home for more than 25 years, and his style reflects the city’s present energy; effortless, authentic, and unafraid to break the mold. In our 10:AM Dialogue, he shares why he rejects nostalgia in favor of living in the moment, how his wardrobe evolves with his mood, and why he respects brands like 10:AM that balance creativity with sustainability in an industry full of challenges.", "Q: Having lived in New York for 25 years, if 10:AM Factory embodied a specific era in the city's history, which one would it be and why?", "A: Today. I like that 10:AM fits in while referencing different times, but it still feels present. Not a fan of forced retro or faux nostalgia; it doesn’t try to recreate the past but exists in the now.", "Q:Throughout your time in New York, has your style been more about making a statement or embracing timeless quality? Has that evolved over the years, and do you think 10:AM strikes a balance between the two?", "A: I don’t chase a statement or timelessness.", "My style has evolved because I’ve always worn what I liked at the time; sometimes comfort, sometimes more structured, sometimes purely experimental. I dress based on how I feel or what I’m into, not to project something specific.", "That’s what I like about 10:AM -it doesn’t follow trends or force itself into a specific mold. It feels flexible, easy to wear, and lets you define how it fits into your life. It’s light, simple, and playful, which matches how I currently feel. I don’t expect it to be timeless- I’d rather it become part of my memories from the times I lived in those clothes.", "Q: How has your perspective on sustainability evolved over time? Do you feel brands like 10:AM are driving that conversation in a way that resonates with you?", "A: For sure! I started noticing, especially with sneakers and coats, how much waste I created by throwing things out; or how certain materials just didn’t age well.", "I respect brands that don’t ignore their impact but address it head-on, finding creative ways to minimize harm. It’s even more impressive when smaller brands do it because they’re already facing enough challenges competing in the industry. Choosing ethics and responsibility on top of that? That’s something I respect.", "To be ethical…in this economy?!", "Yeah, I f*** with that!"]}, {"title": "Statement Dressing", "year": "2025", "cat": "Writer", "type": "Interview", "what": "10:AM Dialogue with Maria on Soho basics, bold pieces, and New York street style.", "why": "Soho basics and one bold piece — how the New York street actually speaks.", "who": "Author", "imgs": ["SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/1_2025_Writer_Statement-Dressing_10AM_NewYork_01.png", "SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/2_2025_Writer_Statement-Dressing_10AM_NewYork_02.png", "SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/3_2025_Writer_Statement-Dressing_10AM_NewYork_06.png", "SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/4_2025_Writer_Statement-Dressing_10AM_NewYork_03.png", "SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/5_2025_Writer_Statement-Dressing_10AM_NewYork_04.png", "SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/6_2025_Writer_Statement-Dressing_10AM_NewYork_05.png", "SA_WEBSITE/119-2025_Writer_Statement-Dressing_10AM_NewYork/2025_Writer_Statement-Dressing_10AM_NewYork_07.jpg"], "vids": [], "bodyp": ["Q: If 10:AM were a New York neighborhood, which one would it be and why?", "Q: When choosing what to wear, what matters more; quality or statement?", "A: So much, from getting inspired in the streets, to shopping what is “in style” to giving less fucks what I think people think about what I’m wearing (someone is always going to look better).Understanding the importance of basics, how to stand out on a crowd, how to stay on the go and still look cool, dressing for the appropriate weather and what not to wear."]}, {"title": "Sustainable Value", "year": "2025", "cat": "Writer", "type": "Interview", "what": "10:AM Dialogue with Ressan, 35 years in Manhattan, on the pandemic era, quality, and sustainability.", "why": "Thirty-five years in Manhattan — what the pandemic taught about quality and lasting.", "who": "Author", "imgs": ["SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/1_2025_Writer_Sustainable-Value_10AM_NewYork_03.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/2_2025_Writer_Sustainable-Value_10AM_NewYork_04.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/3_2025_Writer_Sustainable-Value_10AM_NewYork_02.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/4_2025_Writer_Sustainable-Value_10AM_NewYork_05.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/5_2025_Writer_Sustainable-Value_10AM_NewYork_01.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/6_2025_Writer_Sustainable-Value_10AM_NewYork_07.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/2025_Writer_Sustainable-Value_10AM_NewYork_06.jpg", "SA_WEBSITE/118-2025_Writer_Sustainable-Value_10AM_NewYork/2025_Writer_Sustainable-Value_10AM_NewYork_08.jpg"], "vids": [], "bodyp": ["Ressan is a true Manhattanite, having lived in New York for 35 years, and her perspective on style carries the depth of that experience. In our 10:AM Dialogue, she reflects on the pandemic era as a defining moment for comfort and individuality, why quality and statement go hand in hand, and how sustainability in fashion; embraced by brands like 10:AM is essential for the future of style.", "Q:  Having lived in New York for 35 years, if 10:AM Factory embodied a specific era in the city's history, which one would it be and why?", "A: It would be the COVID-19 pandemic era. During that time, New Yorkers embraced a new lifestyle — blending home office routines with comfortable outfits that worked just as well outdoors. We also learned to resist big corporations and support emerging ideas that prioritize comfort and practicality — much like what 10:AM embodies today.", "Q: Throughout your time in New York, has your style been more about making a statement or embracing timeless quality? Has that evolved over the years, and do you think 10:AM strikes a balance between the two?", "A: It hasn’t really changed over the years — quality and statement have always been equally important to me. Quality matters for my comfort and my budget, while making a statement is key to expressing my personality. For me, both are priorities — and that’s exactly why I appreciate 10:AM. It combines thoughtful design with lasting quality, striking the perfect balance between the two.", "Q: How has your perspective on sustainability evolved over time? Do you feel brands like 10:AM are driving that conversation in a way that resonates with you?", "A: I’ve become much more mindful of environmental sustainability since 2000, and I’m still learning about it today. I believe every individual and business has a responsibility to prioritize environmental, social, and economic sustainability — including brands like 10:AM. Seeing 10:AM embrace these values through thoughtful designs and conscious choices gives me hope that more brands will follow suit."]}, {"title": "The Art Of Noticing", "year": "2025", "cat": "Writer", "type": "Essay", "what": "Substack essay on noticing as a near-extinct skill, and earning the titles you claim.", "why": "Noticing, the real kind, is almost extinct — and it’s the one skill everything she makes depends on.", "who": "Author", "imgs": ["SA_WEBSITE/117-2025_Writer_The-Art-Of-Noticing_Substack_NewYork/1_2025_Writer_The-Art-Of-Noticing_Substack_NewYork_01.png", "SA_WEBSITE/117-2025_Writer_The-Art-Of-Noticing_Substack_NewYork/2025_Writer_The-Art-Of-Noticing_Substack_NewYork_02.webp", "SA_WEBSITE/117-2025_Writer_The-Art-Of-Noticing_Substack_NewYork/2025_Writer_The-Art-Of-Noticing_Substack_NewYork_03.webp", "SA_WEBSITE/117-2025_Writer_The-Art-Of-Noticing_Substack_NewYork/2025_Writer_The-Art-Of-Noticing_Substack_NewYork_04.webp"], "vids": [], "bodyp": ["Why I can’t stop thinking about that one thing you didn’t even notice.", "Noticing is underrated.", "Everyone’s screaming “be present” these days, but no one really knows what that means. We scroll, skim, nod, pretend. Noticing, the real kind, is almost extinct. And honestly, that’s been messing with my head. I see it in my work at 10:AM Factory, where I focus on creating pieces that don’t just look good but make you stop and think about the details you might have missed otherwise. Because I can’t not notice. I catch the weird glance. The pause. The silence that felt too heavy for the sentence. (Welcome to my brain. Hope you packed light.)", "Maybe I sound dramatic, but I swear we used to be better at this. At paying attention. At seeing people, not just looking at them. Now? We’re taught to react fast, to scroll past, to make snap judgments. But real insight? It comes from slowing down. From observing what no one else is paying attention to.", "And here’s something I need to say out loud: what even is real insight anymore?", "Growing up, I was taught not to speak without understanding. To wait until you’d done the work before saying anything. Experience first. Opinions after. But somewhere along the way, that changed. Now everyone’s talking. Loudly. About things they haven’t even thought through. Suddenly, everyone’s a creative director. Or a filmmaker. Or a philosopher.", "Cool, but maybe finish a decent film before calling yourself a director? Or live a little before writing a manifesto. (Manifesto! When I hear that word from a twenty-something, you should definitely notice my face. That smile? It means I’m already out of the conversation.)", "Wild Strawberries (1957) — Ingmar Bergman", "This may sound like a very limited mindset, and I’d agree with you. But also: we used to respect the work we did. And more importantly, it used to mean something. It was selected, important, and valued. Titles weren’t just labels. They came with weight. You earned them.", "Anyway, let’s get back to noticing with an example.", "Let’s say you tell me you’re a director. Hypothetically. I’d be excited, I love movies. I love talking about them. (You’ll see more of that soon.) Naturally, I’d ask questions: about your style, your favorite directors, what shaped your work, why this movie over that one. Curious energy. But then you answer with something flat, generic: “I like Nolan because... it’s smart.”", "At that point, I’m already gone. You’ll see an “oh man” smile on my face and I’ll mentally exit the chat. And if you understand the art of noticing? You’d read my silence, my body language, and know exactly what I’m thinking about you. Right?", "That’s the point: the small signals. The silent codes. The things that shape everything, even when most people never notice they matter.", "Can I just say it? The lines between the lines, they’re a secret reflection of your personality. Of your character.", "Some directors build entire worlds around this. Especially (okay, let me pick a name everyone knows) Tarantino. He doesn’t spell everything out. He builds characters layer by layer. If you’re not watching the body language, the tiny shifts in expression, you miss the whole point.", "Cliché alert (stop me if you can): but the eyes really do say so much. You should consider watching people like you’re watching a scene. Because you kind of are.", "I’ve always been obsessed with the things people skip. The in-between moments. The subtle gestures. The shift in tone. The discomfort behind a smile. Sometimes it’s not even a word, just a sigh that lands too heavy, or the way someone suddenly changes the topic. And maybe that’s why I notice them. Because I don’t know how not to.", "I used to think everyone saw these things. That everyone was tracking the same details, picking up on the same pauses. But eventually I realized, not everyone does. Some people are too busy. Some don’t care. And some just can’t see it.", "But I do. And maybe you do too.", "I’ve always had this weird habit of replaying moments in my head. Like little films. Someone says something, and hours later, I’ll remember the way they avoided eye contact. Or how they clenched their hands. It’s exhausting. But it’s also how I understand people.", "To notice is to care. To stay aware. To say: “I saw that.” It’s not about being nosy. It’s about being tuned in. It’s about not letting life blur into one big scroll. At 10:AM Factory, we create pieces that make you pause, notice, and reflect on what truly matters. Our designs are crafted with this exact intent. It’s about catching the signals that say everything, without shouting.", "Presence is everything. How you represent yourself, and (get ready, this is the hardest part) how you actually care for others. Not just through words, but through your presence. Through listening without rushing. Through paying attention, even when no one’s asking you to. Honestly, that might be its own recipe. A relationship recipe. (But we’ll get into that soon.)", "So if you’re someone who reads between the lines, who senses the shift in energy before a word is spoken, welcome. You’re not alone.", "This is for the observers. The noticers. The ones who know the power of a detail.", "Welcome to Memory is Full: where the details are the story."]}, {"title": "Timeless Quality", "year": "2025", "cat": "Writer", "type": "Interview", "what": "10:AM Dialogue with Flavia on timeless statements and not caring to be original.", "why": "Timeless over original — not needing to be first, only to last.", "who": "Author", "imgs": ["SA_WEBSITE/116-2025_Writer_Timeless-Quality_10AM_NewYork/1_2025_Writer_Timeless-Quality_10AM_NewYork_05.png", "SA_WEBSITE/116-2025_Writer_Timeless-Quality_10AM_NewYork/2_2025_Writer_Timeless-Quality_10AM_NewYork_01.png", "SA_WEBSITE/116-2025_Writer_Timeless-Quality_10AM_NewYork/3_2025_Writer_Timeless-Quality_10AM_NewYork_04.png", "SA_WEBSITE/116-2025_Writer_Timeless-Quality_10AM_NewYork/4_2025_Writer_Timeless-Quality_10AM_NewYork_02.png", "SA_WEBSITE/116-2025_Writer_Timeless-Quality_10AM_NewYork/5_2025_Writer_Timeless-Quality_10AM_NewYork_06.jpg", "SA_WEBSITE/116-2025_Writer_Timeless-Quality_10AM_NewYork/6_2025_Writer_Timeless-Quality_10AM_NewYork_03.png"], "vids": [], "bodyp": ["In a city where style thrives on contradiction, Flavia embodies the essence of 10:AM. She describes 10:AM as existing between the timeless elegance of the Upper East Side and the bold spirit of the East Village. For her, fashion is about quality that lasts and statements that feel authentic. Much like 10:AM, Flavia believes in creating a wardrobe that balances classic durability with effortless self-expression.", "Q: If 10:AM were a New York neighborhood, which one would it be and why?", "A: Something that is classic and does not care too much what others think. I think it might be the east village or the upper east side. Those might seem contradictory, but I think 10:AM lies somewhere in between.", "Q: When choosing what to wear, what matters more—quality or statement?", "A: Quality always. The older I get, the less I want to buy and the happier I am when my pieces prove to be great quality. Sure, if I buy something new, I want  it to add something to my wardrobe, but it equally needs to be timeless. So one could say I believe in timeless statements.", "Q: How does living in New York shape your personal style?", "A: I’ve stopped caring to be ‘original’. No matter how cool I think my outfit is when I leave the house, chances are you will see at least 5 people wearing something that’s more out there or novel. It’s a great problem to have, because you will never run out of inspiration here. Since living in New York I just wear what feels like me; if that happens to be what other people are wearing, so what. And if nobody else is wearing it because they think it no longer is trendy, equally so what."]}, {"title": "We Forgot How To Love", "year": "2025", "cat": "Writer", "type": "Essay", "what": "Substack essay on how we’ve forgotten how to love — and the power of the smallest gestures in a distracted world.", "why": "We remember feelings, not facts — and we’ve let the feeling go half-hearted. A case for real love in a distracted world.", "who": "Author", "imgs": ["SA_WEBSITE/115-2025_Writer_We-Forgot-How-To-Love_10AM_NewYork/1_2025_Writer_We-Forgot-How-To-Love_10AM_NewYork_01.jpg", "SA_WEBSITE/115-2025_Writer_We-Forgot-How-To-Love_10AM_NewYork/2025_Writer_We-Forgot-How-To-Love_10AM_NewYork_02.webp", "SA_WEBSITE/115-2025_Writer_We-Forgot-How-To-Love_10AM_NewYork/2025_Writer_We-Forgot-How-To-Love_10AM_NewYork_03.webp", "SA_WEBSITE/115-2025_Writer_We-Forgot-How-To-Love_10AM_NewYork/2025_Writer_We-Forgot-How-To-Love_10AM_NewYork_04.webp"], "vids": [], "bodyp": ["Memory is a strange thing—it doesn’t work the way it should. We don’t remember facts; we remember feelings. A scent left on a hoodie, a cigarette shared in silence, a hand that almost—but never—touches yours. Love is half-hearted, attention is divided, desires come with hesitation. Conversations skim the surface, and no one stops to ask how it actually feels to exist right now.", "In today’s world, we’ve all forgotten to love—and to be loved. Real love, the kind that doesn’t fit into neatly labeled boxes, the kind that doesn’t wait for the perfect moment or the ideal person. It’s messy, imperfect, and feels like everything else—caught in a haze.", "At 10:AM Factory, we don’t care about labels. We care about the feelings that define us, the small gestures that make life beautiful. In a world that pushes us to categorize and compartmentalize, we choose to focus on connection—the kind that doesn’t come with expectations or labels. It’s in the quiet moments, the unspoken bonds, the energy we bring into a room. We don’t ask for your story; we ask for a feeling. How do you make others feel when they meet you for the first time?", "This month, we want to remember what it’s like to be kind to each other again, to embrace those fleeting moments that make life feel real. Whether it’s the tension of “I desire violently and wait,” the craving for connection in “I also love attention,” or the contradictions we face in a world of filters, we’re embracing all of it. The Haze in our 22nd collection reminds us that nothing is clear, emotions often slip away before we can name them, but it’s in those moments that we find the magic.", "In big cities, where eye contact is rare and conversations feel mechanical, let’s remind ourselves of the power of the smallest gestures. A glance that speaks louder than words. A touch that almost happens. A moment of hesitation before goodbye. Let’s reconnect with the power of being nice, being present, and truly feeling again.", "If you knew your life in full detail, would you change anything? Or is the magic in the haze, in the unknown, in those fleeting moments that define us before we can even put them into words?", "This month, let’s remember to love—and to be loved—through the small gestures that remind us what it really means to exist together."]}, {"title": "Why Memory Is Full", "year": "2025", "cat": "Writer", "type": "Essay", "what": "Substack essay launching the “Memory is Full” platform, on why she can’t stop noticing.", "why": "The world got too loud to hear ourselves think. The platform is the instruction: slow down, zoom in, notice what actually matters.", "who": "Author", "imgs": ["SA_WEBSITE/114-2025_Writer_Why-Memory-Is-Full_Substack_NewYork/1_2025_Writer_Why-Memory-Is-Full_Substack_NewYork_04.webp", "SA_WEBSITE/114-2025_Writer_Why-Memory-Is-Full_Substack_NewYork/2025_Writer_Why-Memory-Is-Full_Substack_NewYork_01.jpg", "SA_WEBSITE/114-2025_Writer_Why-Memory-Is-Full_Substack_NewYork/2025_Writer_Why-Memory-Is-Full_Substack_NewYork_02.webp", "SA_WEBSITE/114-2025_Writer_Why-Memory-Is-Full_Substack_NewYork/2025_Writer_Why-Memory-Is-Full_Substack_NewYork_03.webp"], "vids": [], "bodyp": ["Memory is Full: because the world’s gotten too loud to hear ourselves think. But if you step back for a second, slow down, and zoom in, you’ll start to see what actually matters.", "My phone keeps reminding me, “Your memory is full,” like I don’t know it. If my phone thinks it’s overwhelmed, it should try my brain, let’s see who wins that fight.", "I named this platform Memory is Full because we’re all overwhelmed but most of the time, we can’t even name why. For me, it started with the buildup of quiet moments: the half-finished conversations, the gut feelings I couldn’t shake, the tension behind someone’s smile. I didn’t just feel full. I felt like I was running out of space to make sense of it all. Honestly, that’s how my mind works. It’s constantly processing: small details, passing conversations, strange glances, forgotten gestures. I hold onto things most people forget, gestures, tones, small emotional shifts, and I’ve been doing this for a while. In my personal life, it shows up in how I remember conversations no one else does. And with 10:AM Factory, it’s in every design detail, from the fabric I choose to the messages stitched into each piece. (We’ll get into that later.) I’ve always been fascinated by the small signals people miss, the unspoken things that say more than the obvious.", "This isn’t about offering solutions. I’m not here to fix the world. I just want to open up a space for observation, a moment to zoom out, or in, and look at what’s actually happening around (and inside) us.", "Crime and Punishment — Director: Aki Kaurismäki", "People say, “Oh, don’t think about it so much.” But this is me, I think about things. That’s who I am. I notice the cracks, the quiet shifts, the awkward pauses. The things most people brush off or ignore. I’m not saying it’s always a good thing (for my sanity), but here we are.", "I come from the art world, a place that celebrates uniqueness, authenticity, and the small details that reveal an artist’s true intentions. We care about context, about the quiet decisions that shape a piece, about the weight of every material and the meaning in every mark. It’s about more than just the final image; it’s about the process, the intention, the layers of thought behind it. I’m used to paying attention, to looking closer, to noticing what others miss.", "Félix González-Torres, “Untitled” (Portrait of Ross in L.A.): the candy represents Ross Laycock, the artist’s partner, who died of AIDS.", "Take Félix González-Torres’s “Untitled” (Portrait of Ross in L.A.): a piece that captures both loss and presence, a reminder of the weight of small gestures, the pieces of ourselves that linger even after we’re gone. Or think about the quiet brutality of Sansho the Bailiff, a film that shows how small, silent choices can shape entire lives. These are the kinds of signals I pay attention to, the things that aren’t always obvious, but say everything once you really notice them.", "Maybe I’m a bit of a boomer (probably not), but I’m definitely a millennial, and I remember life before social media, when conversations were slower, connections were deeper, and every small detail had weight. Maybe that’s why I care about these things, why I still think the small signals matter.", "So, why am I doing this? Because I realized that only my close circle really knows what I do, how I feel, or how I execute my ideas. I wanted to share more of that, to make my thoughts a bit louder, to let you in on the small things I notice and the connections I see.", "I’m into people. That might sound weird, but hear me out: how they reach, how their minds work, how they treat others, how real or fake they are. That’s why I chose the name Memory is Full, because the world is full of noise, distractions, and contradictions. We’re surrounded by chaos, from the seriousness of world events to the ridiculousness of follower-driven trends and surface-level conversations. It’s all noise, and I’m trying to cut through it.", "So here we are. I’ll be sharing some of the small moments, quiet contradictions, and overlooked signals that stick with me. Like the endless, internal questioning of Crime and Punishment, a mind constantly analyzing, replaying moments, searching for meaning in every glance, every word. I’ll talk about the things I notice, the patterns I see, and the signals most people miss.", "Maybe you’ll relate, maybe you won’t. Either way, I’m here to have the conversation.", "So here’s your millennial, trying to be louder, sharing stories, questions, and thoughts I’d usually save for a close friend. Let’s notice more, feel more, and make sense of what’s been piling up.", "Sansho the Bailiff (1954) — Director: Kenji Mizoguchi"]}, {"title": "C23 Time In Limbo", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 23rd collection, on time in limbo.", "why": "Names the stagnation everyone feels and wears it anyway. The fade is the point: waiting erodes you. — “I desire violently and wait’.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/1_2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_16.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_01.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_02.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_03.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_04.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_05.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_06.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_07.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_08.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_09.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_10.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_11.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_12.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_13.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_14.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_15.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_17.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_18.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_19.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_20.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_21.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_22.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_23.jpg", "SA_WEBSITE/113-2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork/2024_Creative-Director_C23_Time-In-Limbo_10AM_NewYork_24.jpg"], "vids": [], "bodyp": ["Acid-washed sweatshirts about living in a permanent waiting room. Pieces like \"I Desire Violently and Wait\" and \"Work in Progress.\"\nThe “Time in Limbo” collection by 10:AM Factory reflects the emotional tension of living in an era defined by waiting—waiting for change, progress, and fulfillment. As we step into a new year, carrying dreams and desires, the weight of global stagnation looms large, trapping us in an invisible time frame.\nThis collection captures the push-and-pull of longing and stillness through bold, thought-provoking designs. Pieces like “I Desire Violently and Wait” express the intensity of human aspirations juxtaposed against the endless pause of our shared reality. “Work in Progress” serves as a poignant reminder that we are still in the process of rebuilding, moving forward in slow, tentative steps.\nCrafted with acid-washed fabrics, each sweatshirt features a beautifully faded effect, symbolizing the wear and erosion of time—how prolonged anticipation shapes us, both physically and emotionally. Unisex and timeless, this collection serves as a visual narrative of resilience, introspection, and the delicate balance between hope and reality.\n10:AM Factory invites you to wear your story, embrace the contradictions, and step into the new year with quiet strength and bold expression.", "Names the stagnation everyone feels and wears it anyway. The fade is the point: waiting erodes you."]}, {"title": "C22 Haze", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 22nd collection, Haze: this collection was all about fade out, colors fading out is related with fading out in real life . nothing clear, emotions slipping away before you can name them.", "why": "Quiet resilience. Sometimes saying nothing is the loudest thing you can wear.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/112-2024_Creative-Director_C22_Haze_10AM_NewYork/1_2024_Creative-Director_C22_Haze_10AM_NewYork_08.jpg", "SA_WEBSITE/112-2024_Creative-Director_C22_Haze_10AM_NewYork/2_2024_Creative-Director_C22_Haze_10AM_NewYork_15.jpg", res the hazy line between control and chaos. This collection invites you to embrace a moment of stillness, a pause from the noise, and a reminder that sometimes, not saying anything is the loudest message.", "Quiet resilience. Sometimes saying nothing is the loudest thing you can wear."]}, {"title": "C21 Contradictions", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 21st collection, on everyday contradictions.", "why": "Sits inside the tension instead of resolving it. The truth lives in the contradiction, and the wearer holds both. -- Connected-isolated, convenience-waste, choice-confusion, luxury-need, progress-loss, comfort-complacency --.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/1_2024_Creative-Director_C21_Contradictions_10AM_NewYork_02.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_01.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_03.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_04.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_05.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_06.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_07.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_08.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_09.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_10.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_11.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_12.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_13.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_14.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_15.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_16.jpg", "SA_WEBSITE/111-2024_Creative-Director_C21_Contradictions_10AM_NewYork/2024_Creative-Director_C21_Contradictions_10AM_NewYork_17.jpg"], "vids": [], "bodyp": ["Designs built on the paradoxes of now: convenience and waste, choice and confusion, connection and isolation.\n10:AM's story for this month is about celebrating contradictions. Our designs remain grounded in normcore’s subtlety, but our statements challenge the complexities of modern life, inviting our audience to think critically while keeping things visually effortless. We say minimalism is dead because, for us, simplicity is no longer enough—it’s the contradictions that truly define us.", "Concept Overview: At 10:AM, we embrace contradictions. While our designs lean toward clean lines and minimalist aesthetics, our statements reject simplicity. “Minimalism is Dead” is our playful and sarcastic declaration for January. It’s not just about fashion—it’s a reflection of the world we live in.", "\"Minimalism is Dead\" reflects the contradictions of modern life. While minimalism in design is celebrated for its simplicity, the reality of our world today is anything but simple. Every aspect of life—relationships, conversations, decisions—is layered with complexity. A single question rarely has a single answer anymore. Even straightforward situations are often overanalyzed, overcomplicated, or intentionally made more intricate.\nAt 10:AM, we acknowledge this tension. Our designs may embrace minimalism in their clean lines and cuts, but our statements are bold, provocative, and reflective of the complicated times we live in. We value minimalism where it truly matters—in honest relationships and clear communication—yet we critique the overcomplication of daily life. This month, \"Minimalism is Dead\" is both a declaration and a challenge to rethink simplicity in a complex world.", "Sits inside the tension instead of resolving it. The truth usually lives in the contradiction, and the wearer holds both.\n Our latest collection dives deep into the theme of contradictions, exploring the conflicting realities we navigate in today’s society. Each piece is crafted to provoke thought and discussion, reinforcing the brand’s commitment to celebrating the complexity of modern life."]}, {"title": "C20 What Would Hamlet Do", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 20th collection, “What Would Hamlet Do” tee sold out in two weeks with no advertising and no campaign shoot.", "why": "Turns a canonical text into a present-tense joke that still carries the original despair. High reference, low ceremony. Its about our dating life in new York — what would Hamlet do if he is alive, he would just say o fuck and leave.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/110-2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork/1_2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork_03.jpg", "SA_WEBSITE/110-2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork/2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork_01.jpg", "SA_WEBSITE/110-2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork/2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork_02.jpg", "SA_WEBSITE/110-2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork/2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork_04.jpg", "SA_WEBSITE/110-2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork/2024_Creative-Director_C20_What-Would-Hamlet-Do_10AM_NewYork_05.jpg"], "vids": [], "bodyp": ["Hamlet dropped into modern relationships. Faced with today's mess, he just says \"o fuck.\" Four colorways.\nInspired by the timeless drama of Shakespeare’s Hamlet, this design cleverly mirrors modern-day relationships. Imagine if Hamlet were navigating today’s complexities—he might just utter, “o fuck.”\nAvailable in four striking colors, each t-shirt is designed to make a statement. Whether you’re exploring the city streets or relaxing with friends, let the “Hamlet: o fuck.” t-shirt be your bold companion.\nJoin us in celebrating creativity, style, and the art of conversation. Elevate your wardrobe with a piece that speaks volumes—get your “Hamlet: o fuck.” t-shirt today.", "Turns a canonical text into a present-tense joke that still carries the original despair. High reference, low ceremony."]}, {"title": "C19 Strange Mind", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 19th collection, Strange Mind.", "why": "Rewards the person who looks twice. It backs unconventional thinking over the obvious.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/109-2024_Creative-Director_C19_Strange-Mind_10AM_NewYork/1_2024_Creative-Director_C19_Strange-Mind_10AM_NewYork_04.jpg", "SA_WEBSITE/109-2024_Creative-Director_C19_Strange-Mind_10AM_NewYork/2024_Creative-Director_C19_Strange-Mind_10AM_NewYork_01.jpg", "SA_WEBSITE/109-2024_Creative-Director_C19_Strange-Mind_10AM_NewYork/2024_Creative-Director_C19_Strange-Mind_10AM_NewYork_02.jpg", "SA_WEBSITE/109-2024_Creative-Director_C19_Strange-Mind_10AM_ n order. The mind as something to decode, not read.\nLittle achievements feel bigger these days.\nIntroducing our exclusive \"Strange Mind\" T-shirt, a testament to the ingenuity of the human mind. Crafted with premium quality fabric, this tee is not just a piece of clothing, but a conversation starter. The bold yet minimalist design embodies the essence of our brand – pushing boundaries and celebrating the unconventional.\nDesigned for those who dare to think differently, this shirt invites you to embrace the beauty of the unexpected. Whether you're decoding hidden messages or simply making a style statement, the \"Strange Mind\" tee is sure to turn heads and spark curiosity wherever you go.\nAt 10AM, we believe in celebrating the little achievements that make life extraordinary. With each wear, you'll feel a sense of pride in belonging to a community that celebrates individuality and embraces the unconventional.\nJoin us on this journey of discovery and expression. Shop the \"Strange Mind\" tee now and let your wardrobe reflect your unique perspective.\nElevate your style and embrace the extraordinary with 10AM.", "Rewards the person who looks twice. It backs unconventional thinking over the obvious."]}, {"title": "C18 Evidence", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 18th collection, Evidence.", "why": "Reads your digital trail back to you. Every message, every like is evidence — the question is who’s reading it, and how you take the story back.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_01.jpg", "SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_02.jpg", "SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_03.jpg", "SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_04.jpg", "SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_05.jpg", "SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_06.jpg", "SA_WEBSITE/108-2024_Creative-Director_C18_Evidence_10AM_NewYork/2024_Creative-Director_C18_Evidence_10AM_NewYork_07.jpg"], "vids": [], "bodyp": ["We are the ‘’evidence’’\nThis is an exploration of my thoughts, feelings, and questions—an attempt to voice my inner dialogue. While I may not claim mastery in any particular field (though I am rather proficient in contemporary art), I am compelled to amplify my reflections this time around. If you're familiar with my designs, you'll notice that each one carries the weight of my inquiries; it's always been this way. Now, I've made the choice to think louder. It's my decision, subject to change because, well, I do what I want to do. It's as simple as that.\nIn this latest drop, as you've likely noticed, I've honed in on the concept of \"evidence,\" viewed through the lens of collective identity. What exactly do I mean by this?\nWhile global conversations swirl around politics, climate change, economics, and yes, war, my personal focus lies more within the realms of psychology and sociology. Have you noticed the abrupt shifts in our everyday discourse and behaviors? I certainly have, and frankly, it troubles me.\nSo, why did I choose the word \"evidence\" for this design? Let me explain.\nConsider this: every conversation we have, every gesture we make, they're all pieces of a puzzle. They reveal who we are, what we care about, and how we see the world. Our actions and interactions serve as evidence of our existence, preferences, and habits.\nIn today's world, where every message sent, every post liked, is archived and analyzed, our communications and behaviors are constantly under scrutiny. It's as if we're leaving behind a trail of evidence, painting a picture of who we are and what we stand for.\nBut here's the thing: this constant surveillance of our communications and behaviors isn't just passive observation. It shapes the content we consume, the decisions we make, and the opportunities we're presented with. Our words and actions aren't just evidence of our past—they're actively shaping our future.\nAnd that's what I wanted to explore with this design. It's about questioning the impact of our digital interactions on our lives. Why do we accept this level of surveillance? What does it mean for our privacy and autonomy? And most importantly, how can we reclaim control over our own narratives?\nAs humans, our actions, interactions, and behaviors create a trail of data that can be considered evidence of our existence, preferences, habits, and more. In today's digitally connected world,"]}, {"title": "C17 Artificially Raised", "year": "2024", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 17th collection, Artificially Raised.", "why": "Names the generation raised by screens. A conversation piece on what technology is doing to how we love, need, and pay attention.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/107-2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork/2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork_01.jpg", "SA_WEBSITE/107-2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork/2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork_02.jpg", "SA_WEBSITE/107-2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork/2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork_03.jpg", "SA_WEBSITE/107-2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork/2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork_04.jpg", "SA_WEBSITE/107-2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork/2024_Creative-Director_C17_Artificially-Raised_10AM_NewYork_05.jpg", "SA_WEBSITE/107-2024_Creative-Director_C17_Ar
