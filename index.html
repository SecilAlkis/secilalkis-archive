orks?", "Neriman Polat: Since the beginning of 2000s, I’ve been working about the subjects of city, street, district. The Excavation (hafriyat) group that I used to be a member of (but not anymore) and have worked together for years, must have played a part in directing me to these subjects. In my 2005 video, “İki Keklik (Two Partridges)”, two very modernly dressed girls eat and have a conversation in a restaurant decorated with plastic flowers and an artificial stream, while a Turkish folk song plays in the background. There’s an ironic connection between the lyrics of the folk song and the scene; it causes the viewer to smile. Here we see both the aesthetics of the migration from village to city, and a plastic version of the longing for nature.", "The contrasts, conflicts, hybridism, people who lost their land, and also demolition in the last few years. These are a part of my life as well... A few fundamental subjects for me are; the codes of patriarchy, social sex and discrimination. I had a solo show in 2007 titled “Babaevi apt.” The exhibition began with a glass mosaic wall; I made a copy of a wall that I saw in the street. It’s just like the “Mülkiyet Allah’ındır” (Property of God) text in a previous exhibition in Hafriyat Karaköy.", "Glass wall mosaics that are normally used on the exteriors of buildings has become the material of choice for this work. I like the idea of transforming sometimes exteriors into interiors, and sometimes interiors into exteriors. Changing the context with very little intervention plays with our notion of reality. My work titled “Ev” (Home) begins with bricks that form a house; continues with a house the bricks of which have no mortar applied, but it has a window made of beautiful iron bars; and ends with the bricks forming a 1 square meter space, and a photo into the boundaries of which I barely fit. Our struggle for a most fundamental right, the right to housing, people losing their grounds, social injustice. My works about TOKIs (buildings built by the Housing", "Development Administration of Turkey) can be analyzed in this context. The things done in the name of urban transformation concerns us all, it should concern us all. My work “Özdönüşüm", "Emlak” (Transformation Real Estate) comprises of a fake real estate agency. For this work, I used actual information as the starting point. I wanted to point out the problems the people living in", "TOKI buildings have, in order to make the victims of urban transformation visible. I’m not the kind of person who makes art in an atelier, therefore my activist side takes over in my works.", "S.A: What do you think about the production and the presentation of art in urban public spaces; semi-public places like museums, galleries; and private spaces (homes, art storerooms, collector properties) with regard to your own work?", "N.P: Institutionalization has increased in the last years, causing a very problematic situation. It is problematic because these institutions belong to private equity and banks. Thus they can manipulate things as they wish, even the galleries depend on them. For example when you compare the list of artists of a gallery with that of an institution; you see that they’re almost the same. I’m not an artist who can have good relations with institutions; for example the Istanbul Modern protests... I believe that the artists need to be independent. In last March, Arzu Yayıntaş and I have made a work titled “Acı Kahve” (Bitter Coffee/Café). We have written the names of the women and children killed by men during the last year on the windows of a man-only café in Tophane.", "These names were kept on the windows for a while, the frequenters of the café had to live with these names, and afterwards we made an open call to women, inviting them for a coffee. Thus we invaded the café, however briefly. If we were to realize this work on a gallery window, I don’t think it would have any meaning. One can not always work this way, of course, but we should be able to work in public spaces as well. Therefore I don’t want to limit my work only to the rescued spaces of art.", "There’s an ironic connection between the lyrics of the folk song and the scene; it causes the viewer to smile. Here we see both the aesthetics of the migration from village to city, and a plastic version of the longing for nature. 2", "S.A: What do you think about the media utilized more frequently by contemporary art, such as space-based works and installations, as ways of expression? In which direction can contemporary art proceed from this point on?", "N.P: I usually create space-based works. But I see that these kind of works are becoming rare; artists began to prefer works that can be hung on a wall, that can be sold –or they’ve been directed to do so. Concerning this matter, galleries aren’t innocent either. Sometimes it’s hard just to paint a gallery wall a different color, let alone doing installations. The question of how contemporary art can proceed is a hard one, as it has lost its opponent attitude and surrendered to the art market.", "S.A: What are your thoughts especially on the architectural production in Turkey? As an artist making critical works, what would you say about the large-scale building complexes with their own security crew that combine residencies+shopping+social life?", "N.P: I don’t have the knowledge to evaluate the architectural production in Turkey, I wouldn’t want to come to conclusions about it. But we’re surrounded by malls. The ruling government doesn’t care about a thing, Istanbul is marketed as a source of income. They keep marketing secured building complexes, in which you can even choose your neighbors. The district culture has vanished, and they intend to take over the last remaining places. What will be left behind; a terrible place. Maybe an unlivable place. Those who buy an apartment in these luxury complexes can live happily in their homes.", "S.A: As a result, the art production in the whole world is limited to visual merchandise. Is it the depth of the relationship between art and market that causes this?", "N.P: Beyond all, the twisted relationship between art and market prevents the artists from creating good work. I think this is the worst of all.", "The question of how contemporary art can proceed is a hard one, as it has lost its opponent attitude and surrendered to the art market. 3"]}, {"title": "Issue05", "year": "2013", "cat": "Editor", "type": "Issue", "what": "WARHOLA Issue 05 — contemporary art in the moment of the Gezi Park resistance.", "why": "The issue shaped by the Gezi Park resistance, which changed the agenda, made the magazine an active part of the events, and postponed this very issue from its planned June 15 date.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/1_2013_Editor_WARHOLA_Issue05_Cover.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2_2013_Editor_WARHOLA_Issue05_01.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_02.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_03.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_04.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_05.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_06.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_07.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_08.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_09.png", "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_10.png"], "vids": [], "bodyp": [], "pdf": "SA_WEBSITE/56-2013_Editor_WARHOLA_Issue05/2013_Editor_WARHOLA_Issue05_doc_01.pdf", "pdflabel": "Issue"}, {"title": "The Ideology Of The Image", "year": "2013", "cat": "Gallerist", "type": "Press release", "what": "A group show on the ideology of the image once images of ideology have gone void, curated by Efe Korkut Kurt. *Add artist names.", "why": "What’s left of an image once the ideology drains out of it.", "who": "Gallery Director — ALAN İstanbul", "imgs": ["SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/1_10AM_C2_TS_Black_PP_21_2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_22.png", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2_10AM_C2_TS_Black_PP_22013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_25.png", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/3_2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_23.png", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/4_2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_01.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/5_2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_02.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/6_2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_24.png", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/7_2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_21.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_03.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_04.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_05.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_06.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_07.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_08.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_09.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_10.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_11.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_12.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_13.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_14.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_15.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_16.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_17.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_18.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_19.jpg", "SA_WEBSITE/55-2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul/2013_Gallerist_The-Ideology-Of-The-Image_ALAN_Istanbul_20.jpg"], "vids": [], "bodyp": ["“‘Ideology’ can designate anything from a contemplative attitude that misrecognizes its dependence on social reality to an action-oriented set of beliefs, from the indispensable medium in which individuals live out their relations to a social structure to false ideas which legitimate a dominant political power. It seems to pop up precisely when we attempt to avoid it, while it fails to appear where one would clearly expect it to dwell.” — Slavoj Žižek, The Spectre of Ideology", "The previous century witnessed the nourishment and reinforcement of the dominant system by counter-cultural production. The process through which this oppositional relationship collapsed was defined as a post-ideological world. This was accompanied with somewhat ironic theses of the end-of-history. While posters of Che and flags of the Soviet Union became t-shirt designs, was artistic production being reduced to a visual entertainment financed by capital?", "In a world where art biennials are sponsored by big capital, the power and dominance of commercial art fairs is increasing and auction houses play a determining role, the criticism that art has been losing its social role since the Renaissance has been in discussion for a long time. New avant-garde movements from the 1960s to the 2010s, which reduced art to an ethical platform, were joined by the trend of adopting a disdainful approach towards aesthetics. In other words, contemporary art has become what it was intended to be the opposite of.", "On the other hand, during the same process, art has rediscovered its real power at the very place where it had lost it: in the image. This exhibition aims to emphasize the ideology of images today, as images of ideology have become void. It implies the necessity to face the ineffable power and reality of the image again, featuring a selection of works by contemporary artists renowned for their powerful and influential imagery. This is the exact moment ideology reveals itself."]}, {"title": "Poligon", "year": "2013", "cat": "Writer", "type": "Interview", "what": "Poligon — Empire Project’s studio gallery for experimentation and risk-taking, against an over-commercialised art scene, for WARHOLA.", "why": "A buffer zone between the marketplace and the artist — a room built to “shoot freely” and get back to the joy of the work before the scene turns it all into product.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/54-2013_Writer_Poligon_WARHOLA/2013_Writer_Poligon_WARHOLA_01.png"], "vids": [], "bodyp": ["Poligon is Empire Project’s new studio gallery where artists are encouraged to take risks and share their works, rejecting an over-commercialized art scene that does not support experimentation. Poligon by it’s very nature is an space for experimentation and breaking frame, a spring board to get back to the joy and fundamentals of Art.", "Secil Alkis: Poligon has been on your mind ever since the first day of your professional life.", "Kerimcan Güleryüz: I have always known that there had to be a buffer zone between the reality of the marketplace and the artist and since I was raised in a family of artists, I am well aware of artists’ expectations from and disillusions with galleries. For me, Poligon is a space for creation and production which allows the artist to shoot freely. We also use the space for exhibitions. The artist needs a space where she can express herself freely, away from the custom-order demands of the marketplace. Poligon translates into an art space where unlimited ideas and creativity can come to life.", "S.A.: What was the main motive in opening the Poligon gallery, something which has never been tried out before? Could we see it as support to young artists in the face of identity confusion?", "K.G.: The gallery owner and the artist are two friends, brought together by fate and nurturing each other to survive. This relationship should be constructive, not suffocating. Identity confusion is one of the main problems of not only young artists, but also this geography in general.", "But we can only resolve this problem of being neither Eastern nor Western, by synthesizing this plurality and becoming both Eastern and Western. Poligon allows young artists to express themselves in whatever way they want. So it is more about support for their production in general, not for their identity confusion.", "S.A.: Should we expect more different projects in the future in relation to the Book Lab project?", "K.G.: Book-Lab was one-of-a-kind activity of collective creation-production and it reminded artists of the book as an artistic medium. We will be repeating this every year. The artists will come together and with the help of a publisher and a designer, they will prepare models of their own books. We will subsequently exhibit them and print a limited number, depending on the demand. Also, we expect this activity to create a certain dynamic which will reinforce the unity of arts and the book, and mobilize production. There is so much to be done regarding the book as an art object and as a means of expression for the arts.", "S.A.: Why and to what extent is it important to you to create a platform where especially young artists can express their ideas freely, within the contemporary art market of Turkey?", "K.G.: If Turkey is to become an influential and permanent actor in the global arts world, it will be able to do so depending on the extent to which young artists have the space for free expression. This is crucial. Besides, it is important that the language of this geography informs this expression. There is a cultural memory here, cultures have blended and accumulated. Authenticity can only be achieved by taking these into account. If you are authentic, if you are saying something new and if you can relate this to your own roots, then the global arts community will regard you with respect. Freedom of expression should be limitless in the arts. The artist herself must be able to create away from any kind of obligation or limitation. This is why it is important to provide this platform.", "S.A.: What do you think are the needs of artists and the arts scene today, and what is missing?", "K.G.: The greatest need of artists, especially of emerging artists, is that their ideas and production see the day of light and get noticed. And I do not mean becoming famous or anything, but simply being recognized. Establishing residency programs for artists struggling for a space for production should be the priority of institutions supporting the arts. There are so few galleries which discover and present unknown artists. The gallery owner should encourage collectioners to take risks and invest in unknown artists. This is one of the crucial points of a gallery owner being the mediator between the artist and the buyer. It is also important to represent known and recognized artists properly, to provide them the atmosphere necessary to express themselves freely as they want and to embrace the whole range of their artistic production. In my profession as a gallery owner, my aim from the start has been not only to discover and present new artists, but also to represent well-established artists properly.", "S.A.: How do you differentiate between The Empire Project and Poligon?", "K.G.: The Empire Project is our main umbrella institution. Under this is the Empire Gallery, which is more audacious but presents more established artists. There is also an auditorium here for artist talks, screenings and conferences. Poligon is our free shooting area where experimental production and exhibitions take place. So we support artistic production with the synergy that all these projects create."]}, {"title": "Ardan Ozmenoglu", "year": "2013", "cat": "Writer", "type": "Interview", "what": "Interview with Ardan Özmenoğlu on her Post-it works and her New York show “E Pluribus Unum,” for WARHOLA.", "why": "The throwaway Post-it turned monument — the disposable insisted upon.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/53-2013_Writer_Ardan-Ozmenoglu_WARHOLA/1_2013_Writer_Ardan-Ozmenoglu_WARHOLA_01.png", "SA_WEBSITE/53-2013_Writer_Ardan-Ozmenoglu_WARHOLA/2_2013_Writer_Ardan-Ozmenoglu_WARHOLA_02.png", "SA_WEBSITE/53-2013_Writer_Ardan-Ozmenoglu_WARHOLA/3_2013_Writer_Ardan-Ozmenoglu_WARHOLA_03.png"], "vids": [], "bodyp": ["Secil Alkis: I am really curious the story of how you started using Post-it notes. You take a simple material from daily life and transform it into a very different kind of artwork with silkscreen. Could you talk about this process?", "Ardan Özmenoğlu: I first came across Post-it notes while doing my Master’s degree. Post-it is a very contemporary material, with no history and very much something of today, of the moment. We jot down things we need to forget. In some of my works, I bring this material together with the Turkish folklore and traditions, with Turkish history and sometimes with things that we need to remember but keep forgetting all the time. And everything today is bound to be forgotten. That is why you have to jot them down on Post-it notes.", "S.A: How did your “New York” exhibition come about? You opened over forty exhibitions all over the world, traveled to and worked in many different cities. You go back and forth between Berlin and Istanbul. When did these international connections begin?", "A.Ö: As soon as I completed my Master’s degree, my Russian professor Alexander Djika told me ‘Ardan, you are really talented, you should go abroad.’ He was the first to guide me. As soon as I graduated, I received acceptance for an Artist in Residence at Berkeley, California. It lasted six months. If you are talented, original and persistent about the arts, you see that other opportunities open up. Following that, I went to Berlin for my second solo exhibition, which was followed by my New York exhibition. In the following years, I went back and forth between Istanbul, Berlin and New York.", "S.A: I would like to talk about the exhibition in New York: E Pluribus Unum.", "A.Ö: That is actually a phrase that sums up the States because it is comprised of many nations coming together; “United States of America.” Especially New York is singled out among them. I came up with the name while I was living in New York. There are one cent coins all over the streets there. Just imagine that it is a country that loves money but no one picks up one cent coins on the streets. In Turkey, you cannot find 5 cents (kuruş) on the streets. No matter how small, that kind of change is picked up and pocketed. Worst comes to worst, you give it to poor people. It was really interesting, I picked up the coin and looked at it; on the coin, it read: “E Pluribus Unum.” I later found out what it meant which really touched me. Out of many, one. This is a phrase that sums up many things in life. My exhibition was, out of many, one and I, as an artist, was, out of many, one.", "As for my Laundromat installation; that is a lifestyle in the States, you have to go to the laundromat once every week or every month. In Turkey, even the poorest families have a laundry machine in their homes and it is not considered a luxury item. And the atmosphere of these laundromats is so lackluster, so cold and so boring that you want to leave them immediately. I created the opposite of this atmosphere; I believe I made the most enjoyable laundromat in the world, all colorful with Post-it notes and tens of laundry machines. It was one of the most appealing works of the exhibition.", "S.A: After a few exhibitions in Istanbul, it is very important for artists in Turkey to open an exhibition abroad. Especially New York is crucial for artists in this regard. How important was this for you? Does it make a difference where in the world it is?", "A.Ö: It is very important. Here is the deal: “The whole world follows New York. If you are there, you are being followed. If you are not, you are following.” I think that is the only answer there is.", "S.A: Is your next plan to open an exhibition in a museum?", "A.Ö: Why not? I am ready.", "S.A: What would you like to say about your neon works?", "A.Ö: As everyone knows, those are very special pieces of work. I pick particular sentences, offering a marvelous reading. And each neon work I do relates to others.", "S.A: And would you like to add anything about the conceptual stance of the exhibition? You elaborate on many aspects of this capitalist city and country but at the same time maybe you incorporate the Turkish culture into this process.", "A.Ö: Whatever city the artist lives in, she is bound to be heavily influenced by it. I mean, she becomes a part of the flow and sees it differently. You become more perceptive about the differences of your own country. Many of my works which are about here (“I’m off to the Friday prayer, I'll be back soon”) pop up in my mind when I am abroad. It always enriches you to be looking from the outside, into wherever it is you live. On the other hand, my work entitled “employees must wash hands” came to life from start to finish when I was in the States.", "S.A: You are interested in sociology. What is your evaluation of Turkey's situation in general?", "A.Ö: All our lives depend on how we form relationships with humans, with nature, with substances, food or anything else. I do not limit this to just human relationships. If your relationship with a flower, with an animal, with food or with a painting you paint is real and authentic, you start to see and to be seen. Observation is something else. I myself am a good observer. Real artists are good observers. If you look at my works closely, you can grasp how I see and interpret Turkey and the world.", "S.A: Your works welcome the spectator not just with its content and its theme, but also with a visual language. Is there a conscious decision underlying your works that you would like to share with us?", "A.Ö: Even if they seem that way, nothing is random in any of my works. Every decision I make about my works is a conscious decision, my own decision. And I am inspired by everything and everyone, be it a bird flying or a fish swimming. You can tell this from the diversity of my artwork. I believe that life itself is art and I tell of life in my works. And music… Music fascinates me.", "I think that artists form a different kind of relationship with life, that they hear the unheard and see the unseen. It is a sort of witchcraft or magic. Of course there is hidden wisdom in this. Also, talent is a secret prayer.", "S.A: Today the gap between being an “artist” and being a “painter” has widened enormously. How do you define this predicament or this process? Or where do you see yourself in this?", "A.Ö: The more art and artists are valued in societies, the happier the artist is. The status of the artist today might not be a happy one but I think it is full of hope. I hope that politics, the economy and education in our country is planned accordingly to increase this happiness. When people ask my profession and I tell that I am an “artist”, I no longer want to hear them ask the question, “Are you a singer?” And I am struggling against this. Whenever I encounter such a situation, I tirelessly explain who an artist really is. On the one hand, this drives me into a state of despair, but on the other hand, it is part of my struggle. We should first of all communicate and know what the arts and the artist mean and the rest is up to you.", "S.A: Transparent sculptures, Post-it silkscreens, neons… The choice of materials and the media of expression say a lot to the spectator about the artist. What do the media mean to you?"]}, {"title": "Lichtenstein No Comment", "year": "2013", "cat": "Writer", "type": "Essay", "what": "Essay on Roy Lichtenstein, his comic-strip sources, Ben-Day dots, and his “pregnant moment,” for WARHOLA.", "why": "Comic dots and the “pregnant moment” — high art borrowing the throwaway image.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/52-2013_Writer_Lichtenstein-No-Comment_WARHOLA/1_2013_Writer_Lichtenstein-No-Comment_WARHOLA_01.png", "SA_WEBSITE/52-2013_Writer_Lichtenstein-No-Comment_WARHOLA/2_2013_Writer_Lichtenstein-No-Comment_WARHOLA_02.png", "SA_WEBSITE/52-2013_Writer_Lichtenstein-No-Comment_WARHOLA/3_2013_Writer_Lichtenstein-No-Comment_WARHOLA_03.png"], "vids": [], "bodyp": ["He responds to various works with a \"no comment,\" which is his polite way of registering dissatisfaction", "\"Clearly there's something wrong with me.\"", "In 1960, Lichtenstein was assigned as an assistant professor inNew Jersey. In this period, he met people such as Allan Kaprow,George Segal,Robert Watts and Claes Oldenburg, expanding his field of vision. He was present in a few Happenings in which he did not participate actively. All this supported his imagination; however the real turning point came when one of his sons showed him a Mickey Mousebook and said, \"I bet you cannot draw better than this. In 1961, Roy Lichtenstein made six paintings depictingcomic stripframes; he was only changing the colors and forms in his source material. He also started using the Ben-Day dots,calligraphyand speech balloonsduring this period which would later become his trademark.", "Lichtenstein became nationally famous, or notorious, in 1964 when Life magazine published an article about him, asking '`Is he the worst artist in America?\" His work was widely interpreted then as a critical commentary on modern industrial society because of its allusions to contemporary culture and its pseudomechanical look. But Lichtenstein was reluctant to interpret his own art in those terms. \"We like to think of industrialization as being despicable,\" he told an interviewer in the sixties. \"I don't really know what to make of it. There's something terribly brittle about it. I suppose I would still prefer to sit under a tree with a picnic basket than under a gas pump, but signs and comic strips are interesting as subject matter. There are certain things that are usable, forceful and vital about commercial art.\" The Pop artists, he added, are \"using those things, but we're not really advocating stupidity, international teenagerism and terrorism.\"", "The success of these modern masterpieces lies in Lichtenstein zoning in on what he called the “pregnant moment” — the defining point in his source material, encapsulating the whole story — and altering it for maximum visual effect, refining the cartoon techniques with painting traditions, bringing new perspective and composition to the graphic image. The poignant Drowning Girl (1963) was taken from a much larger comic-book image but he zoomed in and cropped it square so that a vortex of waves engulfs the woman’s face.", "No one really invented pop art, as all the ingredients were there already: brightly coloured advertisements, consumer goods, pulp fiction. But when Roy Lichtenstein started to copy images of Donald Duck and Mickey Mouse from a kid’s book on to canvas, he not only chanced upon a style that would define much of the art of 1960s America, but he became inextricably linked with his own non-invention.", "The way Lichtenstein squeegeed paint through a hole-punched screen – tiny red dots for skin tones and blue for sea or sky – meant that he’d removed the touch of the artist a good two years before Andy Warhol’s typically insouciant statement of 1963: ‘Paintings are too hard. I’d like to be a machine, wouldn't you?’ Although Lichtenstein also dabbled in repetition early on – in household images of a hand buttering toast or trying on a wedding ring – his real breakthrough came in his enlargements of cartoon-strip frames from adventure or romance comic books, and it’s a pleasure to encounter so many of them together in this retrospective.", "What is marvellous about the irony is that Lichtenstein's carefully conceived and executed reconstruction of an explosively violent brushmark looks much more explosively violent than the real thing. Though ironical, this is not paradoxical. The explosiveness derives from the way the harsh colours are edged with black and by the sharpness of the shapes. But, as to sharpness, I personally feel that the violence derives above all from a metaphor which I always see in the shapes: teeth and other jagged tearing instruments. I asked Lichtenstein whether he meant to put them there. He answered that he didn't. 'I did notice that some of the edges of the brushstrokes looked like explosions and things, but I really wasn't thinking of any other imagery except the obvious.' Here for a change he is utterly decisive about what the paintings mean to him. And it turns out that something which for me is the most impressive feature of his most impressive paintings is something with which he is flatly unconcerned.", "In the brushstrokes series, as in the cartoon images of love and war, Lichtenstein takes subjects with a high emotional charge and deals with them as commercial art would 'by a very removed method', as he puts it. 'It's really not so much that I really use that method but that it appears as though I've used it and as though the thing had been done by a committee.'", "Lichtenstein's method of doing this is the inverse of Jasper Johns's, the artist whose ironic use of common emblems showed the way to Lichtenstein and the other creators of Pop. Johns takes cool subjects and paints them with soul, or what looks like soul. Lichtenstein takes soulful subjects and paints them with cool, or what looks like cool. In a much-cited interview in 1963 he claimed that he wanted to make an art so \"despicable\" that no one would hang it. Probably not even he dreamed at the time that collectors would someday pay millions of dollars to put it on their walls. But, then, it was never easy to know how seriously to take Lichtenstein, and it quickly became clear, after his Castelli debut, that his interests actually extended far beyond making the culture of Mickey Mouse and Bazooka bubble gum wrappers into a new heraldic art. He actually quit using comic-book sources by the late sixties. Working fun the same basic mode, he turned out paintings that mimicked Picasso, Cezanne and. Lichtenstein calculates precisely how many black triangles are required to make an engagement ring twinkle. He represents the dimples on a golf ball as a calendar of dark moons, waxing and waning in infinitesimal degrees to describe the ball's curve. The transparency of a magnifying glass is brilliantly evoked in just the right permutations of dots. These images are so striking as to exceed, by far, their nominal subject; which is not so much the objects themselves as their commercial depiction. But it comes to the same thing in Lichtenstein's work. He is always pondering the great conundrum of painting: how to represent in two dimensions on a flat canvas what can be seen and experienced in the three-dimensional world.", "But Lichtenstein didn't just reflect the world. The delight in a pedal bin that opens and shuts with the touch of a toe – the diptych is hinged in homage – becomes the rainbow he cannot help adding to his pastiche late Cézanne. The lovelorn girls sinking in tears are poignant, for all their energy, and they turn into the strange late nudes.", "Having made his fame and fortune by the early 60s, Lichenstein went on to experiment with new forms and subjects, achieving qualities most wouldn't associate with him at all. 'Sea Shore', a landscape partly painted onto Plexiglas, is oddly serene, while the sculptures are elegantly beautiful.", "But in the end the brush as such always seemed to have eluded him. What he was best at was what first inspired him in the world of comics and newspaper advertisements: the power of imagery in simplified form, block colours and half tone dots. He was as strong in three dimensions as two and the show includes a number of examples of his sculptures in ceramic and brass which hint at what he might have done if he had experimented more in materials instead of concentrating on paint.", "At a purely formal level, Lichtenstein is perfectly clear about his aims. He knows what he can add to the cartoon images that they haven't got. '’There's a sense of order which is lacking. There is a kind of order in them, there's a sort of composition, but it's a kind of a learned composition. It's a composition more to make it clear, to make it read and communicate, rather than it is a composition for the sake of unifying the elements. In other words, the normal aesthetic sensibility is usually lacking, and I think many people would think it was also lacking in my work. But this is a quality, of course, that I want to get into it.’’"]}, {"title": "Issue04", "year": "2013", "cat": "Editor", "type": "Issue", "what": "WARHOLA Issue 04 — a focus on installation as a hybrid field of expression in contemporary art.", "why": "To focus the May–June issue on installation as “a hybrid field of expression” and how it’s read and made in Turkey, with Lichtenstein and an Ardan Özmenoğlu profile.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/1-2013_Editor_WARHOLA_Issue04_Cover.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2_2013_Editor_WARHOLA_Issue04_01.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_02.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_03.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_04.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_05.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_06.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_07.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_08.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_09.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_10.png", "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_11.png"], "vids": [], "bodyp": [], "pdf": "SA_WEBSITE/51-2013_Editor_WARHOLA_Issue04/2013_Editor_WARHOLA_Issue04_doc_01.pdf", "pdflabel": "Issue"}, {"title": "Halil Vurucuoğlu — İrin / Discharge", "year": "2013", "cat": "Gallerist", "type": "Press release", "what": "Halil Vurucuoğlu’s third solo, “Discharge,” at Dirimart — a critical look at sensational media, sparked by a tragic news event.", "why": "The insincerity of people who call each other “dear” on television — an accumulation the artist had to be rid of, opened like a valve, resting on one value: honesty.", "who": "Artist Manager", "imgs": ["SA_WEBSITE/50-2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul/1_2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul_06.png", "SA_WEBSITE/50-2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul/2_2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/50-2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul/3_2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul_04.png", "SA_WEBSITE/50-2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul/2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul_02.png", "SA_WEBSITE/50-2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul/2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul_03.png", "SA_WEBSITE/50-2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul/2013_Gallerist_Halil Vurucuoglu_Discharge_Dirimart_Istanbul_05.png"], "vids": [], "bodyp": ["For his third solo exhibition, Halil Vurucuoğlu turns a critical eye on the language of the media and its distance from any democratization of human thought. The work began with a tragic event the artist watched on the news: he was disturbed both by visual media’s tendency toward sensational, worthless news and by that tendency’s paralyzing effect on the free will of the individual.", "The main theme of Discharge is the insincerity between people who address one another as “dear” within the unethical dialogues of television shows. Without resorting to personifications, Vurucuoğlu references media discourse to link the individual to the existing system.", "Where his previous two exhibitions drew mostly on happy memories, here he concentrates on what has accumulated within and disturbed him — an accumulation like a discharge he feels alien to and must be rid of. Having opened the valve of his mind, he expresses himself through hollowed emotions and concepts. Standing apart from forced themes, the plain and true work rests on a single central value: honesty.", "Where his first show introduced paper-cutting alongside spray and watercolor, and his second developed those techniques, Discharge presents a much more mature visuality combined with his established methods.", "About the artist", "Halil Vurucuoğlu was born in İzmir in 1984. He received his BA from Dokuz Eylül University, Faculty of Fine Arts, Department of Painting."]}, {"title": "Aica", "year": "2013", "cat": "Writer", "type": "Article", "what": "Report on the AICA symposium reading visual arts in Turkey across the 1980s, 1990s and 2000s, for WARHOLA.", "why": "Three decades of Turkish art mapped by the critics who watched it happen — and the fight to make criticism itself a profession, revived from the silence after the 1980 coup.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/49-2013_Writer_Aica_WARHOLA/1_2013_Writer_Aica_WARHOLA_01.png", "SA_WEBSITE/49-2013_Writer_Aica_WARHOLA/2013_Writer_Aica_WARHOLA_02.png", "SA_WEBSITE/49-2013_Writer_Aica_WARHOLA/2013_Writer_Aica_WARHOLA_03.png"], "vids": [], "bodyp": ["December 2012-January 2013, analyzing visual arts in Turkey. The 1980s period included subject headings of Transformations in Art, Artists, Studios, Galleries and Press; the 1990s included talks on Artists, Biennials, Artist Collectives and Exhibitions, Curatorship, Publication and Criticism; the 2000s addressed Artists, Independent Formations, Art with Multiple Centers, Institutions, Art Market, Publication, Culture Policies, Criticism and Criticality. We talked to AICA Chairman Osman Erden and board member Çelenk Bafra about the contemporary art market. AICA Turkey aims to bring together people working in art history of the 20th century, including our day, arts and cultural production and activities, critics, curators, art professionals/advisors, arts and culture publishers and editors, arts and culture programmers, documentary filmmakers, under the same roof. The association has decided to protect the rights of and to enable international recognition of art and culture managers in universities in the framework of cultural industries and to determine the principles of the mentioned professions within the parameters set by the association’s codes.", "Osman Erden: AICA, which can be translated as the International Association of Art Critics, was founded in the 1950s by UNESCO. The institution’s headquarters is in Paris, governed by a secratariat. AICA, as of now, is functional in over 60 countries with over 4700 members. Shortly after its foundation, AICA is founded in Turkey in 1953. In 1954, AICA General Assembly is in Istanbul, with the participation of the world-famous art critic Herbert Reed. During the General Assembly, a painting competition is organized by Yapı Kredi, which Alize Berger wins. AICA Turkey, which is not that active in later years, is closed after the September 12th coup d’etat like all associations. In 2003, with 10 founding members, AICA Turkey is brought back to life under the leadership of Beral Madra. The chair position was first held by Beral Madra, then by Ayşegül Sönmez and later by Burcu Pelvanoğlu. The current board was elected for the second time last", "Çelenk Bafra: It’s important to add that in 2003, what could be called a re-structuring period, the active members were in dialogue with the contemporary art context, intimately involved with the Istanbul Biennial—this is to say that the team was had a leaning towards contemporary art, bringing a certain freshness to AICA.", "O.E: With the last board, we have become much more active. We organized a series of meetings. Under the heading AICA Talks Series, there were 22 panels on visual arts in Turkey from 1980 to today, with 80 speakers. It was really enjoyable and important; hopefully, we’d like to decipher these talks to then produce a publication. Osman Erden, AICA former president and current vice-president Burcu Pelvanoğlu participate; other AICA members can also be invited to present their papers. Discussions on art criticism, the position of art theory and contemporary issues in this field are discussed. Whenever there is an important development or discussion in Turkey, AICA center and all international AICA branches expect opinions from us. Furthermore, whenever there is a problem or a crisis, we first create an agenda in our e-mail group and then, if necessary, we state our opinion on behalf of the association, using various outlets. If we want to take an issue to the international public, we let the Paris center know. This way, we are able to communicate directly with the international art network.", "O.E: The association is actually concerned that art writing, art criticism does not exist in society as a profession—not a hobby. Thus, a few years ago, we published a list of prices. Although we were not that successful, we thought this was important to set standards; such a list should exist.", "Ç.B: Yes, just like artists who might not know their rights due to legal loopholes and who cannot protect their rights, the same applies to art writers and curators. We try to raise an awareness towards alleviating this and we also believe that we demand things as an organized body, we’ll be much stronger. This is exactly why AICA had prepared a list of fees for various tasks and categories. What our members can do vary, we can curate an exhibition; we can produce a monograph for an artist; we can write exhibition reviews; we can teach at an institution; we can be panelists, speaker or moderators at various programmes, etc. There should be a corresponding fee for the labor involved in all such work. Although we are not directly a professional association, as members, we share certain concerns and we think of practical solutions that will help protect our rights and each other.", "S.A: How do you think was the last AICA meeting? Was the interest what you expected?", "O.E: There was interest, especially in the 2000s panel. The panels lasted from 11 to 830pm without a break. Although we went on until late hour, people were interested; that was really important. There was a platform for discussion, there were fights. This is what makes it dynamic. In general, people were not talking among themselves; there was a platform that everybody addressed themselves to, which helps create a dialogue. The subtitle of the event was “Sharings and Witnesses.”", "Ç.B:  For us, this was an attempt to have an oral history of Turkey in the last 30-40 years. Everybody that we invited to the panels was actively involved in whatever was the field and there were different dimensions of involvement and engagement. We chose general and primary subject headings and most of the time, the speakers dealt with the topics from their own perspectives. Isn’t this the premise of oral history projects, which are based on this subjectivity? Most of the time, the speakers put themselves in the center of the work and explained why they played an important role. This was something that we knew would happen. If we put all the talks next to each other, there will be multiple comments that look on to the topic of concern from multiple perspectives; actually, it is possible to talk of various discourses and claims that might not be", "S.A: Is this going to continue as a conference? Starting with Beral Madra, the activities were not recurrent every year. How will this continue under your presidency? Will there be conference series that recur annually; or will there be other activities such as short workshops?", "O.E: We have a couple of plans but I don’t want to articulate these during this interview as they are not concrete yet. But I can this: we are planning on meetings that are deeper and more specific. But we do not yet know who will run these meetings and who will be on the board of advisors. Perhaps IKSV could be involved during the biennial to continue the activities. In terms of education, we are organizing a programme of seminars in collaboration with Istanbul Modern. One of them is Western Painting History and the other is Turkish Painting History. Including this year, the 6th will be in March. There will be 10 courses that will be taught by AICA members, directed towards adults.", "Ç.B: The vivacity and heat of the conference made it really clear that the various active actors in this field, who have different ideological and artistic stands, are not brought together frequently enough. As the organization committee, we invited speakers whose opinions we definitely did not endorse or people who were risky names due to their positions in the art world; later, we were regretful, but this was a risk that had to be taken. Most of the moderators were AICA members and they invited the speakers on their panels. Of course, this could only be an entry point for discussions. We would like to deepen these conversations, give voice to a wider group of people and organize new discussions. There is a lot we would like to do, but we do not have enough members; the number of active members is particularly limited. There were not as many people who were actively writing and thinking about art in the previous generation, we see that there is a lot more younger people involved. Some of these people live abroad, some of them study abroad and come here. We would like to communicate with them; we want to see them at AICA and we want our association to grow with their positive-negative feedback and propositions.", "S.A: What do you think about the contemporary art market?", "Ç.B: Art has become a tool of entertainment and socializing. This field has a very rapid speed and a dynamic system that goes in parallel to the society of consumption. For example, as a gallery, while other galleries open an exhibition every two months, you cannot say “No, I want to give my artist and my gallery time, I’ll open an exhibition every six months.” The same pressure is on museums and artistic production, on writing and magazines. I think this speed produces a huge pressure and shallowness. It also creates an addiction. Maybe exhibitions that last longer than two months become boring; we want new things all the time; we have become addicted to this speed and consumption. I think this situation is going to be over at some point; it should be; we all agree on that. This is not speific to artists or to this market. Art institutions, art writers and art managers, and even academics also suffer from this. Everybody wants to benefit from this field, while there is interest. We’re going to see what happens to all these galleries, artists, art institutions, curators and even critics in a few years.", "S.A: Then, what do you think about works or writings that are critical of this situation?", "Ç.B:  The writing should be accurate and comprehensive. We work on an exhibition or a project for two to three years; nobody writes anything other than press releases, nobody criticizes. NoWe need to think about this. Nobody wants to spend the time, nobody has the time, everybody manages with press releases. For example, a press release is published in various places before an exhibition and the next day, the editor is flooded with twenty more press releases on exhibition or project press releases. And then something else happens and the agenda changes completely. Let alone write a critical piece, nobody seems to even have the time to see an exhibition after it’s opened. I can’t understand this timelessness and running around. For me, art is matter of life and death, or rather, it is a matter of art and death! Thus, we should all save ourselves from the circles of socializing and career to quietly see exhibitions, to read, to slowly and calmly think and write. Only then we can do some good things.", "S.A: Because of this, good and bad things are treated equally.", "Ç.B: We should be self-critical. In Turkey, for a very long time, artists produced works for auctions and sales. Gallerists were in line for their artists to be in international auctions. We heard of artists whose works were sold before they were produced. Curators, artists, writers participated in all international exhibitions, fairs, galleries, institutions and festivals without any criteria. Each offer was accepted. When the situation is as such, the system can quickly be worse off; there is no room for a scale of value and an ethical ground.", "S.A: Here, the artist plays the most major role as I always say. Who buys the work is important. It is very important for them to thinkabout where and how their work will be in a few years.", "Ç.B: You said something very important. I would like to connect to the current agenda from here. Recently, for the first time, a museum that was connected to a university, with a designed building and a good team was opened; a few good exhibitions were organized. The artists were told, gently, “This is the framework, sell your works for symbolic prices, donate etc.” As an artist, you’d like to be trusting; to that institution, to the academic structure and you give away your works. 15-16 years later, the museum closes; the team has been dispersed already and those works are in the auction house. I don’t see bad intentions behind Santralistanbul giving part of their collection to the auction house; the museum project has already sunk. Or maybe I should say this more openly, selling the single three-piece work by Sarkis in three pieces was not with bad intentions, but rather because of a horrible ignorance. What could we, as AICA, when faced with this situation? What could we do to find our balance in such shifting ethical grounds? Could we stop and think and take lessons from our near history? We need to think about this.", "S.A: I’d like to also touch on education. I care about artists not only being educated by gallerists after graduation, but also being directed. The situation gets much worse in istanbul when there are various young artists who come from different cities and who have no idea what’s going on. And these artists start producing works for the market, under the guidance of gallerists, without any awareness. Is there a project that you’re working on which addresses this issue?", "Ç.B: There is not anything concrete that we could talk about, but this is something that we’re thinking about. Some of the publications that our members have deeply cared about are closing. The number of publications in the art field are diminishing and publication is being directed towards more popular forms. Instead of theory or criticism, trends, lifestyles are combined with news of a certain class of people.", "O.E: I think this is what happened. In the 90s and until the middle of 2000s, large-scale international exhibitions was really important. I’m not only talking about Turkey, but the world. And to exist in these exhibitions as an artist from Turkey, to exhibit internationally, one needed a curator. And in Turkey, from the 90s to 2005, with the help of biennials and various international exhibitions, artists from Turkey were able to receive international recognition. Of course, these biennials continue, even more intensely. But instead of the bulky structures of the biennial, art fairs started to be proliferate and determine the agenda. This is related to the type of arts journalism that you were talking about. The same principle applied to Turkey as well. Instead of a curator, you now needed a gallery owner to have an international presence. Unfortunately, gallery owners –with some exceptions- do not have the art historical knowledge and the theoretical opinions of a curator.", "Ç.B: Or maybe the shell of the curator was emptied. There was no longer a need for the curator.", "O.E: Yes.  What you’re talking about is a situation created by the changing actors. And gallery owners have started to be motivated more by commercial concerns rather than being knowl-", "S.A: Even after his death, there were news of the works selling for more than 3 million liras.", "O.E: But nothing of substance was written on his work. The conversation is on the prices. Whenever I talk about this, the actors in the art market are frustrated with me. When you look at galleries abroad, there is a lot of galleries who work with curators. Being a gallery owner does not mean you are a good art director. Serious galleries, commercial institutions also emphasize content; they work with curators, writers. In Turkey, this is not established. I do not see a symptom of this happening in the near future. I hope so. I also have a more general concern. In the 60s, 70s, 80s, all artists shared a platform. Today, all art fields are isolated. There is a disconnections and there is not that much sharing with other art fields. I was recently talking to Rabia Çapa about this. She was talking about when she founded Maçka Sanat; artists from different disciplines came together to have meetings. This is not something that we can currently observe in the art world.", "Ç.B: This is a very important evaluation. But maybe we should talk about how we have all become isolated. We cannot say the same thing about all disciplines. I think contemporary art world has become very arrogant with international attention. There is a lot of interest in visual arts from people of different disciplines; I see people from the fields of cinema, music, theater in exhibition opening. People who come from different backgrounds attempt to learn, write and think about the visual arts. But for some reason, visual arts people are not as interested in conversations in other fields. They see their field as more prioritized, more important. This is not only wrong, but also against the nature of visual arts.", "Ç.B: Exactly. This is exactly why a paradoxical situation is created and there is a vicious cycle. As Osman said, there were many more people involved in music, cinema, theater, poetry. I think we’ve isolated ourselves. Or rather, I think the music world and theater are still quite open while visual arts is closing itself off. We can say this stems from supply-demand and speed. I also want to add something about AICA. When people apply to become a part of AICA, we make an assessment as the board and then send the application to the AICA headquarters. Art critics or art managers who are accepted to AICA receive an AICA card and a press pass. We are open to new suggestions and new members. It would be great to widen the team and to be more aware of what each other is doing and to be able to do new things together."]}, {"title": "Leyla Alaton", "year": "2013", "cat": "Writer", "type": "Interview", "what": "Leyla Alaton on collecting and making art more accessible in Turkey, for WARHOLA.", "why": "A collector’s case that art has been priced out of reach in Turkey — that owning it should be ordinary, not a privilege of the rich.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/48-2013_Writer_Leyla Alaton_WARHOLA/1_2013_Writer_Leyla Alaton_WARHOLA_01.png", "SA_WEBSITE/48-2013_Writer_Leyla Alaton_WARHOLA/2_2013_Writer_Leyla Alaton_WARHOLA_02.png"], "vids": [], "bodyp": ["Leyla Alaton — Art Should Not Be a Privilege", "Owning artworks is very commonly regarded as a privilege or something that only the rich can enjoy lately in Turkey. In Europe, people live in both material and spiritual wealth to get a new piece in their collection every month. In short, art is more accessible. Prices of galleries and other art platforms are a lot more in communities’ reach.", "Unfortunately with the latest trend in our country, the prices skyrocketed and false appreciations occurred. Neither any gallery nor any artist could be found within reasonable price ranges in my opinion. I am just back from ARCO Madrid. I purchased artworks of museum caliber with reasonable prices. I believe our art market is suffering heavily due to these unreasonable prices.", "We of course have to consider the non-existent state support, insane gallery rents, how the newly graduated artists think that they have to sell overpriced works to prove themselves and etc…", "We will get through this as well, pieces will fall into place.", "Secil Alkis: I’d like to start with asking “what is the source of your dynamism?” as a generic tabloid press style question.", "Leyla Alaton: It is not a question like that at all. It is rarely asked, but a very important question since it actually has various reasons. First, I do everything I do by loving it. And I like to know new people, I like to hear new lives. If I have anything to add to these lives, anyway I could, then that makes me even happier. I am friends with Aslı Bİçer for two years now. Total coincidence.", "I am always very sensitive in helping young people and women. I view Aslı as an entrepreneur woman. I also think that it is no easy task to own a gallery. Besides, you are publishing such a brilliant magazine here. I support anyone who does such positive, such effective works. I believe this is the source of my dynamism. I mean that feeling of being helpful. I also value appreciation a lot. Me being appreciated and especially, me appreciating what deserves to be appreciated. I mean, I appreciate all these being done. At the end of the day, If I can provide any sort of support,", "S.A: You almost all fairs in various cities of the world. Are there any you haven’t been, and you especially are curious about?", "L.A: I haven’t been to Hong Kong yet. I believe it to be a great loss. I hope I will be able to go this year, I really intend to. I went to Art India for the first time last week, as a guest of Christies. It was the fifth one. Of course, it was a magnificent event. They took us to see the great collections there. Besides the works we viewed in the fair, the ones we saw in the houses were absolutely brilliant! The art programs over there were also very interesting. Those who support art there, the wealthy, had homes falling nothing short of museums. It was very exciting to see such a thing.", "We traveled quite thoroughly. I mean, it wasn’t just any fair trip. Of course, when we go with such a group, we find many homes inviting us in. It is very much like us welcoming the foreigners coming to visit Contemporary Art Fair in our homes. They do very much the same, letting us see their collections and introducing their friends.", "S.A: How do you position Turkey as a person who follows and has seen art markets globally?", "L.A: Actually, those who are in this know it much better than anyone else. I can only comment that we achieved world standards, as an observer from outside. Turkish contemporary art progress in an unbelievably fast pace. Just this year, so many artists had their solo exhibitions in", "New York. We are proud of this! I have to support this in any way I can. If we can see Murat Pulat’s work here, get in touch with Leila Heller in this venue we are in, then that is my support to art. Gathering the ones I love, or perhaps the ones who can produce great works together and having no self-interest out of this at all. This perhaps is what makes me free, what makes me loved. I have no self-benefit in this and I never wanted anything out. I am neither a gallery owner nor an artist. I am only an art lover and I wish for what’s produced to have visibility abroad!", "My only aim is to have Turkish art and artists be known. I went to Documenta and published in Ekavart Blog. I believed others have followed. Mine is an effort carried through a path that involves no competition, no claims. I merely seek spiritual satisfaction.", "S.A: You stated that Turkey is progressing rapidly and that is a good thing. As we said before, many galleries were found and many artist were born. A new understanding of curating came up. Number of auctions increased and with the Modern Art Fair the number of fairs will increase as well. Increase in the number of galleries to be formed in Contemporary Art", "Fair and with the events being better blend in… How will the downsides of this wideness and rapid increase affect Turkey? Could we expect the quality to fall where quantity rise?", "L.A: This is common to all rapid advances in any subject! I agree with you hundred percent in these observations. Yet these are the downsides of rapid progress. When you take such large steps, someone is going to stumble and fall eventually. Some artists will stumble, some gallery owners and maybe some fairs. Yet, this should not stop us. I mean this cannot held us down from following and getting involved in contemporary art with global standards. If Malborough", "Gallery attended our fair this year, it is due to higher aims and claims we have as Turkish collectors and Turkish art-lovers. It is not for their own PR. I mean, I believe Istanbul is included in the world contemporary art today. Yet, as I said, I agree with what you have said. It might be exaggerated to a level. In every way even, to be honest. Even the speculating can be counted in this saying I bought it for this much I sold it for that much, I made that much in between… These are states all markets suffered through at some point. We are not any different. At least as far as I know!", "S.A: You also stated that you are no collector in your article. You said you only purchase works to support art and artists. In your opinion, what is the main driver of art purchase in Turkey? Or, what are your criteria in purchasing art?", "L.A: I said I am not a collector. Perhaps to protect myself and to limit what I am going to be exposed to. Yet, those who’ve been to my home tell me “if you are not a collector, then who is a collector?” I reply to them saying “I am the curator to my humble collection.” Truly, the only common denominator of the works I own is that they cater to my own taste and my soul. To give an example, Shirin Neshat’s work resembles peace and Selma Gürbüz’s ants resemble my own hardworking nature and dynamism to me. The work consisting of twenty-one female lips covered with gold, and worn on the neck by each and every one of those women, “Söz Gümüş” by Mehtap Baydu, reminds me of a different feminist philosophy. Then there is Bambu, by Mike and Doug Starn on the top of Metropolitan. I purchased a photography work by them while I was visiting Armory Art Fair with Alican Ertuğ, who passed away. That one reminds me of him. They all mean something to me. If I said that I’m no collector, I said it to protect myself as I just told you. I could perhaps call myself a mini-collector. I am a collector that does not compete with anyone else. Of course, art cannot be purchased solely in the name of supporting art. Art does not come by cheap. I buy them because I like them and I do the PR to support art.", "That does not mean it has to be the works I enjoy most. I especially avoid political content. I still believe them to be very", "I suggest them to others, are not pieces I’d like to see in my home. I still pick the ones I can bear looking at. I do not speculate. I do not dream of founding a museum either. I do not purchase to have a stock at hand, neither do I have the means to purchase like that. It is the way it is for the moment, yet things could change. One’s taste can change, I am still learning so many things and as I learn, new perspectives are formed within – as learn new things and meet new people. That is the lovely thing about it anyway. It’s dynamism! If it wasn’t dynamic, then it would be boring.", "We would just get it done with and it would be done.", "S.A: You say that you purchase works that you find emotionally catering to you in these days when art is purchased as investment. Would you like to comment on other collections or collectors in this regard? How is collecting perceived in Turkey?", "L.A: I think there are some excellent collectors here. At least, they do no limit themselves with", "Turkey only. Mudo’s collection is unquestionable. So are the collector values that go along. As a matter of fact, it will be public very soon. We are talking about a person collecting artworks for thirty years, this must be congratulated a thirty times perhaps. Don’t you think so? I really appreciate the fact that it all started when there only was the Yahşi Baraz and Galeri Nev and it still is going on. On the other hand, the mere presence of good collectors would not be good for us either. Having the good and the bad and the speculator adds dynamism to it all. The greatest of responsibilities fall to galleries here. They should now be able to recognize who purchases and then sells in auctions, they should be really picky in selling artworks. I mean, they should have the luxury to do so. I witnessed this with my own eyes; I was thinking about a second purchase from a gallery that I just bought a piece from. Someone came and purchased it, of the same artist. Then sold it in an auction two weeks later. How can people do that! I asked the gallery owner about this and he told me that person was blacklisted. We will get through these. There is nothing to be done. This is the ethical side of the issue. Everyone has their responsibilities when it comes to this. Gallery owner, auctioneer, everyone… The greatest responsibility is with the artist though. We are a small society here. Some rules have to be settled in within this market. Purchasing from an artist bypassing the gallery is not an achievement but a disgrace in my opinion. We are reaching global standards now. This is a very serious sort of marriage. And of course there is something called the marriage contract. It is something both sides must follow.", "S.A: We talked about the rules of the marriage and the ethical rules. There is a contract.", "Even if there isn’t, what do you think about Santral Istanbul’s collection being sold in an auction with some ethical requirements?", "L.A: I do not know the entirety of the situation. I read a couple Tweets about it. Let this be a lesson to all. There are many lessons to be taken from happenings like this. It is not the end of the world! That is my point of view. For everyone, for the artist, for the gallery who provided, for the place that calls itself a museum… It is very much like making a claim on the future of your baby.", "Is it not? Where will it go? Who will own it? Who will take care of it? Who will raise it? Who will feed it? This is something very much within those lines. That is why the contract is everything.", "We are in this sort of an era now. If everything is written, there will be no place for discussion.", "What happened, who did it, who said what… Questions like this do not belong in today’s world.", "S.A: There is something else I am interested in after this negative and unethical matter. Are there any projects you plan to do in the near future?", "L.A: I am a member of the Leadership Council of New Museum. This is my second year. Although", "I wouldn’t dare push their curators to do so, I hope that I can convince them to involve Turkish artists in their programs indirectly. I mean I dream of an exhibition featuring mainly Turkish artists in New Museum. I want to be a part of such a thing and be happy. Aside this, there are only small projects in my mind. I mean there are all sorts of projects but they are all tiny. I really value New York, I especially applaud C24. It is a very difficult thing to own a gallery in New York.", "Murat Pulat in Leila Heller Gallery with a personal exhibition. These are all things to be proud of. Alistair Hicks was here last week. You know, the art director of Deutshce Bank, the main curator. I introduced him to some galleries, some artists. These are things that make me glad.", "S.A: Is there any specific artist you follow, you like, lately?", "L.A: I would rather not name a Turkish one. That would be supporting sides. I was intrigued by some artists in India. Bharti Khen is one of them, I like his work a lot. I saw his work in some very important collections as well.", "Yet, there is no end to this. Perhaps this is what stops me from being a real collector. However, there really was never any work that I was crazy about. I wish I had a Nur Koçak work in my collection. I should have purchased back in the day, yet it wasn’t in my agenda back then. Priorities change.", "S.A: You are a member of New Museum’s Leadership Council. How did you achieve this?", "L.A: They invite a member from each country. I was offered the position from Turkey, and I accepted. They seek to be a world museum and do PR activities in becoming one. They have to be able to promote themselves in their museums and they should be worth visiting. This happens through world class supporters. They have to form such a network so that they can form communications around the world in an easier way.", "S.A: Your relationships and connections in New York must have had strengthened with New", "Museum. Is there any particular gallery you would like to tell us about, a gallery that you follow and like, in New York?", "L.A: Leila Heller’s gallery is one of my favorites, and she is a real close friend of mine. Her love for art and the thing she does is definitely worth of commendation. I believe that she made Kezban", "I wish I had a Nur Koçak work in my collection. I should have purchased back in the day, yet it wasn’t in my agenda back then. Priorities change. 3 4"]}, {"title": "Monika Bulanda", "year": "2013", "cat": "Gallerist", "type": "Press release", "what": "Monika Bulanda’s “Multi-City” — city silhouettes built as collage. Her first show in Turkey.", "why": "Cities cut and re-collaged — place as a state of mind.", "who": "Gallery Director — ALAN İstanbul", "imgs": ["SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/1_2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_20.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2_2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_16.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/3_2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_07.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013.04_Gallerist_Monika-Bulanda_ALAN_E04.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013.04_Gallerist_Monika-Bulanda_ALAN_E11.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013.04_Gallerist_Monika-Bulanda_ALAN_E13.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_01.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_09.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_10.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_11.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_13.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_14.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_15.jpg", "SA_WEBSITE/47-2013_Gallerist_Monika-Bulanda_ALAN_Istanbul/2013_Gallerist_Monika-Bulanda_ALAN_Istanbul_17.jpg"], "vids": [], "bodyp": ["Monika Bulanda, a young artist of contemporary art who stands out with visual aesthetics, is at ALAN İstanbul for the first time in Turkey with her solo exhibition “MULTI-CITY”.", "Considering that the visual images of each city are marvelous art pieces on their own, Monika Bulanda reproduces this visuality with contemporary art codes. All structural and organic items, which compose city silhouettes, develop a big collage in Bulanda’s paintings. Gathering thousands of particles with different colors, textures and tones in a big collage makes us perceive a single photograph with many details. This collage makes up both a definable and a chaotic city silhouette at the same time by combining deep perspectives and multiple particles. Thereby, each artwork of “MULTI-CITY” can be viewed as a process, which starts with the smallest details, continues with a striking effect of the whole, and leaves a lasting influence on the audience.", "The affinity between energies given off by Istanbul and New York inspired Monika Bulanda to create the Multi-İstanbul and Multi-New York series, which will be shown together in “MULTI-CITY”. The exhibition may be visited at ALAN İstanbul between April 11th and May 4th 2013."]}, {"title": "Issue03", "year": "2013", "cat": "Editor", "type": "Issue", "what": "WARHOLA Issue 03 — introducing the Contemporary Art Line Map of Istanbul, with an interview with Monika Bulanda.", "why": "To introduce the Contemporary Art Line Map guiding art lovers to Istanbul’s key galleries and institutions, with the March–April events and conversations with Monika Bulanda and collector Leyla Alaton.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/1_2013_Editor_WARHOLA_Issue03_Cover.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2_2013_Editor_WARHOLA_Issue03_01.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_02.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_03.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_04.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_05.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_06.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_07.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_08.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_09.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_10.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_11.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_12.png", "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_13.png"], "vids": [], "bodyp": [], "pdf": "SA_WEBSITE/46-2013_Editor_WARHOLA_Issue03/2013_Editor_WARHOLA_Issue03_doc_01.pdf", "pdflabel": "Issue"}, {"title": "Social Animals", "year": "2013", "cat": "Gallerist", "type": "Press release", "what": "A six-artist show on the human as a social animal — displacement, repression and identity — with Mehmet Dere, Sibel Diker, Süha Şahin, Merve Şendil, Lara Ögel, Halil Vurucuoğlu.", "why": "Secil keeps returning to how systems press on the individual. This was that question put on the wall — with her own thesis, curated. “Sociology begins with two basic facts: The behavior of human beings shows regular andrecurrent patterns, and human beings are social animals and not isolated creatures.” ElyChinoy.", "who": "Gallery Director — Curator — ALAN İstanbul", "imgs": ["SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/1_2013_Gallerist_Social-Animals_ALAN_Istanbul_19.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2_2013_Gallerist_Social-Animals_ALAN_Istanbul_20.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/3_2013_Gallerist_Social-Animals_ALAN_Istanbul_15.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/4_2013_Gallerist_Social-Animals_ALAN_Istanbul_23.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/5_2013_Gallerist_Social-Animals_ALAN_Istanbul_25.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_01.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_02.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_03.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_
