ter_Users-Manual_Blog_Istanbul/1_2010_Writer_Users-Manual_Blog_Istanbul_02.jpg", "SA_WEBSITE/22-2010_Writer_Users-Manual_Blog_Istanbul/2010_Writer_Users-Manual_Blog_Istanbul_01.webp", "SA_WEBSITE/22-2010_Writer_Users-Manual_Blog_Istanbul/2010_Writer_Users-Manual_Blog_Istanbul_03.jpg", "SA_WEBSITE/22-2010_Writer_Users-Manual_Blog_Istanbul/2010_Writer_Users-Manual_Blog_Istanbul_04.jpg", "SA_WEBSITE/22-2010_Writer_Users-Manual_Blog_Istanbul/2010_Writer_Users-Manual_Blog_Istanbul_05.jpg", "SA_WEBSITE/22-2010_Writer_Users-Manual_Blog_Istanbul/2010_Writer_Users-Manual_Blog_Istanbul_06.jpg"], "vids": [], "bodyp": ["User’s Manual: Contemporary Art in Turkey 1986–2006", "This book covers the last twenty years of contemporary art in Turkey, and Halil Altındere and Süreyya Evren put it together in 2006. To read Turkish contemporary art from different angles, they built it like a user’s manual, with a text section backed by curators, art writers, and critics, and an artists’ section to complete it.", "Its second most important quality is how it lays out, in order, the changes that shaped where art is now: conceptual art in Turkey after the 1980s, the biennials, the state of being current, visibility in international art, the rise of initiatives, artists stepping into gallery management, all explained in detail along a timeline. Its most important quality may be that the subjects are told first-hand.", "User’s Manual brings a whole set of writers, artists, curators, and critics into a single project, and it is the product of careful work. The editors gathered what you could call encyclopedic information through a research method, and they backed the situations and events that seventy-eight artists lived through over these twenty years with the historical thread running through the texts. The editors invite you to look at, and question, the many changes Turkey has gone through since the 1980s, for better or worse, in politics, economy, society, and culture, all through art.", "You can also read User’s Manual as a continuation and a gathering of Art-ist magazine. For its editors it was a “necessary” piece of work. They say they had to make it because they witnessed more than one of these cases and were part of them themselves. If you think about how contemporary art in Turkey went through a boom after the 1990s, a collection like this was needed. For good research and a good historical view, it is fair to call it a book that takes the last twenty years of Turkey’s development in detail.", "Editors: Halil Altındere, Süreyya Evren.", "Writers: Ali Akay, Evrim Altuğ, Elmas Deniz, Fulya Erdemci, Marcus Graf, Vasıf Kortun, Erden Kosova, Mahmut Koyuncu, Beral Madra, Nilgün Özayten, Ferhat Özgür, Şener Özmen, Ayşegül Sönmez, Başak Şenova, Pelin Tan."]}, {"title": "Hale Tenger", "year": "2010", "cat": "Writer", "type": "Article", "what": "Essay on Hale Tenger, her found materials and installations, and the social subjects she takes on.", "why": "Rope, sand, matting, a gear stick — ordinary things forced to carry what they were never meant to. Rooms you’re pulled inside and never left outside: jars of Bosnia’s war on cellar shelves, its sound filling the empty space. Play as the work, memory as the subject, and always the cost the male order exacts on women.", "who": "Author", "imgs": ["SA_WEBSITE/21-2010_Writer_Hale-Tenger/1_2013_Writer_Hale-Tenger_05.jpg", "SA_WEBSITE/21-2010_Writer_Hale-Tenger/2013_Writer_Hale-Tenger_01.jpeg", "SA_WEBSITE/21-2010_Writer_Hale-Tenger/2013_Writer_Hale-Tenger_03.jpg", "SA_WEBSITE/21-2010_Writer_Hale-Tenger/2013_Writer_Hale-Tenger_04.jpg", "SA_WEBSITE/21-2010_Writer_Hale-Tenger/2013_Writer_Hale-Tenger_06.jpg", "SA_WEBSITE/21-2010_Writer_Hale-Tenger/2013_Writer_Hale-Tenger_07.jpg", "SA_WEBSITE/21-2010_Writer_Hale-Tenger/2013_Writer_Hale-Tenger_08.jpg"], "vids": [], "bodyp": ["Hale Tenger was one of the first artists in contemporary Turkish art to go looking for a new language, a new way to say things. She takes on hard subjects, and she takes them on with whatever the work needs: different materials, different methods. What you notice first is the range of things in her hands. Matting, sand, rope, a gear stick, whatever she has gathered from ordinary life. She gives these things meanings they were never meant to carry, and out of them she builds something you can see.", "The subjects are not light ones. The side effects of so-called progress. Violence. The trouble we have with culture, with talking to each other at all.", "Since the 1990s she has opened show after show, and taken part in many more. Her work stays close to Turkey and its questions, and almost always it points at something social, something we were late to look at. The early pieces say it plainly: “I Have Acquaintances Like This,” “Sikimden Aşağı Kasımpaşa,” “Turkish Delight,” “The Sacred Reliquary Box: The Woman’s Plate,” “The World,” “On the Principle of Reciprocity.” In all of them she stands against the male order that runs the world, and against what it costs women.", "Installation is where she is strongest, because she knows how to build a thing and pull you inside it. In her work the viewer is never outside. You are made to play along, to think. Sometimes she only adds to a place that already exists. Sometimes she builds the place from nothing. In “The Necessity of Air,” at the Atatürk Library, she barely touched the room. She added, and she left its own air intact. In “Decent Death Guards: Bosnia-Herzegovina,” she started from an empty space: metal shelves like a cellar, jars set on them, and inside the jars, images left over from the war in Bosnia. The sound of that war moves through the empty room, and it pulls you all the way in.", "Some works are about her own life. “The Box Room.” “For Sale by Transfer.” “Self-Portrait.” She lays out the things she has kept since the beginning, the experiences too, and she lets you see her inner world. She makes it plain by rebuilding the house she grew up in. A table already set, waiting for someone to sit. A desk under a low light. A wardrobe full of bright clothes in the colors of that time. That is what the work is made of.", "For Tenger, play is not a break from the work. It is the work. She builds rooms where you can question your own memory, and the memory you share with everyone else. She wants the installation to be lived, from your side, as a moment that happened to you. She lifts each piece out of a single fixed image and puts it back into life. It looks like she will keep going this way, and keep surprising us with whatever comes next."]}, {"title": "Thomas Bayrle", "year": "2010", "cat": "Gallerist", "type": "Press release", "what": "“La Camera degli Sposi (After Mantegna)” — large serigraphs returning to sex and illusion. The first Thomas Bayrle show in Turkey.", "why": "The mass image built by hand, one repeated unit at a time.", "who": "Institutional Communication & PR Specialist", "imgs": ["SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/1_2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_08.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_09.jpg", "SA_WEBSITE/20-2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul/2010_Gallerist_Thomas-Bayrle_Dirimart_Istanbul_10.jpg"], "vids": [], "bodyp": ["Bayrle explains his works for the exhibition “Camera degli Sposi – (after Mantegna)”; I am returning after forty years with Sex and Rock n’ Roll… Sixteen works were printed in the 1970’s with the name “Feuer im Weizen / Fire in the Wheat” in Maerz Verlag, now they are back with big serigraphy prints. I am an old man now and I find it necessary to bring back “sex”, which has been around forever and will continue to be for eternity. The name for my new, bigger prints is “Camera degli Sposi” – (After Mantegna). Mantegna is the famous painter who painted the frescoes of Palazzo Ducale in Mantova. The title refers to the work in Palazzo Ducale and to the artist Andrea Mantegna.", "“Camera degli sposi” alludes to the wedding band, the ring, marriage and the married couple. The theme of sex that is used in this exhibition is tied to the alluded subjects. Mantegna would use illusion in his wall paintings; it is possible to notice an illusion that is similar in Bayrle’s works.", "About the artist", "Born in Berlin in 1937, Thomas Bayrle lives and works in Frankfurt. He studied at the Werkkunstschule in Offenbach and taught at the Städelschule in Frankfurt from 1972 to 2002. His work has been exhibited at the New Museum, New York; the Städel Museum, Frankfurt; and the Lenbachhaus, Munich."]}, {"title": "When Ideas Become Crime", "year": "2010", "cat": "Writer", "type": "Essay", "what": "Essay on Halil Altındere’s “When Ideas Become Crime,” a platform for young post-2000 Turkish artists.", "why": "A room of their own for the generation that came up after 2000 — young artists from Diyarbakır to Antakya to Europe — the latest in Altındere’s line of shows that keep feeding the Istanbul biennials. Under a title that frames their ideas as exactly what the system treats as a crime.", "who": "Author", "imgs": ["SA_WEBSITE/19-2010_Writer_When-Ideas-Become-Crime_Blog_Istanbul/1_2010_Writer_When-Ideas-Become-Crime_Blog_Istanbul_02.jpg", "SA_WEBSITE/19-2010_Writer_When-Ideas-Become-Crime_Blog_Istanbul/2010_Writer_When-Ideas-Become-Crime_Blog_Istanbul_01.webp"], "vids": [], "bodyp": ["The exhibition “When Ideas Become Crime,” curated by Halil Altındere, opens on September 1 at Tütün Deposu in Tophane, a space that has hosted many biennial shows. It runs until October 10 and is made up of a new generation of young artists who came up after 2000.", "Until now, Halil Altındere has curated the shows “I’m Bad and I’m Proud” (2002), “I’m Too Sorry that I’m Going to Kill You” (2003), “Free Kick” (2005), and “Be Realistic, Demand the Impossible!” (2007). Eleven of the artists from his shows have also been invited to the 9th, 10th, and 11th Istanbul Biennials. Through this show, the aim is to build a platform where young contemporary artists from Turkey, living in Istanbul, Ankara, İzmir, Diyarbakır, Mardin, Antakya, and different cities of Europe, can express themselves."]}, {"title": "Necmi Zeka", "year": "2010", "cat": "Gallerist", "type": "Press release", "what": "Necmi Zeka’s ‘Three Masked Tales’ — masking-tape works on the showing and hiding of language.", "why": "Language shown and hidden at once — what a word covers as much as what it says.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/18-2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul/1_2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/18-2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul/2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/18-2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul/2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/18-2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul/2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/18-2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul/2010_Gallerist_Necmi-Zeka_Dirimart_Istanbul_05.jpg"], "vids": [], "bodyp": ["In the exhibition where three serial artworks done in 2010 are exhibited, Necmi Zeka emphasizes the relationship between visual and verbal elements, as he did for his past exhibitions. The series entitled as “Sir?”, “Stars and Stars”, “The Whole and The Parts Against Each Other” contain artworks that are masking tapes on cardboards and based on a short narration.", "It is possible to find a partially ironic emphasis in the artworks that try to turn stationary narration and designation techniques into a problem with a binary fiction. The exhibition, focus on the issue of “displaying and hiding effects of the language”, also refers to the illusions that are created by the repetition of the main communication units.", "About the artist", "Necmi Zekâ is a Turkish poet and multimedia artist who lives and works in Istanbul. He studied political science at Boğaziçi University, took an M.Phil. at the University of Leicester, and pursued doctoral work at Northwestern University. Alongside nine books of poetry, his visual work has been shown in solo exhibitions including at Dirimart, Istanbul."]}, {"title": "Borga Kanturk", "year": "2010", "cat": "Writer", "type": "Interview", "what": "Interview with Borga Kantürk on being both artist and curator and what curating means to him.", "why": "Curating described as “an editing, a publishing, of feeling” — by an artist who refuses to stop being one. The instinct to catch the spark others passed over and open a field for it. Two roles held at once, not as indecision but as method, with portability and sustainability the thread he keeps pulling.", "who": "Author", "imgs": ["SA_WEBSITE/17-2010_Writer_Borga-Kanturk/1_2013_Writer_Borga-Kanturk_01.jpeg", "SA_WEBSITE/17-2010_Writer_Borga-Kanturk/2013_Writer_Borga-Kanturk_02.jpg", "SA_WEBSITE/17-2010_Writer_Borga-Kanturk/2013_Writer_Borga-Kanturk_03.webp", "SA_WEBSITE/17-2010_Writer_Borga-Kanturk/2013_Writer_Borga-Kanturk_04.webp", "SA_WEBSITE/17-2010_Writer_Borga-Kanturk/2013_Writer_Borga-Kanturk_05.webp"], "vids": [], "bodyp": ["Secil Alkis: You are inside art both as an artist and as a curator. What are the upsides and downsides of that?", "Borga Kantürk: The upside is that it gives the artist-curator relationship an inside point of view. Your roots as an artist, your experience and instinct about the act of making, get folded into your curatorial role around the production, the presentation, and then the circulation of the work. Where the two sides cannot agree, it lets you trust your instincts, since you hold both positions, and find the middle road. The downside is that you cannot fully focus on one of them and build your career with sure steps in that single direction. Maybe it suits you that way and you cannot give it up. When demand comes from both fields, holding this position starts to feel right.", "Secil Alkis: How do you choose the shows you curate?", "Borga Kantürk: Usually I build partnerships at the idea stage and move toward a whole alongside the artists I can share that idea with, and the things growing around it, together with the strategies and theories that support them. Taking on a project on commission is not that kind of thing for me; there is no choosing from a scale or a list in front of me. I try to make shows out of the things I focus on, the things that hit me, that nag at me, that I can test against certain artists and people from this circle, that I sense in some work, that I feel empathy for. Some turn into shows, some stay in letters and conversations. Possibility, opportunity, and time decide that.", "Secil Alkis: What is the work we call “curating” for you, and what does it involve?", "Borga Kantürk: I think, because I am an artist-origin curator, the answer will not be a clean formula. I want to come at this process more emotionally, through the possibilities of expression and the empathy that communication needs. Like an editing, a publishing, of feeling and expression. Like making a kind of connection, a passage. In some artists, some work, you notice a spark, something not thought through, something passed over. You get the feeling you have to open a field for them, bring them to a viewer. This can focus on artists from the same region, works that appeared in the same years, but it is also a process I live aiming at a partnership, a force, a synergy that can bring together artists from completely far-apart geographies. If that partnership comes together and surfaces as a strong potential force, and then creates excitement and empathy for a crowd, then curating becomes, for me, an act that reaches its aim. I cannot fully explain its limits, its definition, or why I want to keep doing it, but to sense that this whole web of relationships needs to be built, to feel it ahead of time, and to take on gathering that thing which exists in pieces and turning it into a whole. To carry a collective event, a case, to people. I think I keep going because I can live this whole process and feeling under the name “curating.”", "Secil Alkis: Is the curator important for an artwork to create awareness?", "Borga Kantürk: The curator is important because he is a mediator. He can have a good effect on the communication and the reading around the artist and the work, and sometimes, by over-coding and over-referencing, he can also lock it into one strong fixed reading. But needing a curator at every moment to notice an artwork would be a bit of a luxury, and limiting for the work. Curator, gallery, writer, and others, any one of them or all of them, are stakeholders, partners, in creating awareness.", "Secil Alkis: In Turkey very few people take on this mission. Is there someone among them who does it well and whom you follow?", "Borga Kantürk: Few? I think the number of curators has grown a lot. But the matter of taking it on has shifted a little. There was not much chance to study this field before; what we call cultural management was not discussed in the Turkish setting. So I think our generation learned this work by making shows, arguing, observing, and most of these people had finished departments tied to art production. Yes, this generation took it on a bit as a duty and made its choice. Now there is a generation that can choose it from the start as a profession, and people have even begun to choose, specifically, which direction of the work they will go in. I follow Adnan Yıldız and Övül Durmuşoğlu closely, curators who carry this work very well internationally. Başak Şenova is among the first of the curators and educators I admire greatly. Institutionally, Vasıf Kortun has been a pioneer for contemporary art in Turkey. When people like this do something, you follow it anyway.", "Secil Alkis: In your work and the shows you curate, is there a subject you especially defend and apply? Why?", "Borga Kantürk: It is hard for me to put a percentage on this and give a sharp, clear answer. Art is more relative, a human thing, and I do not find it right to formulate it too much. It can transform; sudden strong influences, or situations you can obsess over for a long time, can form the base, the focus, of the show you make. I can only say one clear thing: since “KUTU, portable art space,” which I co-founded, the ideas of sustainability and portability have in a way been a reference as I developed my curatorial strategies.", "Secil Alkis: Do the shows you prepare address a certain audience? If so, why?", "Borga Kantürk: I do not know, do I address a certain audience? But I do not make very big-budget, very liberal, highly visible shows. This goes against my view and reading of contemporary art, and such institutions and the people doing that kind of work do not much prefer to work with me anyway. So my shows are in contact with followers looking for continuity, rather than a “general audience” or high numbers.", "Secil Alkis: Art moves very fast, and you live in İzmir. What do you do to follow developments and keep developing yourself?", "Borga Kantürk: Living in İzmir does not mean I am cut off. Having international connections from different cities, being in touch with various institutions and artist organizations, seems enough to follow developments and, in a way, to be part of them. By now much of it, especially after 3G, slips into a virtual space where people share video and audio from their phones instantly. Many events, shows, and conferences I could not follow before, I can follow this way, free, over the internet. I follow podcasts about contemporary art especially, and read the new publications of international publishers. Beyond that I am in touch online with curator and artist friends from different parts of the world. Whenever I have the money I change cities often, even if only for a while. İzmir is a quiet, calm city, and that makes it easier to concentrate on my work here. A kind of half-retreat.", "Secil Alkis: Some spaces have opened or been renewed lately. How do you read these spaces and their shows?", "Borga Kantürk: After the 11th Istanbul Biennial, Depo became an important stop, especially for independent curators and collectives. Arter and Rampa are two new spaces and they interest me a lot. Both will widen the field of production for contemporary art in Turkey. I do not quite know what program Borusan will run in its new space, but they are strong in name and prestige. Platform Garanti has been renewing its space for a long time and the construction is almost done. They are coming back wider, clearer, stronger. If the alternatives grow in number, I believe the field widens further. It looks like their focuses and interests differ from one another too, which is satisfying in terms of supply and demand.", "Secil Alkis: As an artist, do you connect your curatorial work to your own?", "Borga Kantürk: I do not quite know. Let the art viewer, the followers, decide that rather than me; that would be more right. For me, being an artist and being a curator do not split like a sharp knife. But what I want to express as artistic production holds more individual and specific focuses, while my curatorial side naturally holds a more sharing, outward, more collective memory."]}, {"title": "Hussein Chalayan", "year": "2010", "cat": "Writer", "type": "Article", "what": "Essay on Hussein Chalayan treating fashion as a field of ideas, and his 1994–2010 museum survey.", "why": "Fashion treated as a field where ideas find their form — silk clothes buried in the ground and dug up months later, garments that think through migration, genetics, belonging. The 1994–2010 survey of a designer who makes clothing carry philosophy.", "who": "Author", "imgs": ["SA_WEBSITE/16-2010_Writer_Hussein-Chalayan/1_2010_Writer_Hussein-Chalayan_03.jpg", "SA_WEBSITE/16-2010_Writer_Hussein-Chalayan/2010_Writer_Hussein-Chalayan_01.jpg", "SA_WEBSITE/16-2010_Writer_Hussein-Chalayan/2010_Writer_Hussein-Chalayan_02.jpg", "SA_WEBSITE/16-2010_Writer_Hussein-Chalayan/2010_Writer_Hussein-Chalayan_04.jpg", "SA_WEBSITE/16-2010_Writer_Hussein-Chalayan/2010_Writer_Hussein-Chalayan_05.webp", "SA_WEBSITE/16-2010_Writer_Hussein-Chalayan/2010_Writer_Hussein-Chalayan_06.jpg"], "vids": [], "bodyp": ["Chalayan presents fashion as a field of exploration where ideas find their form, and he challenges what we take for granted about what clothing means. He starts from the political, economic, and social realities of today’s world, and drawing on disciplines that are hard to tie directly to fashion, he makes designs that place conceptual ideas in a philosophical frame. His clothes reflect the thinking behind them, and his much-admired shows work as performances. Alongside the fashion collections he makes installations, directs short films, and designs costumes for stage performances.", "A show curated by Donna Loveday, shown earlier at the Design Museum in London and the Museum of Contemporary Art in Tokyo, brought together the collections, installations, and films Chalayan made between 1994 and 2010. The works in this important selection draw on architecture, philosophy, science, history, anthropology, biology, and technology, and reflect his thinking across genetics, technological progress, displacement, migration, and cultural identity.", "Short biography: Born in Nicosia, Cyprus in 1970, Chalayan began his education in Cyprus and continued it in London. In 1993 he graduated from Central Saint Martins College of Art and Design. His highly inventive graduation collection, “Tangent Flows,” drew great attention at the time. It was made of silk clothes covered in iron filings, buried in the ground, and dug up months later. The collection was then shown in the window of Browns in London and made Chalayan’s name as an innovative designer. After founding his own label in 1994, he was named Designer of the Year in Britain twice. Hussein Chalayan is a British fashion designer of Turkish Cypriot origin. He has won British Designer of the Year twice and was honored with the MBE in 2006."]}, {"title": "O Zhang", "year": "2010", "cat": "Gallerist", "type": "Press release", "what": "O Zhang’s ‘Horizon’ — photographs of rural Chinese girls in the crouching-tiger pose, as the country’s overlooked future.", "why": "Rural girls a whole country overlooks, framed as its crouching future.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/15-2010_Gallerist_O-Zhang_Dirimart_Istanbul/1_2010_Gallerist_O-Zhang_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/15-2010_Gallerist_O-Zhang_Dirimart_Istanbul/2010_Gallerist_O-Zhang_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/15-2010_Gallerist_O-Zhang_Dirimart_Istanbul/2010_Gallerist_O-Zhang_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/15-2010_Gallerist_O-Zhang_Dirimart_Istanbul/2010_Gallerist_O-Zhang_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/15-2010_Gallerist_O-Zhang_Dirimart_Istanbul/2010_Gallerist_O-Zhang_Dirimart_Istanbul_05.jpg"], "vids": [], "bodyp": ["In her exhibition titled Horizon, O Zhang reminds us that the girls who are born and raised in rural China constitute one of the weaker portions within society, while asserting the belief that these girls will play major roles in the future of the country. Even though the crouching position might suggest some sort of vulnerability, it actually represents the metaphor of the “crouching tiger” in the Chinese culture, which represents the tiger that is regaining its strength and getting ready to attack — a position that is actually intimidating. The artist identifies with these girls, while referring to the swiftly shifting equilibria. The horizon line that advances throughout the photographs alludes to the upcoming rise that is depicted in the pictures.", "About the artist", "Born in Guangzhou, China, in 1976, O Zhang lives and works in New York. She trained at the Central Academy of Fine Arts in Beijing and earned MAs from the Byam Shaw School of Art and the Royal College of Art in London. Her work is held in collections including the Solomon R. Guggenheim Museum, New York; the Mori Art Museum, Tokyo; and the Vancouver Art Gallery."]}, {"title": "Ramazan Bayrakoglu", "year": "2010", "cat": "Writer", "type": "Article", "what": "Essay on Ramazan Bayrakoğlu’s satin- and plexiglass-built paintings and his relationship to material.", "why": "Satin’s shine and a woman’s piko stitch set against a fighter jet — the mismatch is the meaning. The material strikes you first; the subject arrives after and lands. Thousands of pieces dyed or laser-cut and rebuilt by hand — an obsessive craft that turns the risk of leaving “the beautiful” into the work itself.", "who": "Author", "imgs": ["SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/1_2013_Writer_Ramazan-Bayrakoglu_Istanbul_03.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_01.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_02.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_04.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_05.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_06.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_07.jpg", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_08.png", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_09.png", "SA_WEBSITE/14-2010_Writer_Ramazan-Bayrakoglu_Istanbul/2013_Writer_Ramazan-Bayrakoglu_Istanbul_10.jpg"], "vids": [], "bodyp": ["The artist ties the satin fabrics he lays over his images to the shared feeling in god making man out of clay.", "It is interesting to watch how different artists and different techniques succeed, or fail, in the face of something new. Stepping outside the beautiful and the correct is often a risk an artist is afraid to take. Bayrakoğlu looking for materials other than ordinary paint, and carrying that into his work with such care, can be read as a risk, but the artist treats it as part of how he makes things. At the same time, his close relationship with material and craft helps the work hit harder.", "Against the wholeness he tries to build between material and subject, the depth of the mismatch and the contrast makes the work stronger still. In paintings built with great care, the “contrast” between the shine of the satin and the piko stitch, an act society reads as belonging to women, and a fighter jet, is what defines the work. The subject is kept hidden, and constructions are handed to you out of elements that look chosen at random, as if your weak spots are being used. The images that come next push you to go back and build the whole. With satin or plexiglass taking your eye somewhere it is not used to, you are struck first by the material. The moment you try to make sense of it through the subject, the meaning finds its place. Comparative pairs between images, and the shifts they make in a person’s mood, are the result of a process that was wanted and constructed.", "How the artist works, for the satin paintings: a picture is chosen from photographs that could have been taken at any moment of the day; with a program the image is split into colored pieces; for each piece the tones are set; the colors are found one by one and prepared to dye the fabric; the fabric, dyed by silkscreen, is cut into the pieces it needs to become. With the piko setting of the sewing machine, the dyed and cut pieces are joined. When a whole is finally made, the entire piece is stretched onto a frame and is ready to show.", "For the plexiglass paintings: the base material is plexiglass, an acrylic-based material, lighter and more flexible than glass, in colored or clear kinds. The artist paints over it, so once the surface is painted you cannot tell it is plexiglass. He uses it because it is light and because it lets the laser cut in the finest detail. After the material is chosen, the path is like the work with satin. As with the fabric paintings, the design is made on the computer; built from vector drawings, it holds thousands of small pieces that come side by side to form the whole picture. Once the design is done, the pieces are laser cut. The laser machine can cut one piece of 80 by 120 cm at a time. When the cut is done, what sits on the bench is a flat plate made of hundreds of small pieces, and you cannot tell what it is a picture of. The pieces have to be lifted off the laser bench without scattering. To manage this, the artist covers the whole surface of the cut plate with masking tape so the pieces hold together. Brought to the studio this way, they are laid on a table without scattering, and looking at the computer he numbers each one and sorts them into separate boxes by color. A painting has roughly 45 to 60 colors; he paints the pieces by these colors and puts them back in the same boxes. When the painting is done, the pieces are glued onto the carrier surface. Once they are placed, the picture has already appeared on its own.", "Short biography: Ramazan Bayrakoğlu was born in Balıkesir in 1968, and lives and works in İzmir. He began his art studies in 1984 in the Painting Department of the Fine Arts Faculty at Dokuz Eylül University. One of the department’s first graduates, he became an assistant professor in 1989 and an associate professor in 1992. A painter at heart, he works across many disciplines, trying to step out of classical painting and make more conceptual pieces. Without holding to a standard form, he works with as many different materials and methods as he can. He took part in the 9th Istanbul Biennial in the show “Freekick.” Beyond that: İstanbul Meltemi; Young Turkish and German Artists, Proje 4L, Elgiz Museum of Contemporary Art (Istanbul, 2006); Poetica/Erotica, Galerie Perpétuel (Frankfurt, 2005); Strange Voices, Growing Through The Night, Borusan Art Gallery (Istanbul, 2005); Not Its Top, Itself, K2 Art Centre (İzmir, 2004); Point Zero of Knowledge, İletişim Gallery (İzmir, 2002)."]}, {"title": "Peter Zimmermann", "year": "2010", "cat": "Gallerist", "type": "Press release", "what": "Peter Zimmermann’s ‘Next of Kin’ — twelve epoxy-resin canvases abstracted through the computer.", "why": "The artist creates compositions from pictures manipulated by transferring into a computer the details extracted from the images featuring a cell structure he examined under a microscope or buildings, mountains and blocks. He then combines this with epoxy material to create works each of which contains frames taken from life.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/13-2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul/2010_Gallerist_Peter-Zimmermann_Dirimart_Istanbul_07.jpg"], "vids": [], "bodyp": ["Dirimart presents to art enthusiasts the recent works of Peter Zimmermann, who has aroused worldwide interest with the canvases and sculptures he created using epoxy resin.", "Using book covers as his source in his works since the 1980s, Zimmermann has made use of posters, wall papers, printed materials and boxes in his creation process through the years. Starting from the mid-1990s, he has introduced a different interpretation in his works by abstracting through computer effects a set of materials he discovered himself. The artist creates compositions from pictures manipulated by transferring into a computer the details extracted from the images featuring a cell structure he examined under a microscope or buildings, mountains and blocks. He then combines this with epoxy material to create works each of which contains frames taken from life. Peter Zimmermann’s exhibition Next of Kin, which includes twelve works by the artist, will be open to visits until 25 April 2010.", "About the artist", "Born in Freiburg im Breisgau in 1956, Peter Zimmermann lives and works in Cologne. He studied at the State Academy of Fine Arts in Stuttgart from 1978 to 1983 and was a professor at the Academy of Media Arts Cologne from 2002 to 2007. He is known for epoxy-resin paintings derived from digital source imagery."]}, {"title": "6th Berlin Biennale", "year": "2010", "cat": "Writer", "type": "Essay", "what": "Essay on the 6th Berlin Biennale, “What Is Waiting Out There,” and its overlap with the 11th Istanbul Biennial.", "why": "The whole biennial is built on “the outside” — the foreign we keep at a measured, comfortable distance — and art that refuses that distance, pulling reality in and making it personal. Read from Istanbul, the seam shows: the same artists (Nilbar Güreş, Ruti Sela & Maayan Amir, Ferhat Özgür) and the same political nerve carried between the Berlin and Istanbul biennials.", "who": "Author", "imgs": ["SA_WEBSITE/12-2010_Writer_6th-Berlin-Biennale_Blog_Istanbul/1_2010_Writer_6th-Berlin-Biennale_Blog_Istanbul_04.jpeg", "SA_WEBSITE/12-2010_Writer_6th-Berlin-Biennale_Blog_Istanbul/2010_Writer_6th-Berlin-Biennale_Blog_Istanbul_01.jpg", "SA_WEBSITE/12-2010_Writer_6th-Berlin-Biennale_Blog_Istanbul/2010_Writer_6th-Berlin-Biennale_Blog_Istanbul_02.jpg", "SA_WEBSITE/12-2010_Writer_6th-Berlin-Biennale_Blog_Istanbul/2010_Writer_6th-Berlin-Biennale_Blog_Istanbul_03.jpeg"], "vids": [], "bodyp": ["6th Berlin Biennale: What Is Waiting Out There", "The 6th Berlin Biennale, “What Is Waiting Out There,” curated by Kathrin Rhomberg and offering many different contemporary artistic positions, opened to visitors on June 11. The biennial runs until August 8, and Rhomberg explains its conceptual frame like this:", "“The title of the show explains its place: there, outside. Where the idea of ‘outside’ begins is geographically and terminologically direct, and always set by the person’s own point of view. The outside world is different, strange, and improper, because it makes us review the explanation models we use in our own world and the methods by which we create our own reality. Wherever and whenever the reality of this outside world begins to affect our reality, we turn our gaze the other way and ignore the violation. Or we choose to look at the foreign in a distant, measured, pleasing way that keeps us from making it personal. The works gathered here do not allow that distant look. What they share is that they consistently refuse an impersonal neutrality, and instead offer images that reflect a very personal internalizing of reality. The ideas shown here point to an effort to find an artistic form that can carry what is seen straight into the experience of daily life, that can connect with what is lived, and that can let us review our own views on social, aesthetic, and political realities…”", "As Rhomberg says, the artists chosen for this biennial have different preoccupations and many aesthetic and political concerns, but in theory they all embrace the present moment and reality. Some of the German press called this video-heavy biennial a disappointment. Others welcomed its bleakness. Anyone who saw the 11th Istanbul Biennial may notice what it has in common with the 6th Berlin Biennale: not only some political themes, but some shared artists worth noting. The Israeli artist duo Ruti Sela and Maayan Amir, and the Turkish artist Nilbar Güreş, took part in both. Ferhat Özgür also represents Turkey here. In the press, some criticize the biennial for its nostalgic stance rather than embracing the “now.” One of the nostalgia-heavy but well-received videos is Phil Collins’s documentary built from the memories of former Marxist-Leninist professors from East Berlin. Among the other works that stand out are Renzo Martens’s hour-and-a-half video, as problematic as it is capable of sparking debate, and the large-scale installation by the Kosovar artist Petrit Halilaj that greets visitors at the entrance to KW.", "The biennial’s two main venues are the KW Institute for Contemporary Art in Mitte and a previously unused building, Oranienplatz 17 in Kreuzberg. In Kreuzberg, the other spaces showing fewer artists are: Strasse 19 (John Smith), Kohlfurter Strasse 1 (Danh Vo), and Mehringdamm 28 (Cameron Jamie, George Kuchar).", "Artists: Bernard Bazile, Mark Boulos, Mohamed Bourouissa, Olga Chernysheva, Phil Collins, Minerva Cuevas, Shannon Ebner, Nir Evron, Marcus Geiger, Ion Grigorescu, Friedl vom Gröller, Nilbar Güreş, Petrit Halilaj, Marlene Haring, Cameron Jamie, Sven-Åke Johansson, Thomas Judin, George Kuchar, Andrey Kuzkin, Thomas Locher, Adrian Lohmüller, Armando Lulaj, Renzo Martens, Adolph Menzel, Avi Mograbi, Henrik Olesen, Roman Ondák, Marion von Osten, Ferhat Özgür, Margaret Salmon, Hans Schabus, Michael Schmidt, Ruti Sela & Maayan Amir, Gedi Sibony, John Smith, Michael Stevenson, Sebastian Stumpf, Ron Tran, Danh Vo, Marie Voignier, Vincent Vulsma, Anna Witt, Pleurad Xhafa / Sokol Peçi."]}, {"title": "Kutlug Ataman", "year": "2010", "cat": "Writer", "type": "Article", "what": "Essay on Kutluğ Ataman’s “Mesopotamian Dramaturgies,” built around the film “Journey to the Moon.”", "why": "Villagers turning a minaret into a rocket to reach the moon — impossible belief and real longing in one frame. The small story carrying the enormous one. a film where personal and social mythologies mix with reality, a half-true, half-told story, a kind of social portrait that looks deep into contemporary Turkish culture.", "who": "Author", "imgs": ["SA_WEBSITE/11-2010_Writer_Kutlug-Ataman/1_2010_Writer_Kutlug-Ataman_03.webp", "SA_WEBSITE/11-2010_Writer_Kutlug-Ataman/2010_Writer_Kutlug-Ataman_01.jpg", "SA_WEBSITE/11-2010_Writer_Kutlug-Ataman/2010_Writer_Kutlug-Ataman_02.jpg", "SA_WEBSITE/11-2010_Writer_Kutlug-Ataman/2010_Writer_Kutlug-Ataman_04.jpg", "SA_WEBSITE/11-2010_Writer_Kutlug-Ataman/2010_Writer_Kutlug-Ataman_05.jpg", "SA_WEBSITE/11-2010_Writer_Kutlug-Ataman/2010_Writer_Kutlug-Ataman_06.jpg"], "vids": [], "bodyp": ["The backbone of Kutluğ Ataman’s last show in Rome, “Mesopotamian Dramaturgies,” is the film “Journey to the Moon.” It also screened at the Istanbul Film Festival last year. The film is set in a remote village in Erzincan, in the east of Turkey, and Ataman’s own family is from Erzincan. Four villagers try to travel to the moon by turning a mosque minaret into a rocket, and the attempt is documented through found black and white photographs and a narrator from the area. The events are said to have happened in 1957, and Turkish thinkers from many fields give their views on them. Like Ataman’s other work, “Journey to the Moon” stops being a documentary or a record. It becomes a film where personal and social mythologies mix with reality, a half-true, half-told story, a kind of social portrait that looks deep into contemporary Turkish culture. The Rome show puts “Journey to the Moon” next to six video installations and a light box.", "One of those installations, “Column” (2009), takes its form from the column built for the Roman Emperor Trajan to tell the victories of the ancient empire. On television screens set in a rising spiral, it shows close-ups of the faces of people from the far corners of Turkey who tell, or cannot tell, their stories. Another installation, “Pursuit of Happiness,” sets second-hand armchairs in front of old television sets so you can sit down and settle in. Listening to the story of a woman forced into marriage, you watch the gap between Western and Eastern relationships, and the way the search for happiness shifts its meaning under globalization, all through the lens of local principles. “The Complete Works of William Shakespeare” and “English as a Second Language” point to the same thing, to what is lost in translation. In both, texts lose their meaning as they are read or written and turn into sound, into script, into ornament you cannot read. The show also holds “Frame” (2009), a light box with an early twentieth-century military photograph; “Strange Space” (2009), made earlier for the Abraaj Capital Art Prize in Dubai, where Ataman walks blindfolded through the desert; and “Dome” (2009), projected onto the ceiling so you can lie down and watch “modern Turkish youth” hang in the air like the angels on the ceilings of Catholic churches.", "In “Mesopotamian Dramaturgies,” drama and comedy, Middle Eastern legend and European art history, deep silence and words that never run out, all remind you how many modernities are being lived at once. And that richness of story shows plainly where Ataman’s practice draws its food from.", "Short biography: Kutluğ Ataman was born in Istanbul in 1961. After Galatasaray High School he studied cinema at the Sorbonne in Paris, then took an MFA in cinematography at UCLA in Los Angeles. The same year he made his first short film, “The Flight,” which won awards in New York, Chicago, and Washington. His film “Karanlık Sular” won Best Director, Best Screenplay, and Best Film at the 1994 Istanbul Film Festival and screened at many international festivals, putting Ataman among Turkey’s avant-garde directors. In 1997 Rosa Martínez, curator of the Istanbul Biennial, showed Ataman’s eight-hour video of the opera singer Semiha Berksoy, “semiha b. unplugged,” the first step toward showing his work in the art world. “Women Who Wear Wigs” followed at the 1999 Venice Biennale. After that Ataman took part in many international biennials and shows: Berlin Biennial (1999), Documenta (2002), São Paulo Biennial (2002), Istanbul Biennial (2003 and 2007), Moscow Biennial.", "Ataman keeps directing films too. So far he has made two award-winning features, “Lola and Billidikid” (1999) and “2 Girls” (2005). His latest, “Journey to the Moon” (2009), can be watched two ways, in cinemas and in exhibitions. After moving to London he was nominated in 2004 for the Turner Prize, Britain’s most prestigious art award. For it he showed a six-channel video about an Arab community living on the Syria-Turkey border and their experiences with reincarnation. The same year he received the Carnegie Prize in the United States for the video installation “Küba,” and in 2009 the Abraaj Capital Art Prize in Dubai, together with Cristiana Perrella. His show “Mesopotamian Dramaturgies,” eight separate works made for the Lentos Kunstmuseum in Linz, the 2009 European Capital of Culture, continues at MAXXI, Rome’s new museum of contemporary art, until September 12."]}, {"title": "Halil Vurucuoglu", "year": "2010", "cat": "Gallerist", "type": "Press release", "what": "Halil Vurucuoğlu’s ‘From Dusk till Dawn’ at Dirimart — paper works and the layered subconscious.", "why": "Paper cut into the subconscious.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/1_2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/2_2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/10-2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul/2010_Gallerist_Halil-Vurucuoglu_Dirimart_Istanbul_06.jpg"], "vids": [], "bodyp": ["Venue: Founded 2002; a leading Istanbul contemporary gallery, the first to bring Ghada Amer, Hermann Nitsch and Thomas Bayrle to Turkey.", "About the artist", "Halil Vurucuoğlu was born in İzmir in 1984. He received his BA from Dokuz Eylül University, Faculty of Fine Arts, Department of Painting."]}, {"title": "Bahar Oganer", "year": "2009", "cat": "Gallerist", "type": "Press release", "what": "Bahar Oganer’s solo show at Dirimart.", "why": "A figure with her back turned — the interior life, painted.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/1_2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_01.png", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_08.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_09.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_10.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_11.jpg", "SA_WEBSITE/9-2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul/2009_Gallerist_Bahar-Oganer_Dirimart_Istanbul_12.jpg"], "vids": [], "bodyp": ["Venue: Founded 2002; a leading Istanbul contemporary gallery, the first to bring Ghada Amer, Hermann Nitsch and Thomas Bayrle to Turkey.", "About the artist", "Born in Ankara in 1980, Bahar Oganer lives and works in Istanbul. She graduated from the Painting Department of the Faculty of Fine Arts at Dokuz Eylül University in Izmir. Her solo exhibitions include shows at Dirimart and ALAN Istanbul."]}, {"title": "Hermann Nitsch", "year": "2009", "cat": "Gallerist", "type": "Press release", "what": "“Das Orgien Mysterien Theater” — his ritual theatre of the five senses. The first Hermann Nitsch show in Turkey. Hermann Nitsch was not an activist in the traditional political sense, but rather a pioneering Austrian artist and co-founder of the Viennese Actionism movement in the 1960s.", "why": "Ritual pushed to the edge of the body — where art stops being polite. Despite the overt use of blood and viscera, Nitsch viewed his work as an extreme celebration of life, mortality, and the human soul. He sought to strip away the sanitization of modern life and force audiences to directly confront their own existence.", "who": "Institutional Communication & PR Specialist", "imgs": ["SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/1_2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/8-2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul/2009_Gallerist_Hermann-Nitsch_Dirimart_Istanbul_08.jpg"], "vids": [], "bodyp": ["My theater is visual theater, and learning by seeing is a particularly important concern of my work. Throughout the history of the theater, the visible, that which can be grasped with the eye, has never been as important as it is in O.M. Theater. When I realised that language alone no longer had the power to express what I wished to realise, I turned my back on spoken and representative theater and attempted to stage real occurrences in my theater. All the five senses of the audiences were to be tasked directly. A real occurrence can be registered with all five senses. I construct occurrences in which the audience is invited to smell, look, hear, feel intensely.", "Nitsch continues to uphold a modern art ritual whose religious ceremony-like actions mostly known as Origien Mysterien Theater which is developed by him during his student years. Nitsch blesses the body in the context of blood, nakedness and violence while also introducing a critical approach to modernist body policies. He transfers the basic human violence to all senses while pioneering leading contemporary art media like performance art and happenings by using themes like animalism and gender issues.", "The ritual-like performances of the artist createa tangible, visible, hearable, smelling reality that encompasses all the aspects of the center (the body) as well as the peripheral (the viewer and the stage), and which is far removed from the \"as if \" effect of the traditional drama. His works that are created as a result of his Painting Actions, also create a brand new stage where all the colors and their mental images exist together in the viewers mind.", "About the artist", "Born in Vienna in 1938, Hermann Nitsch was a founder of Viennese Actionism who lived and worked in Prinzendorf, Austria; he died in 2022. He trained at the Graphische Lehr- und Versuchsanstalt in Vienna. His work is held in institutions including the Nitsch Museum, Mistelbach; the Nitsch Museum, Naples; and Istanbul Modern."]}, {"title": "Ghada Amer", "year": "2009", "cat": "Gallerist", "type": "Press release", "what": "“Failing Sharazad” — embroidered canvases glorifying the female form against every system that restricts a woman’s independence over her body. The first Ghada Amer show in Turkey.", "why": "A woman turning desire into thread, refusing to be looked away from.", "who": "Institutional Communication & PR Specialist", "imgs": ["SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/1_2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/7-2009_Gallerist_Ghada-Amer_Dirimart_Istanbul/2009_Gallerist_Ghada-Amer_Dirimart_Istanbul_08.jpg"], "vids": [], "bodyp": ["The works by Ghada Amer, who works with embroidery on stretched canvas, look like darkly painted block oil leaking down when observed from a distance, but fine embroidery reveals itself upon close examination; every small detail supports a message in the whole.", "Usually defining the women she portrays as emotional and provocative, Ghada Amer glorifies the female form and opposes every system that restricts the woman’s independence over her body.", "About the artist", "Born in Cairo in 1963, Ghada Amer lives and works in New York. She studied at the Villa Arson in Nice, France, receiving her BFA in 1986 and MFA in 1989. Her work has been exhibited at the Museum of Modern Art, New York; the Brooklyn Museum; and the Centre Pompidou, Paris, and is held in collections including the Art Institute of Chicago and the Centre Pompidou."]}, {"title": "Ramazan Bayrakoglu", "year": "2009", "cat": "Gallerist", "type": "Press release", "what": "Ramazan Bayrakoğlu’s ‘1km’.", "why": "A city sewn from film stills in satin — memory carried in the wrong material.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/1_2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/6-2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul/2009_Gallerist_Ramazan-Bayrakoglu_Dirimart_Istanbul_06.jpg"], "vids": [], "bodyp": ["\"1km\" — Ramazan Bayrakoğlu. Exhibition essay: Necmi Sönmez. Published by Dirimart, İstanbul, 2009. Translation: Bülent Çınar. ISBN 9786055815066. (Held in the Arter art library, Istanbul.) This catalogue is the official exhibition publication; Dirimart did not publish the show online and has since removed its pre-2010 archive from dirimart.com.", "In \"1km,\" Bayrakoğlu reproduces the image of the city — specifically İzmir — pointing both to urban space and to the symbolic weight the city carries. Transitional, moving images frame urban landscapes in satin, sewn with piko (rolled-hem) stitching; the compositions are built through collage. The works extend the artist's signature satin-sewn technique — earlier seen in his 9th Istanbul Biennial work \"Serbest Vuruş\" (Free Kick), a car sewn from satin, which cast a sharp eye on a constrained, subjective social perception of recent Turkish history. Bayrakoğlu draws on cinematic framing: film stills he selected from Haneke, Kieślowski, Angelopoulos and Tarkovski, rendered both in paint and in stitched fabric. Over the four years since the Biennial, he fused the dynamic of the city onto this cinematic perception. One painting clearly shows a road sign reading \"Agamemnon,\" invoking the city's mythological past as part of a shared human heritage. The show was met with strong interest and praise throughout its run.", "About the artist", "Born in Balıkesir, Turkey, in 1966, Ramazan Bayrakoğlu lives and works in Izmir. He earned a degree in painting from Dokuz Eylül University in Izmir in 1989, where he also teaches. Known for large-scale works in stitched, cut, and dyed fabric, his work is held in the permanent collection of Istanbul Modern."]}, {"title": "Ebru Uygun", "year": "2009", "cat": "Gallerist", "type": "Press release", "what": "Ebru Uygun’s ‘Time for a Dream’ — paintings poured, dripped and smeared by chance on unstretched linen.", "why": "The location for the canvas depends on the desired effect: the vertical positioning of the wall allows paint to drip and bleed haphazardly while the floor allows for pouring, smudging and smearing. Either technique relies on the rules of chance.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/1_2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/5-2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul/2009_Gallerist_Ebru-Uygun_Dirimart_Istanbul_07.jpg"], "vids": [], "bodyp": ["Uygun’s work, which is seen in the current exhibition Time for a Dream, is created violently. Uygun now paints onto the linen of unstretched canvas, placed either on the floor or the wall of her studio. The location for the canvas depends on the desired effect: the vertical positioning of the wall allows paint to drip and bleed haphazardly while the floor allows for pouring, smudging and smearing. Either technique relies on the rules of chance.", "About the artist", "Born in Istanbul in 1974, Ebru Uygun lives and works in Istanbul. She studied at Kingston University and received her degree from the University of Brighton. A painter, she has exhibited at Dirimart, Istanbul, among other venues."]}, {"title": "Creative Destruction (Yaratıcı Yıkım)", "year": "2009", "cat": "Artist", "type": "Statement", "what": "Her own work, “Creative Destruction,” at Outlet, Istanbul — gouache portraits of old, battered cars painted from photographs she took on the street.", "why": "The battered, wounded Renault 12 she found on a family trip to Yalova at eighteen — photographed on the street, then rebuilt in gouache over three months apiece, a whole series drawn to the dignity of the old and overlooked.", "who": "Artist", "imgs": ["SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/1_2009_Artist_Creative-Destruction_Outlet_Istanbul_10.jpg", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_01.png", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_02.png", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_03.png", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_04.jpg", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_05.jpg", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_06.jpg", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_07.jpg", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_08.jpg", "SA_WEBSITE/4-2009_Artist_Creative-Destruction_Outlet_Istanbul/2009_Artist_Creative-Destruction_Outlet_Istanbul_09.png"], "vids": [], "bodyp": ["Creative Destruction was presented at Outlet, Istanbul, in 2009 — a series of gouache portraits of old, battered cars, painted from photographs Secil Alkis took on the street.", "From the press coverage of the show: “Another part of the exhibition that caught my attention stands just inside the gallery entrance: portraits of old-model cars by twenty-one-year-old, İzmir-born Secil Alkis. Three years earlier, on a family trip to Yalova, she came across a battered, wounded old Renault 12; taken with its stance, she photographed it, and back in İzmir transferred it onto canvas in gouache. From then on, whenever she encountered such a cult car, she recorded it and set about drawing. She fusses over the details so much that a single car painting takes at least three months. That is how this exquisite series came about. I think we will hear Secil’s name more often — you’ll see.”"]}, {"title": "Borders Orbits", "year": "2008", "cat": "Artist", "type": "Statement", "what": "", "why": "", "who": "", "imgs": ["SA_WEBSITE/3-2008_Artist_Borders-Orbits_Siemens_Istanbul/1_2008_Artist_Borders-Orbits_Siemens_Istanbul_04.png", "SA_WEBSITE/3-2008_Artist_Borders-Orbits_Siemens_Istanbul/2008_Artist_Borders-Orbits_Siemens_Istanbul_01.jpg", "SA_WEBSITE/3-2008_Artist_Borders-Orbits_Siemens_Istanbul/2008_Artist_Borders-Orbits_Siemens_Istanbul_02.jpg", "SA_WEBSITE/3-2008_Artist_Borders-Orbits_Siemens_Istanbul/2008_Artist_Borders-Orbits_Siemens_Istanbul_03.png", "SA_WEBSITE/3-2008_Artist_Borders-Orbits_Siemens_Istanbul/2008_Artist_Borders-Orbits_Siemens_Istanbul_05.png"], "vids": [], "bodyp": ["The \"Borders Orbits\" competition which was organized for the first time in 2007 in order to support contemporary art and young artists by Siemens Sanat, one of the significant addresses of contemporary art, will be held this year for the sixth time. Applications for the \"Borders Orbits 11-12\" competition starts on 16 th January It is possible to take part both individually and with group actions in the competition which is open for all undergraduate and postgraduate students regardless of their field of study. The applicants can apply for the competition with the works and suggestions representing themselves. The applicants are required to fill in the application form for the competition on the web site of Siemens Sanat and then convey their application files to Siemens Sanat until 9th March 2012 Friday at 5 pm. Turan Aksoy, Canan Beykal, Mürteza Fidan, T. Melih Görgün and Dilek Winchester will be in the Jury of the competition which is organized to support young talents The artworks of the young artists which are decided to be exhibited after the \"Borders Orbits\" competition will meet their audience at Siemens Sanat as of May 2012. Detailed information, the specification of the competition and application form can be obtained from http://www.siemenssanat.com/ soon."]}, {"title": "Once A Worker", "year": "2008", "cat": "Artist", "type": "Statement", "what": "", "why": "", "who": "", "imgs": ["SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/1_2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_11.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_01.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_02.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_03.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_04.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_05.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_06.png", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_07.jpg", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_08.png", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_09.png", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_10.png", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_12.png", "SA_WEBSITE/2-2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul/2008_Award-Artist_Once-A-Worker_AKSANAT_Istanbul_13.png"], "vids": [], "bodyp": ["Organized by the Cultural Service - Painting and Sculpture Museums association with the support of Akbank Sanat, the 27th of Contemporary Artists Istanbul Exhibitions can be seen at Akbank Sanat until 31 July. Irina Batkova, Bart Van Der Heide and Adnan Yıldız are curating the exhibition this year. In the call for participation in the Contemporary Artists Exhibition this year, no restrictions on subjects, concepts or media regarding the works were made. The exhibition received approximately 150 entries this year. Among the works evaluated by the curators, the works of 9 artists were deemed suitable for exhibition. Artists participating in"]}, {"title": "Own Works — Cars / Bride & Groom", "year": "2008", "cat": "Artist", "type": "Statement", "what": "Her own early paintings, shown in İzmir&Istanbul — works about lived experience, memory and the banality of the everyday, after Walter Benjamin’s idea of “Erfahrung.”", "why": "Old cars painted for their outsider solitude, and brides and grooms standing at arm’s length on the day they should be happiest — images that aren’t hers yet carry traces of her, made to ask the questions she can’t answer. A refusal to get away from the past.", "who": "Artist", "imgs": ["SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/1_2008_Artist_Own-Works_Izmir_03.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_01.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_02.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_04.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_05.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_06.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_07.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_08.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_09.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_10.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_11.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_12.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_13.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_14.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_15.png", "SA_WEBSITE/1-2008_Artist_Own-Works_Izmir/2008_Artist_Own-Works_Izmir_16.png"], "vids": [], "bodyp": ["Walter Benjamin’s concept of “Erfahrung” — intrinsic experience, the residue of a past experience, distinct from the experience of the quotidian — seems to me a concept descriptive of my work. What interests me is the feeling of a lived experience and its banality, the kind found in the dusty photographs between the pages of an old book. These help build a bridge between today and the past, through a density that surpasses the everyday. Occupying myself with these seemingly sincere images of synthetic moments feels like an obligation.", "It matters that the images I select reflect my point of view. I paint from family photographs, from photographs of people I do not know, and sometimes I paint cars. None of them belong to me, yet they all carry traces of me. I have two finished series: paintings of cars, and paintings of bride-and-groom photographs. I work in gouache on paper, between 35 × 50 and 40 × 50 cm — close to the original size of the photographs, so I can keep control of the painting. I do not paint the old cars because I like them; what interests me is their outsider status, their solitude. In the bride-and-groom paintings we face an arbitrary situation in which reality does not please: people who, on the day they are meant to be happiest, look distant and struggle to smile. Why does a person stand at arm’s length from the one they will share the rest of their life with? These are questions I cannot answer, so I make paintings that ask them.", "I integrate the moments stuck between the traditional and the modern that we live daily, applying them to the surface with a distant rigor. Window-shopping and moving from one second-hand store to the next is as much a part of my practice as taking photographs. I collect moments and details that matter to me and carry them into the present. I think I understand Proust better as I paint. My paintings depict a sense of not being able to get away from the past; at their center is a tidal wave between today and what came before."]}],ABOUT="Secil Alkis: The Core of My Creative Practice\n\nThe Beginning: Art as an Exploration of Memory and Time\n\nIn my early work as an artist, I was deeply inspired by Walter Benjamin\u2019s concept of \u201cErfahrung\u201d, or intrinsic experience; the residue of past experiences. This idea became a lens through which I explored the tension between the present and the past, particularly through the medium of painting. My work sought to capture the banality of everyday moments -often through family photographs, images of unknown people, and even cars- to reflect on how ordinary life intersects with memory, nostalgia, and loss.\n\nI painted not because I found these subjects aesthetically beautiful, but because of their outsider status. The old cars, which were often disregarded by their owners, symbolized a solitude and neglect that felt deeply connected to the larger experience of being human, one that is overlooked in favor of more polished or celebrated narratives. Similarly, in my bride and groom paintings, I explored the disconnect between the intended joy of the wedding day and the emotional distance I observed in the photographs. These images weren\u2019t just about capturing a moment, they were about questioning the assumptions we make about happiness, love, and tradition.\n\nThe focus on small, seemingly trivial moments was key to my work. It wasn\u2019t about changing the world but instead about reflecting on the small realities of life that often get overlooked but hold deep significance. These early works laid the foundation for my evolving artistic and curatorial practice.\n\nCuratorial Practice: Exploring the Intersection of Art and Society\n\nBy 2013, my career shifted towards curating exhibitions, which allowed me to continue exploring the relationship between art, society, and human experience, but on a much broader scale. I began to see curating not just as an act of organizing artwork but as a responsibility to tell a larger story, to make sense of the complexities of life through the lens of visual culture.\n\nOne of the pivotal exhibitions I curated was Social Animals, which brought together artists whose works engaged with social psychology, displacement, repression, and identity. The exhibition examined how our everyday experiences  -whether related to class, culture, or otherness-  are deeply embedded within broader social and cultural contexts.\n\nIn this exhibition, I saw a continuation of the themes that had been central to my artistic work: the exploration of the human condition, the banality of everyday life, and the psychological tension between what is seen and unseen, between the real and the imaginary. By bringing together artists like Mehmet Dere, Merve \u015eendil, Halil Vurucuoglu, and Lara Ogel, I sought to create a space where these complex issues could be explored, questioned, and reflected upon.\n\nCurating became my way of giving meaning to art, of shaping narratives that helped the audience reflect on their own lives and their own societal roles. It was not just about displaying art, but about using art as a vehicle for conversation; to question, challenge, and provoke new ways of thinking.\n\nFrom Art to Design: Curating Ideas in New Forms\n\nMy work has always been about curating meaning; whether through paintings, exhibitions, or written reflections. As my career evolved, I recognized that the core of my practice wasn\u2019t limited to art. It was about creating experiences, and these experiences could be shaped through design just as much as through curating art or writing.\n\nThe shift from art to design was not a break from my previous work, it was an expansion of my curatorial philosophy. The creative direction of 10:AM Factory became my new canvas. The process of designing collections wasn\u2019t so different from curating an exhibition. I was still selecting elements, shaping narratives, and creating experiences that spoke to the world around me.\n\nBut now, instead of simply curating art, I was curating products; fashion pieces that would tell a story, evoke emotion, and reflect the cultural landscape I was living in. Every design, every collection became a curated experience, just like my exhibitions. Through 10:AM Factory, I expanded my role as a curator beyond the gallery space, bringing my curatorial mindset into the realm of fashion and brand building.\n\nCreative Direction: Curating Culture Through Fashion\n\nAs Creative Director of 10:AM Factory, I was not just designing clothes; I was creating a brand that curated culture. 10:AM Factory is more than just a fashion brand; it\u2019s a narrative, a cultural commentary. The pieces we create are not simply garments, but expressions of ideas, emotions, and stories that reflect the world we live in.\n\nWhat I have learned through my experience in curation  -whether in the gallery or through art consultancy-  is that storytelling is the key to everything. In fashion, it\u2019s not just about making beautiful clothes; it\u2019s about crafting a narrative that connects with people, that speaks to the times, and that resonates on a personal level. Fashion, like art, is a vehicle for storytelling, and my work in fashion is an extension of my curatorial work in the art world. It\u2019s about finding the right elements, bringing them together, and creating something meaningful.\n\nWriting: Another Form of Curation\n\nAs my career evolved, I began writing, not as a departure from my curatorial practice, but as another medium for curating ideas. Through my Substack and Cosmopolitan articles, I continue to shape stories that reflect on identity, culture, and contemporary life. Writing became my way of engaging with an audience in a more personal way, reflecting on the same themes I explored in my art and curatorial work.\n\nWriting, like fashion, is about creating narratives that resonate with people. I focus on emotional, social, and cultural themes, offering reflections that are personal, yet universally relatable. It is another way for me to curate; not just experiences, but ideas that connect with the human experience in meaningful ways.\n\nThe Core of My Practice:\n\nA Continuous Dialogue Between Art, Culture, and Identity\n\nAt the heart of everything I do -whether in art, curating, or writing- there lies a deep, unyielding interest in the human condition. My work has always been about exploring how we live, what we value, and how we reflect on our place in the world. It\u2019s about telling stories  -through paintings, exhibitions, and words-  that reflect the complexity, the contradictions, and the beauty of modern life.\n\nWhat ties everything together is a curatorial mindset. As an artist, I curated my own visions of memory and experience. As a curator, I created environments that allowed others to explore similar questions about identity, belonging, and social behavior. Now, as a Creative Director, I continue this process; curating ideas, shaping narratives, and telling stories through products that reflect the culture we live in. 10:AM Factory is just another expression of this, where fashion, art, and culture collide to create something that goes beyond the surface and resonates on a deeper level.\n\nMy journey has never been about simply shifting careers; it has been about evolving my ability to tell meaningful stories in new ways; to understand and reflect on the complexities of the world and to share those reflections with others, whether through paintings, exhibitions, or writing.\n\nConclusion: The Continuation of Curating Ideas\n\nAt the heart of my practice is the act of curating ideas. Whether it\u2019s through art, fashion, or writing, I am always selecting the right elements, shaping narratives, and creating experiences that speak to the world around me. Each tool I use  -whether paint, fabric, or words-  is simply a different way to express the same ideas. The shift from art to design to writing has been about expanding my ability to tell stories in meaningful ways and curate the human experience.",MIND="I wanted to build an archive to remember myself first, then to express my identity to more people.\n\nWhy does this site look like a Mac desktop? Because being creative does not have to mean hard to read. That's something we've lost lately, or at least that's how I feel about the creative world around us. More aesthetic, less meaning. So this website won't hand you an aesthetic; it lets you read my mind from the first row. I wanted you to feel like you're looki
