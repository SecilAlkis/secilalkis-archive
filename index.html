ng at something in your own archive, on your own desktop.\n\nI'm a creative director, yes, but my priority is never the aesthetic first, it's always the idea. Your idea needs to be creative first, not the font you choose. If you don't have the idea, and if you don't know how to deliver it in the best way, then the work is just a meaningless graphic to me. Maybe the new expectation is: easy to read, beautiful to look at, and you don't even have to think about it. If that's what you want, great, but it's not me, and honestly I don't respect it. I don't respect anything that doesn't give me something.\n\nThe other day I was watching Robby Hoffman, I love her, and she said something about flowers: what do you expect from a flower? They don't need to do anything, because they're gorgeous. And I agree, they're beautiful, and most of them smell amazing. But that kind of beauty needs no approval; it's simply there. I think everyone knows what I mean when I say I don't respect a beautiful project with no meaning, no subtext. My life is a subtext, that's how I live, that's how I communicate. So I hope you spend some time in my life and come to understand how my mind works, because that's the whole point.\n\nI've always had a hard time defining what I do, it can be confusing for a lot of people, even for my visa application. I've been a gallerist, a contemporary art magazine editor, a writer, a creative director, a curator, and it all started with my education and career as an artist. That's where it began. If you go back to 2008, look at my artworks and read my statement, you'll understand me better. I'm not telling you to do this or that, I'm just giving you the roadmap to understand me.\n\nAnd you'll see that the material doesn't matter. How you write, how you curate a show, at some point that doesn't matter either. It's always what you say; what you keep telling us, over and over. I know it sounds strange to say out loud, but now, if I have an idea, I can write it, I can make a book, start a magazine, I can build a show around it, I can even start a business, and it doesn't matter what the product is. So after more than twenty years in contemporary art, since 2005, I now know how to deliver a project from start to finish from one tiny idea.\n\nAnd the funniest thing in my career: I won the award from Aksanat, chosen by Irina Batkova, Bart Van Der Heide and Adnan Yildiz, the most prestigious award in Turkey, especially for young artists. I was chosen the most promising artist of the year. And then I stopped painting. My friends made fun of me, \"you left when you were on top of the mountain.\" That's a little sad, but not as much as it sounds when I look at it now. I wanted to explore the world I would hang my art in. I needed to understand that part first, I needed to know how to ask the right question at the right time and how you can do the work without even knowing anything about that business you are getting into, and like every artist, I needed to take care of myself. So my gallerist life began in 2009, with an artist's mind, and the rest you'll see: what I've done, and what I'm still doing.\n\nI know the archive can seem all over the place. But if you dig in, you'll see that every project, every move I made, or asked an artist to make, is always about the details of human behavior: how contemporary life affects us, how tiny personal touches can move the bigger world and our own comfort in this messy world. One glimpse can change our day. One smell of a beautiful flower can make us smile. In the work you'll see the determination of a single mind, but underneath it, you'll also see an incurable romantic who still has hope for a lot of things in this world.\n\nOne thing you need to know, that defines my personality. My left and right brain work simultaneously and that's the best part of me. So everything has to be equally aesthetic and meaningful, that's why I say I am the person who combines art and creative with business, I am that bridge.\n\nAfter I'm done with this site, I feel like I've finally finished my first chapter, and my first 20 years in art was a draft. I learned a lot, I did a lot, and I'm ready for the real project now. I hope to meet more like-minded people, because I know I can't do this alone. Let's dare to shift the culture around the neighborhood.\n\nThank you for being here.\nSecil",MANUAL="How to read this site.\n\nThis is built like a Mac desktop, on purpose. Being creative should not mean hard to read, so there is nothing to decode. Click the folder and the archive opens like Mac Finder, in columns. Pick a category on the left, an entry next, and the work opens on the right. Images open big as a slideshow. Newest first. Nothing to sign up for.\n\nEvery entry answers three things, and once you know them the whole archive reads as one mind:\n\nWho. My role. What I actually did.\n\nWhat. The thing itself, the idea, the show, the collection, the piece.\n\nWhy. Why it mattered, in one line.\n\nRead those three, entry after entry, and the pattern shows itself. Across galleries, magazines, writing and a brand, it is always the same practice. I notice what people pass by, and read it as evidence of who we are.",CONTACT=[["Email", "secil@10amfactory.com", "mailto:secil@10amfactory.com"], ["Instagram", "@secilalkis", "https://www.instagram.com/secilalkis/"], ["Substack", "secilalkis", "https://substack.com/@secilalkis"], ["LinkedIn", "Secil Alkis", "https://www.linkedin.com/in/secil-alkis-6910a25a/"], ["10:AM", "10amfactory.com", "https://www.10amfactory.com"]];
const FOLDER=`<svg viewBox="0 0 24 18" width="14" height="11"><path d="M1 4c0-1 .8-2 2-2h6l2 2.3h10c1.1 0 2 .9 2 2V15c0 1.1-.9 2-2 2H3c-1.1 0-2-.9-2-2V4z" fill="#111"/></svg>`;
const CATS=["All","Creative Director","Editor","Writer","Gallerist","Artist"];
let cat="All",sel=null;

function folderName(e){if(e.name)return e.name;if(e.imgs&&e.imgs[0]){var s=e.imgs[0].split('/')[1];return s.replace(/^\d+-/,'').replace(/^(19|20)\d\d_/,'');}return e.title;}

function setCat(x){cat=x;sel=list.call?null:null;sel=null;render();if(!sel){sel=list()[0];render()}}

 const c1=document.createElement('div');c1.className="col";c1.id="cL";c1.style.flex="0 0 "+W.l+"px";c1.style.minWidth=W.l+"px";
 list().forEach(e=>{const r=document.createElement('div');r.className="row"+(sel===e?" sel":"");
  r.innerHTML=`<span class="ficon">${FOLDER}</span><span class="nm3">${esc(folderName(e))}</span><span class="yr" style="color:#b6b6b2;font-size:11px">${e.year}</span>`;
  r.onclick=()=>{sel=e;render()};c1.appendChild(r)});
 cols.appendChild(c1);
 if(sel){cols.appendChild(mid(sel));cols.appendChild(media(sel))}
 makeRZ();document.getElementById('path').textContent="the mind"+(sel?"   ›   "+esc(sel.title):"");if(window.instgrm&&window.instgrm.Embeds)window.instgrm.Embeds.process()}
function fld(k,v){return v?`<div class="fld"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`:""}
function mid(e){const d=document.createElement('div');d.className="col mid";d.id="cM";d.style.flex="0 0 "+W.m+"px";d.style.minWidth=W.m+"px";
 d.innerHTML=`<div class="artist">${esc(e.title)}</div>`+fld("Who",e.who)+fld("What",e.what)+fld("Why",e.why)+fld("Year",e.year)+(e.pdf?'<div class="fld"><div class="k">'+(e.pdflabel||'PDF')+'</div><div class="v"><a class="pdflink" href="'+e.pdf+'" target="_blank" rel="noopener">Read the '+(e.pdflabel||'PDF').toLowerCase()+'</a></div></div>':'');return d}
let GAL=[],GI=0;
function media(e){const d=document.createElement('div');d.className="col media";let h="";if(e.ig){h+='<blockquote class="instagram-media" data-instgrm-permalink="'+e.ig+'" data-instgrm-version="14" style="max-width:540px;width:100%;margin:0 0 14px"></blockquote>';}
 const t=(e.type||'').toLowerCase();const set=true;
 e.vids.forEach(v=>{h+=`<video src="${enc(v)}" controls style="width:100%;margin-bottom:12px"></video>`});
 if(e.imgs.length){
  if(set){h+=`<div class="pile">`+e.imgs.map(im=>`<img src="${enc(im)}" onclick="openLB(this)" loading="lazy" alt="${esc(e.title)}, Secil Alkis">`).join('')+`</div>`}
  else{GAL=e.imgs;GI=0;h+=`<div class="stage"><img id="big" src="${enc(e.imgs[0])}" onclick="openLB(this)" alt="${esc(e.title)}, Secil Alkis">`+(e.imgs.length>1?`<div class="arr l" onclick="step(-1)">‹</div><div class="arr r" onclick="step(1)">›</div>`:``)+`</div>`}}
 if(e.bodyp&&e.bodyp.length){h+=`<div class="prlbl">${esc(e.type||'')}</div><div class="press ${t==='interview'?'qa':''}">`+e.bodyp.map(p=>`<p>${esc(p)}</p>`).join('')+`</div>`}
 d.innerHTML=h;return d}
function step(dr){if(!GAL.length)return;GI=(GI+dr+GAL.length)%GAL.length;var b=document.getElementById('big');if(b)b.src=enc(GAL[GI])}
let LB=[],LBI=0;
function openLB(img){const m=img.closest('.media');LB=Array.from(m.querySelectorAll('img')).map(x=>x.getAttribute('src'));LBI=LB.indexOf(img.getAttribute('src'));document.getElementById('lbi').src=LB[LBI];document.getElementById('lb').classList.add('on')}

function page(w){document.body.classList.remove('in');document.body.classList.add('pg');
 const t={mind:'The Mind',about:'About',contact:'Contact',manual:'Manual'}[w];

 if(w==='contact'){h+=`<div class="pagebody clist">`+CONTACT.map(c=>`<a href="${c[2]}" target="_blank">${c[0]} <span>${c[1]}</span></a>`).join('')+`</div>`}
 else{const s=w==='about'?ABOUT:w==='manual'?MANUAL:MIND;h+=`<div class="pagebody">`+paras(s).map(p=>`<p>${esc(p)}</p>`).join('')+`</div>`}
 document.getElementById('pc').innerHTML=h}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLB();home()}var on=document.getElementById('lb').classList.contains('on');if(on){if(e.key==='ArrowRight')slide(1);if(e.key==='ArrowLeft')slide(-1)}});

function makeRZ(){var cols=document.getElementById('cols');cols.querySelectorAll('.rzh').forEach(function(x){x.remove()});
 addRZ(cols,'l',W.l);if(sel)addRZ(cols,'m',W.l+W.m);}
function addRZ(cols,key,x){var h=document.createElement('div');h.className='rzh';h.style.left=x+'px';
 h.addEventListener('mousedown',function(ev){ev.preventDefault();var sx=ev.clientX,sw=W[key];
  function mv(e){W[key]=Math.max(160,Math.min(760,sw+e.clientX-sx));setC('cL',W.l);setC('cM',W.m);cols.querySelectorAll('.rzh').forEach(function(hh,i){hh.style.left=(i===0?W.l:W.l+W.m)+'px';});}
  function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
 cols.appendChild(h);}
(function(){var f=document.getElementById('theFolder');if(!f)return;var dn=false,mv=false,sx=0,sy=0,ox=0,oy=0;
 f.addEventListener('mousedown',function(e){dn=true;mv=false;sx=e.clientX;sy=e.clientY;var r=f.getBoundingClientRect(),p=f.offsetParent.getBoundingClientRect();ox=r.left-p.left;oy=r.top-p.top;e.preventDefault();});
 document.addEventListener('mousemove',function(e){if(!dn)return;var dx=e.clientX-sx,dy=e.clientY-sy;if(!mv&&Math.abs(dx)+Math.abs(dy)>4)mv=true;if(mv){f.style.left=(ox+dx)+'px';f.style.top=(oy+dy)+'px';f.style.transform='none';}});
 document.addEventListener('mouseup',function(){if(dn&&!mv)openF();dn=false;});})();
