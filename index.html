ALAN_Istanbul_04.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_06.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_07.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_08.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_09.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_11.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_12.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_13.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_14.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_16.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_17.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_18.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_21.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_22.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_24.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_26.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_27.jpg", "SA_WEBSITE/45-2013_Gallerist_Social-Animals_ALAN_Istanbul/2013_Gallerist_Social-Animals_ALAN_Istanbul_28.jpg"], "vids": [], "bodyp": ["In the second half of the 20th century, societies that had begun to develop witnessed a number of organized crimes. Some were cultural; some were verdicts handed down by the broken scales of justice itself; and some were entirely emotional. Even the conflict in Mussolini's Italy or Hitler's Germany could be told through an aesthetic revolution — the right and the left imposing their own aesthetic \"preferences\"; the destructive, defamatory attitude, that is, censorship; the resistance to censorship, that is, DADA; the dynamics forming on the side of rupture and fragmentation, that is, the AVANT-GARDE.", "Today, aesthetics — the language through which art speaks and defends itself — could not justify itself in the third world. Seen from another angle, the problems blocking our path are again justice, again crime, and in fact verdicts that artists, who are also citizens, should not have to wear. Which third world? The places where the artist, like other \"professions,\" can find no moral, material, or union support — societies that see the artist's stance as merely a way of life, and cannot accept that the work is as vital and essential as a thinker's.", "Artists in the exhibition", "Mehmet Dere, Merve Şendil, Halil Vurucuoğlu, and Lara Ögel, among others."]}, {"title": "Sanctity And Despotism Of Progress", "year": "2013", "cat": "Gallerist", "type": "Press release", "what": "A five-artist show on lives enslaved to the idea of progress, curated by Emre Zeytinoğlu.", "why": "Lives run by the idea of progress — the cost nobody counts.", "who": "Gallery Director — ALAN İstanbul", "imgs": ["SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/1_2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_15.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_01.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_02.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_03.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_04.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_05.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_06.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_07.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_08.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_09.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_10.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_11.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_12.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_13.jpg", "SA_WEBSITE/44-2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul/2013_Gallerist_Sanctity-And-Despotism-Of-Progress_ALAN_Istanbul_14.jpg"], "vids": [], "bodyp": ["ALAN İstanbul will be hosting the exhibition “Progress”, starting on January 4th, 2013. The exhibition, fashioned after an article written by Emre Zeytinoğlu called “Sanctity and Despotism of Progress”, which was printed in “Duvar” magazine, features artists such as: Murat Germen, Borga Kantürk, Erol Eskici, Melih Görgün and Vahit Tuna.", "In this exhibition the artists try to interpret a life that has become a slave to the idea of “progress” and present the twisted social occurrences stemming from this obsession with open imagery. Murat Germen takes on the theme of “urban transformation” in terms of the individual, the authority and institutions on a critical level, while Melih Görgün dwells on the issues of “immigration” and “naturalization” in the same critical manner. Borga Kantürk works on the theme of “information of progress”, and uses everyday devices of information to prove that every day, memories are lost and justice is severely affected. Erol Eskici establishes a link with the themes of “progress” and “information” and, labeling this under encyclopedic information, turns it into something with ultimate and legitimate. Vahit Tuna, on the other hand, places a vacuum cleaner which he deems to be “dirty and arrogant” in the middle of the gallery, and muses on the similarities between the “upright” posture of the object and the indispensability of the “progressive” mindset.", "Curated by Emre Zeytinoğlu, the exhibition will be open until February 2nd, 2013.", "Artists in the exhibition", "Murat Germen, Borga Kantürk, Erol Eskici, Melih Görgün, and Vahit Tuna. Curated by Emre Zeytinoğlu."]}, {"title": "Bahar Oganer", "year": "2013", "cat": "Writer", "type": "Article", "what": "Bahar Oganer solo show at Dirimart.", "why": "The city woman painted stepping out of her own frame — freeing the image, and freeing the viewer with her.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/43-2013_Writer_Bahar Oganer_WARHOLA/1_2013_Writer_Bahar Oganer_WARHOLA_01.png", "SA_WEBSITE/43-2013_Writer_Bahar Oganer_WARHOLA/2013_Writer_Bahar Oganer_WARHOLA_02.png"], "vids": [], "bodyp": ["Bahar Oganer's works consist of the order of life, rather than artificial fiction. This reality does not mean that Bahar Oganer simplifies her process of creation; it implies that she has a style in creating her works. — Secil Alkis", "In her new series titled Dreamland, Oganer paints the young female figure she uses in her self-portraits — her back turned to the viewer, symbolizing herself — within a new spatial dimension. The compositions the artist once built in the closed or open spaces of the city give way to the countryside, to nature. Taking her figure out of the city's chaotic surroundings, she leaves it in a landscape painted in a colorist manner, in a search for a primal liberation and purification of the self.", "The artist paints the modern woman figure — whom we have until now seen as a city dweller — stepping outside her own boundaries, within a composition to which she does not really belong. As she frees the image, she also frees the viewer from captivity.", "Using the photograph as a construction and a starting point, Oganer presents her own reality to the viewer through color, nature's most fundamental element. The simplicity created by the nature she paints reflects both herself and the transparency she builds between herself and the viewer.", "As in her previous series, the colorful and striking images she placed in the background now give way to monochrome forms with strong shading. As before, while the viewer looks at the section framed by the figure, in the 'Dreamland' series they also come to command a space that is at once timeless and boundless. This time the focus is not the figure itself or its background, but the painting as a whole.", "Bahar Oganer was born in Ankara in 1980. She completed her undergraduate degree in the Painting Department of the Fine Arts Faculty at Dokuz Eylül University, and joined the art specialization program on scholarship at the Cité Internationale des Arts. Solo exhibitions: Secret Garden (with Ozan Oganer), Alan Istanbul, 2011; Crystal, Dirimart, 2008; Dream, Dirimart, 2008. Selected group exhibitions: Encounters — Turkish Contemporary Art in Korea, Seoul, 2012; Who Left Behind, Plevne/Ankara, 2012; Exhibition of Turkish Contemporary Art by Various Artists, ArtSpace London, 2012; Turkish Contemporary Art at Close Proximity, New York, 2010."]}, {"title": "Murat Pulat", "year": "2013", "cat": "Writer", "type": "Interview", "what": "Murat Pulat’s “Surface Sequence,” his painted film-still portraits, shown in the Netherlands.", "why": "On the eve of his first show outside Istanbul — “Istanbul and New York are just cities, the sum of the perspectives on them” — a painter who treats the canvas as no different from a wall.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/42-2013_Writer_Murat-Pulat_WARHOLA/1_2013_Writer_Murat-Pulat_WARHOLA_01.png", "SA_WEBSITE/42-2013_Writer_Murat-Pulat_WARHOLA/2_2013_Writer_Murat-Pulat_WARHOLA_03.png", "SA_WEBSITE/42-2013_Writer_Murat-Pulat_WARHOLA/2013_Writer_Murat-Pulat_WARHOLA_02.png", "SA_WEBSITE/42-2013_Writer_Murat-Pulat_WARHOLA/2013_Writer_Murat-Pulat_WARHOLA_04.png"], "vids": [], "bodyp": ["Secil Alkis: You've had 3  solo exhibitions so far, and your fourth solo show will take place in New York in January. How is the intellectual and practical process of working on a show?", "Murat Pulat: We're talking about a presentation imprisoned between the walls... In the process of preparing for an exhibition, you have to go beyond the specific gallery space and think also about all the other things that encapsulate the exhibition. I really don't know yet, how it works.", "S.A.: We'll be able to see most of your recent work in the New York exhibition. You've utilized more illusions and color transitions in some of the works. Can we talk about your recent works?", "M.P.: I don't think the surface of a painting is different from that of a wall. As I'm busy working on other things, everybody thinks and talks about the paintings. For example I'm trying to grow a lemon tree. I inhale the leaf and it makes me sad. For me, actually, painting is one of the pieces of that make up the whole. I try to clear my life of the things that suppress us, as much as I can; this works very well. These days, people have begun to play with imagery. Images are really effective; it's actually what I want to show people, share with them; before and after the exhibition. What they call virtual, effects the human psychology and its sociological structure. Masses take part in art even though they are not themselves artists; some don't even think about it. The people working with imagery are thus closer to us through the utilization of art in this context, through its intervention on its utilization.", "S.A.: Your first three shows were in Istanbul. This is the first time you're exhibiting in another city. What does this mean to you?", "M.P.: Istanbul and New York are just cities. What are cities? They are the sum of the perspectives on them. From which perspective should one look at Istanbul? I wanted to walk around like Orhan Veli; really. To feel the city, to walk around like that. To take part in the city somehow; no matter how passive or active. One day a man said that he saw the sea and then he saw other things in it. Why am I telling this, because I feel responsible for the sum of various things. What I want to do is not to make science out of it, but to create other situations, to come up with other perspectives.", "As I said, to leave is just a part of it. The thing is, we all get up in the morning an do things. And surely I impose more work to a person who gets up before me and does things. A memory about my mother; for example as I was a student, our apartment was very close to my school. Everybody would get up early in the morning, but for me there was something else involved. I found it problematic to get up early as I would get very tired during the day and spend my time at school which I thought was very limited. Despite all this, I would get up the moment they would touch me. I didn't know why I did this. What was the thing that made me get up even though I didn't want to?", "For me actually, the early situation or rather an instinct, and maybe the pre-experiment period is to solve this problem. I surely impose more work to who gets up before I do, and does things. Everything would be easy if one more person were to get up. Somebody else will pick up the glass and come. It will be faster and no one will be late for school; and then things will follow after that. I'd like to see things from a collective perspective. What you come upon in the street; let's say a beggar's idea, for example the merge of a coffee shop in the corner and the florist; all these are the combination of ideas. We can say it's how life is, but it's not, it's something that just becomes a part of us continuously.", "S.A.: When you consider both the context and the commercial part, Istanbul and New York are two very different cities, how important is this for you?  The usual example: when we make an exhibition here, it's very difficult to have somebody write an article about it, on the other hand, the simplest exhibition in New York is accompanied by many articles.", "It's a serious world, it's a market that's criticized quite often...", "M.P.: As Van Gogh chased crows in the fields, he would always say: ”i have to go, I need to catch up with something”. Concerning where he's going, he says that “crows seem to be following me”. He works under the sun so much that he almost paints the whole world. He's left standing with his canvas in his hand. This situation is actually the same as the loop that we call the market. Another situation showing the situation of Van Gogh. These can sound crazy but all this has something to do with the world. To go somewhere, to move. It's not just New York that's my choice; for example it's similar to traveling to Izmir.", "S.A.: Contemporary art and the exhibition of works demand a comprehensive perspective and its spatial context beyond that. How do your works relate to one another and the space?", "M.P.: I actually know that some of my works relate to space. Something important for me has happened. I had chosen a work to be exhibited at an auction. It's a still from an Hitchcock movie (surprised woman), there was a scene in which a woman is screaming in the bath. A photo taken during the exhibition of this painting was more important than the work itself. It was like the scream of a woman who was complaining about the current situation. Thus the work began to work by itself.", "S.A.: Is there such a thing in your New York exhibition?", "M.P.: There was this movie “Mean Streets” starring Robert de Niro; and also “Breathless”... An image from the past can be inclusive. This name includes a few directors, the directors that came after them and even other things. What I'm trying to say is, of course America was there, Hitchcock was there. Some just see the movie, but there's something which is the subject of intervention; some call it the motive or a portrait made up of numbers and letters. Here is a movie that's much older than the work itself, but it becomes a part of the New York exhibition the moment it touches. For example the work I created for the gallery window is no more a painting for me, it's a collection of letters within the emptiness that encapsulates the space. Something is turning into a wall there. My imagery is the walls of that gallery.", "S.A.: Can we state is this way? The important thing is: after you create the works, they begin to live and work the moment they're shown and have a connection with the viewer.", "M.P.: It works here as well. I'm talking about a simple thing in my life. I sometimes put my paintings in my bedroom. One day when I woke up, I saw something screaming. I jumped out of the bed. The moment I open my eyes, right in front of me is a screaming woman that looks like a real portrait because of the perspective. What we call imagery is nothing other than the ideas that we see in daily life. The more perspectives I have, the more i see. Images are a kind of simulation, but we shouldn't be afraid of them.", "S.A.: Art is now much more complex than it used to be; on the one hand there are more opportunities, on the other hand young artists experience a lot of tension and tiresome processes. As an artist whose work is well known, what did you experience? What are your suggestions to new artists?", "M.P.: A few weeks ago, a group of tourists tried to take a photo in the train in the Haydarpaşa Station, and three of them were struck by the high-voltage line. This event is unfortunately the result of the lack of care of authorities.", "This is actually a work, an effort. The more we try, the more we'll make our lives better. This is valid for a manager in a train station, or a shipyard. One needs to look at it from a complex perspective.", "I don't only want to talk about artists. We can really make this the rationale of art. But it can also be its tension. In short; it has to resist. Resist. If they care one bit about their freedom…", "The word “resistance” has become a little too popular in Turkey, I think concepts die when they become popular. Like Che Guevara posters. Empty.", "S.A.: You say that images lose their effect as they become popular. Isn't Marylin Monroe one of the most popular images of the world? We see her often in your works, I'm really curious why.", "M.P.: Sometimes the image itself doesn't represent its own sub-connections. I saw Marylin for the first time when I was a child. I felt she became a part of my inner identity. This may sound too assertive, but it's as simple as that. This is now a mixture that depends on the outer world within the first species. It's not different from how sun causes the skin to become darker. When we see a movie, we don't remember many things from a million scenes. Why is it that some images remain, even though we forget other things? Why do some things cause us to shiver in the night, begin to remember with them, combine with them, why do they remind us of being afraid of the dark? This is a sensitive area. All the things you come upon as you dream... If you become aware of it, you can change it. The moment you understand it, you begin to come up with ideas. I don't attempt to put something out, but let's just say that some things combine, they cause each other to multiply and transform the image; in other words hybrid images emerge."]}, {"title": "Issue02", "year": "2013", "cat": "Editor", "type": "Issue", "what": "WARHOLA Issue 02 — art and investment, the year’s first exhibitions, and a review of the Istanbul Design Biennial.", "why": "To aid a scene in days of growing art-consciousness and investment: reporting the year’s first exhibitions, reviewing the Istanbul Design Biennial and the art fair, and staying sincere about the “shady” area of the market.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/1_2013_Editor_WARHOLA_Issue02_Cover.png", "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2_2013_Editor_WARHOLA_Issue02_01.png", "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2013_Editor_WARHOLA_Issue02_02.png", "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2013_Editor_WARHOLA_Issue02_03.png", "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2013_Editor_WARHOLA_Issue02_04.png", "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2013_Editor_WARHOLA_Issue02_05.png", "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2013_Editor_WARHOLA_Issue02_06.png"], "vids": [], "bodyp": [], "pdf": "SA_WEBSITE/41-2013_Editor_WARHOLA_Issue02/2013_Editor_WARHOLA_Issue02_doc_01.pdf", "pdflabel": "Issue"}, {"title": "Turgut Yuksel", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Turgut Yüksel’s “Martial Arts” at ALAN — black-and-white silhouettes, fear and the system.", "why": "The self-defence we invent against a system that wants us to become zombies — people reduced to silhouettes, holding their ground as living still-lifes.", "who": "Gallery Director — ALAN İstanbul", "imgs": ["SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/1_2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_12.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_01.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_02.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_03.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_04.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_05.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_06.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_07.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_08.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_09.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_10.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_11.jpg", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_13.png", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_14.png", "SA_WEBSITE/40-2012_Gallerist_Turgut-Yuksel_ALAN_Istanbul/2013_Gallerist_Turgut-Yuksel_ALAN_Istanbul_15.png"], "vids": [], "bodyp": ["We kept longing for the fears, like guests we consider the dearest. System is a tyrant forcing you to live under its own rules. If we don’t obey we wait for the fear we were thought, with major discipline, to come and to start knocking on our doors, one by one. We would be; homeless, unemployed and hungry. Our neighbor next door could kill us. Thieves can chop us up. Communism comes, religion can be lost, motherland can be separate, our purity gets ruined… While we wait for the fear, restless, we yet continue to develop our own martial arts in order to avoid becoming zombies; perhaps what the system desires us to be… “I’m going to remind myself of Adorno’s saying; that in an environment of such absolute reification, surrealist installations were considered authentic works of still-life. In a time where capitalism’s commoditization-reification abilities are deeper and maturely magnificent; can’t we say that Turgut Yüksel, on a level image platform, assembles meanings beyond images and produces works of still-life that create obstacles in the spirit of our time? In this era of individuality and identity, start to think about how people consist only as silhouettes…” (Tanıl Bora) About the artist Turgut Yüksel, born in Denizli, Turkey, in 1967, lives and works in Istanbul. A writer, designer, and illustrator known for working in black and white, he has also written for the newspaper Radikal."]}, {"title": "Issue01", "year": "2012", "cat": "Editor", "type": "Issue", "what": "The first issue of WARHOLA, the contemporary art magazine Secil Alkis founded and edited in Istanbul.", "why": "The opening move: proof that contemporary art in Istanbul deserves a magazine that takes it seriously.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/39-2012_Editor_WARHOLA_Issue01/1_2012_Editor_WARHOLA_Issue01_page_01.jpg", "SA_WEBSITE/39-2012_Editor_WARHOLA_Issue01/2012_Editor_WARHOLA_Issue01_page_02.jpg", "SA_WEBSITE/39-2012_Editor_WARHOLA_Issue01/2012_Editor_WARHOLA_Issue01_page_03.jpg", "SA_WEBSITE/39-2012_Editor_WARHOLA_Issue01/2012_Editor_WARHOLA_Issue01_page_04.jpg", "SA_WEBSITE/39-2012_Editor_WARHOLA_Issue01/2012_Editor_WARHOLA_Issue01_page_05.jpg", "SA_WEBSITE/39-2012_Editor_WARHOLA_Issue01/2012_Edit ative-Director_WARHOLA_Istanbul/4_2012_Creative-Director_WARHOLA_Istanbul_04.png", "SA_WEBSITE/38-2012_Creative-Director_WARHOLA_Istanbul/5_2012_Creative-Director_WARHOLA_Istanbul_05.png", "SA_WEBSITE/38-2012_Creative-Director_WARHOLA_Istanbul/6_2012_Creative-Director_WARHOLA_Istanbul_06.png", "SA_WEBSITE/38-2012_Creative-Director_WARHOLA_Istanbul/7_2012_Creative-Director_WARHOLA_Istanbul_07.png"], "vids": [], "bodyp": []}, {"title": "Year of Cooperation", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "An eight-artist show at Broadway 1602, New York, in cooperation with Hotel, London, including Victor Burgin and Turner Prize winner Duncan Campbell.", "why": "Two cities’ galleries pooling artists — cooperation as both subject and method.", "who": "Gallery assistant — Broadway 1602", "imgs": ["SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/1_2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_01.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2_2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_04.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/3_2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_05.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_02.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_03.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_06.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_07.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_08.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_09.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_10.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_11.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_12.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_13.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_14.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_15.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_16.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_17.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_18.jpg", "SA_WEBSITE/37-2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork/2012_Gallerist_Year-Of-Cooperation_Broadway-1602_NewYork_19.jpg"], "vids": [], "bodyp": ["Year of Cooperation was a group exhibition at Broadway 1602, New York. Its title loosely evoked the fact that 2012 was the United Nations’ International Year of the Cooperative — a call for an inclusive model of working together toward common advantage. The curators intended it as a provocation rather than an illustration: the show gathered artists whose sensibility does not simply amplify the social and political but takes a subtle, even formalistic turn in expressing its own inherent ethics and principles.", "The exhibition drew on the radical historian Ivan Illich (1936–2002) and his 1973 book Tools for Conviviality, which argued for a multidimensional balance of human life — “the shared insight of people that they would be happier if they could work together and care for each other.” Illich reminds us that our human constitution requires us to question ends — who we are, and how to live a good life, individually and collectively — not merely to pursue means.", "In Illich’s words: “I chose the term ‘conviviality’ to designate the opposite of industrial productivity… individual freedom realized in personal interdependence and, as such, an intrinsic ethical value.”", "The show considered this state of consumer modernity from the early 1970s to the present, gathering works that explore social, emotional, and political consciousness through varying degrees of abstraction and post-media conceptualism — among them Mike Bouchet’s Do It Yourself Dissociative Identity Disorder (2011)."]}, {"title": "robbinschilds", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "robbinschilds’ New Commission — a four-channel video installation and six live performances rewriting place and time.", "why": "Bodies rewriting place and time across four screens — space as something performed.", "who": "Curatorial assistant — Art in General", "imgs": ["SA_WEBSITE/36-2012_Gallerist_robbinschilds_Art-In-General_NewYork/1_2012_Gallerist_robbinschilds_Art-In-General_NewYork_01.jpg", "SA_WEBSITE/36-2012_Gallerist_robbinschilds_Art-In-General_NewYork/2012_Gallerist_robbinschilds_Art-In-General_NewYork_02.webp", "SA_WEBSITE/36-2012_Gallerist_robbinschilds_Art-In-General_NewYork/2012_Gallerist_robbinschilds_Art-In-General_NewYork_03.jpeg"], "vids": [], "bodyp": ["As part of its New Commission series, Art in General presents robbinschilds's experimental project in two parts: a four-channel video installation and six live performances.", "Part 1 — I came here on my own. loops a seemingly endless quest beyond place, time, and logic. Begun during a residency in Christchurch, New Zealand — where robbinschilds encountered the country's iconic trope \"Man Alone\" — the video rewrites and subverts the classic male journey myth through two women undertaking mirrored but separate journeys.", "Part 2 — Salzburggrubzlas, Grubzlassalzburg!, a live performance series conceived as a reflexive foil to the four-channel video installation, was created on-site during the first two months of the exhibition. Examining robbinschilds's separate but intertwined identities as longtime collaborators, the roughly 60-minute work unravels a meta-journey through the artists' own non-linear creative process, layering text, projection and choreography. Joined by performers Aretha Aoki and Vanessa Anspaugh, with an original sound score by A.V. Linton and lighting design by Megan Byrne.", "robbinschilds was formed by choreographers Sonya Robbins and Layla Childs in 2003. In 2010 they received an Art Matters travel grant to work in Iceland; in 2011 they were awarded a MAP Fund production grant for I came here on my own. Their exhibitions, performances and screenings include work at PS1/MoMA, the Kitchen, the New Museum, BAM, PS122 (New York), deCordova Sculpture Park, the Donau Festival (Austria), and the TBA Festival (Portland).", "Founded in 1981 in Lower Manhattan, Art in General is a nonprofit organization that assists artists with the production and presentation of new work. The New Commissions Program supports the creation of ambitious new projects by artists."]}, {"title": "Rob Carter — Faith in a Seed", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Rob Carter’s ‘Faith in a Seed’ — miniature replicas of Darwin’s, Thoreau’s and Lawes’ estates slowly overtaken by real plants.", "why": "Great men’s houses swallowed by real plants — time outlasting the monument.", "who": "Curatorial assistant — Art in General", "imgs": ["SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/1_2012_Gallerist_Rob-Carter_Art-In-General_NewYork_01.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2_2012_Gallerist_Rob-Carter_Art-In-General_NewYork_02.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_03.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_04.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_05.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_06.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_07.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_08.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_09.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_10.jpg", "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_11.jpg"], "vids": [], "bodyp": ["Faith in a Seed was Rob Carter’s exhibition at Art in General, New York. Its title, a direct quote from Thoreau, addresses man’s desire to alter nature through intervention — from John Lawes’s nineteenth-century crop experiments and fertilizers, to Darwin’s cataloguing of species, to Thoreau reclaiming Arcadia from an industrializing world.", "At the center of the exhibition stood a triangular structure: three equally sized gardens forming a functional, film-set-like enclosure, built in Oriented Strand Board whose “backstage” aesthetic framed the developing jungle within. Viewers negotiated the installation freely — through viewing platforms, pinhole windows, and audio recordings — discovering its elements as they explored the space.", "As real plants grew and an accompanying video extended over the run of the show, the model buildings set within the garden slowly disappeared, dwarfed by the growth and visible only through the viewing holes and projections. The triangle became a kind of pseudo-scientific pagan clock, charting the passage of time and the evolution of both the plants and the exhibition itself.", "About the artist"], "pdf": "SA_WEBSITE/35-2012_Gallerist_Rob-Carter_Art-In-General_NewYork/2012_Gallerist_Rob-Carter_Art-In-General_NewYork_doc_01.pdf", "pdflabel": "Catalogue"}, {"title": "Rock Paper Scissors", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "A group show at Leila Heller staging Western, Middle Eastern and Asian work side by side, with pieces by Jackson Pollock and Louise Bourgeois.", "why": "Cultures set beside each other to hear what they say.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/34-2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork/1_2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/34-2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork/2_2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork_04.jpg", "SA_WEBSITE/34-2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork/2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork_02.jpg"], "vids": [], "bodyp": ["Rock, Paper, Scissors is at once an exploration of the formalistic choices that artists chose to adopt and adapt, as well as a differentiated exploration of the metaphorical qualities that each of the three words suggests. Similar to the children’s game, where winning very much depends on choosing, the exhibition is more keen on exploring the artist’s individual act of committing to a specific medium both as a mode of expression and as a symbol for a politicized gesture. At no point in this exhibition are we interested in trumping one genre over another, or presenting the three media it explores within contrived hierarchies and classifications.", "With the chaotic proliferation of production, and the accessibility to\nan infinity of heterogeneous visual traditions and social objects facilitated by today’s technologies of communication and modes of travel, the tabula rasa available to today’s artists is no longer a clean slate that they can inscribe with the “novel,” but an infinite plethora\nof forms, albeit exhausted, ready to be inserted into new settings, to be appropriated, even plagiarized. The process of recruiting these “forms” and the perception of new materials as possible compositional elements for artistic production have replaced the traditional notion", "of art as the mark of a specialized manual “skill” that separates the artist from other human beings.", "This “eclecticism” (we use the term here for its positive connotations, and not in its Greenbergian sense) 1 was adopted early on, albeit differently, by Europe’s new realists and America’s pop artists. In protesting the purifying zeal of modernism, they expanded the formal vernacular of art by sequestering new iconographical material inspired by the visual terminology of advertising and the rise in mass production/consumption. A decade or so later, no longer capable of being eschewed, this over-production propelled conceptual artists", "to the dematerialization of art and to the removal of the object as an attack on its “special or privileged status; a status which removes\nart objects from their everyday settings and renders them immune\nto common-sense assumptions.” 2 New formal sensibilities had to\nbe advanced to keep up with a world of endlessly shifting loci. Hello Post-modernity! The form of art (in contrast to art forms) as the world knew it was to change forever. Soon the conterminous fascination with new technology would allow for the absorption of more forms and modes of representation laying the foundations for what Rosalind Krauss would refer to, more than three decades later, as the “Post- Medium Condition.” 3 In order to drag themselves out from the morass of the bankrupt “high culture” of modernity, inexorably confined to an ideology of framing, artists had to supplant the canonical with the popular, replace the sanctimonious with the profane. “By some sort of Duchampian twist of ironic affirmation and inversion, today’s forms,", "the offspring of the ‘readymade,’ are simultaneously consumed and produced by the artist as they are being projected onto another symbolic-semantic plane altogether.” 4", "With these ruminations in mind 5, Rock, Paper, Scissors is a double folded statement that ponders the broad range within the formalistic trends that have come to define the contemporary moment of artistic production. The exhibition explores the extent to which contemporary art oscillates between a concern for art-historical lineage on the one hand, and an intergenerational rupture on the other. The works assembled here are all equally grappling with the notion of continuity as far as aesthetic expression is concerned, while\nat the same time manifesting an almost ontological desire for asserting an original departure in formal expression.", "On a more metaphorical level, the exhibition seeks to explore the extent to which contemporary art remains equally engaged with questions of subversion and “politicality”, with notions of radicalism and “art as life”. As August Wilson once said, “All art is political in\nthe sense that it serves someone’s politics.” 6 The formal choices made by each of the nine artists in the exhibition reflect more than just a negotiation with medium and technique. They evidence an adoption of a specific modus operandi that points towards an acute consciousness of where these formal choices sit in relationship to the ones made by their contemporaries.", "In other words, the choice of medium becomes as much, a means of self-differentiation as it is a technical result of the creative process.", "Rock stands for the three dimensional object. It could be a metaphor for sculpture. But it also refers to Monuments and Monumentality. The Monument has always been defined by the agencies and histories that it is made to convey. In that sense, it is the final stage of a politicized act of marking a certain ideology, promulgating a specific narrative and fostering a constructed collective identity.", "Setting the tone for this section, and for the entire exhibition for that matter is a rare\nstone sculpture by Jackson Pollock from the early thirties. Carved out from a raw piece of stone, a small head a little bigger than the size of a clenched fist manifests that introspective gaze of an artist’s mind. Serene yet troubled, the face manages to capture that quest for creative expression that every artist has to undertake alone in search for his or her own individual form of expression. The two other artists in this section Louise Nevelson and Kasper Sonne, while representing a different generation and moments of artistic production, each works as a sculptor and with the three dimensional object employing the medium to become a statement on how an artwork can become a monument of sorts that is at once absent and present, meaningful and meaningless. In doing so, they challenge the process by which art as monument can become a tool through which certain associations and conclusions can be reached vis-à-vis the “gaze” of the beholder. Nevelson’s work stands\nas a constant reminder of how the human brain functions when confronted with the familiar that has been appropriated into something unfamiliar altogether. Sonne’s encasement of his previous canvases within stele-like monoliths confront the viewer\nwith a metaphor of entombment in which the artist’s sculptural work creates a politicized rejection of a previous aesthetic for the same of a monumental statement about his\nown artistic choices."], "pdf": "SA_WEBSITE/34-2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork/2012_Gallerist_Rock-Paper-Scissors_Leila-Heller_NewYork_doc_01.pdf", "pdflabel": "Catalogue"}, {"title": "Mitra Tabrizian — Photographs", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Mitra Tabrizian’s “Photographs” — seven monumental staged images shot in Iran and England. Her first New York solo; had shown at Tate Britain.", "why": "Staged scenes of work and isolation — the modern condition, composed.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/33-2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork/1_2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork_04.jpg", "SA_WEBSITE/33-2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork/2_2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork_06.jpg", "SA_WEBSITE/33-2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork/2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/33-2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork/2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/33-2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork/2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/33-2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork/2012_Gallerist_Mitra-Tabrizian_Leila-Heller_NewYork_05.jpg"], "vids": [], "bodyp": ["The first solo show in New York City of photography by Mitra Tabrizian was on view at Leila Heller Gallery in Chelsea, 568 West 25th Street, from June 7 through July 7, 2012. The exhibition featured seven monumental photographs taken in Iran and England. Tabrizian had a solo show at Tate Britain in 2008 and was commissioned to make a portrait for the London Olympics. A fully illustrated brochure with an essay by Vali Mahlouji, a London-based independent curator and writer, accompanied the exhibition.", "Tabrizian’s mise-en-scènes include bankers in an office building, women walking through Tehran’s surrounding mountains, a man standing on a sidewalk — nothing seems out of the ordinary — yet she stages these evocative scenes as if we are walking in on the subjects mid-scene, immediately before or after the climax of the narrative. The images often feel cold, even disturbing, largely because of the disconnect between the characters. In City, London 2009, several men in business suits stand in an office lobby, each staring in a different direction, completely disconnected from one another and their surroundings.", "In the brochure essay, Mahlouji writes: “When figures appear in groups, Tabrizian’s meticulous compositional juxtapositions and directorial interventions ensure an even more acute sense of dissociation and dislocation. Where expectation is congruency and relatedness, actors remain hermetically solitary.”", "In her newest series, Leicestershire 2012, Tabrizian documents the deteriorating factories of Leicester; here the landscape, rather than the subject, takes center stage. A man stands in a suit by a canal in front of a boarded-up, now-defunct building, his eyes closed as if mourning a town that once was.", "About the artist", "Mitra Tabrizian, born in Tehran, lives and works in London. She has exhibited widely in major international museums and galleries, including a solo exhibition at Tate Britain in 2008. Her book Another Country (Hatje Cantz, 2012) includes texts by Homi Bhabha, David Green, and Hamid Naficy. Her photographic and film works are held in major public collections, including the Victoria and Albert Museum, London; Queensland Art Gallery / Gallery of Modern Art, Australia; Moderna Museet, Stockholm; and Musée d’Art Moderne, Luxembourg."]}, {"title": "Rachel Lee Hovnanian — Mud Pie", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "", "why": "", "who": "", "imgs": ["SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/1_2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_09.webp", "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_04.jpg", "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_07.webp", "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_08.jpg"], "vids": [], "bodyp": ["A solo exhibition of provocative new work by Rachel Lee Hovnanian was on view at Leila Heller Gallery in Chelsea from May 3 through June 2, 2012. Mud Pie included large-scale installations, sculpture, mixed-media paintings, and photography exploring the blurring of reality and the narcissistic side of digital life. A fully illustrated catalogue with an essay by critic and filmmaker Amei Wallach accompanied the exhibition.", "The narrative begins with a photograph, Texas Mud Pie, Hands and Feet (Self-Portrait), 2012, and closes with the sculptural Gates of Narcissus (Metal Panels, Motherboards), 2012. The viewer is invited into the artist’s dream/awake state as she recalls the sights, sounds, smells, and tastes of her early childhood in Texas — a young girl making mud pies in the backyard, the smell of pie in her mother’s kitchen. Is it apple or mud? Are the flowers real, or cultural taxidermy?", "In the interactive installation Café, 2012, Hovnanian presents a small Texas neighborhood café — or what seems to be one. The milky liquid posing as coffee is a lab-made chemical; the menu offers synthetically modified “Food Bytes.” @CafeWaitress, all southern charm, is in fact an actress from New York with a Twitter account who refers every question to Siri.", "In Dinner for Two, 2012, Hovnanian tackles the illusion of elegant dining: a long table set with silver and dusty flowers, the husband and wife replaced by LCD panels affixed to their chairs where their heads should be, each playing a three-minute video loop.", "“We’ve forgotten what is real. Fast-food chains replaced cafés; children think a package of pink powder mixed with water is real lemonade. We think we have 1,000 real friends on Facebook. We are sucked into our screens and can’t find the time to separate from technology,” Hovnanian notes. This is the modern-day Narcissus dilemma — we gaze into screen images until the outer world disappears.", "About the artist", "Rachel Lee Hovnanian was born in Parkersburg, West Virginia, and grew up in Mexico, Texas, and New York. Her work has been seen in solo and group exhibitions across the U.S. and in London, Barcelona, Madrid, Dubai, Abu Dhabi, and Hong Kong. She lives and works in New York City."], "pdf": "SA_WEBSITE/32-2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork/2012_Gallerist_Rachel-Lee-Hovnanian_Leila-Heller_NewYork_doc_01.pdf", "pdflabel": "Catalogue"}, {"title": "Khosrow Hassanzadeh — Haft Khan: The Seven Labors of Rostam", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Khosrow Hassanzadeh’s “Haft Khan” — large silkscreen-and-gold-leaf tile murals from Iranian tradition. His first New York solo.", "why": "An epic pressed into tile and gold — tradition made contemporary.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/31-2012_Gallerist_Haft-Khan_Leila-Heller_NewYork/1_2012_Gallerist_Haft-Khan_Leila-Heller_NewYork_05.jpg", "SA_WEBSITE/31-2012_Gallerist_Haft-Khan_Leila-Heller_NewYork/2012_Gallerist_Haft-Khan_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/31-2012_Gallerist_Haft-Khan_Leila-Heller_NewYork/2012_Gallerist_Haft-Khan_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/31-2012_Gallerist_Haft-Khan_Leila-Heller_NewYork/2012_Gallerist_Haft-Khan_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/31-2012_Gallerist_Haft-Khan_Leila-Heller_NewYork/2012_Gallerist_Haft-Khan_Leila-Heller_NewYork_04.jpg"], "vids": [], "bodyp": ["The first solo exhibition in New York City of murals by Iranian artist Khosrow Hassanzadeh was on view at Leila Heller Gallery’s Chelsea location, 568 West 25th Street, from March 1 through 31, 2012. Haft Khan: The Seven Labors of Rostam featured two monumental murals on tile alongside works on paper. A fully illustrated catalogue accompanied the exhibition.", "Hassanzadeh’s murals are enormous — the largest more than 6 feet tall and nearly 28 feet long. Inspired by Iranian traditions of manhood that existed in a pre-revolutionary Iran, he combines Persian visual traditions with pop representations of the once-celebrated icon of the wrestler.", "He draws on the Haft Khan, a story from the epic Persian poem Shahnameh (The Book of Kings). It tells of Rostam, an Iranian Hercules, who must pass through seven quests, or labors, to save his sovereign from demons. As Varzesh-e Pahlavani, Persian folk wrestling, was popularized in 19th-century Iran, the wrestler, or pahlavan, became the embodiment of Rostam.", "“Wrestlers used to be an integral part of our culture. They were the caretakers of society; powerful men, strong men who were society’s protectors and providers. They helped people in need — whether organizing wedding ceremonies and memorials, or relief during earthquakes. This culture has now been lost,” the artist explains.", "The largest work, Haft Khan (2010), a nearly 28-foot ceramic mural of 728 tiles in saturated cerulean — a reference to the tiles that cover Iran and the blue of mosque domes — layers silkscreen and resin figures reminiscent of Persian miniatures, intertwined with gold Farsi calligraphy. By placing such figures over the mosque-like tiles, the artist brings to mind present-day Iran, a country where there remains an almost devotional struggle for the pahlavan ideals of freedom, courage, and a righteous code of conduct.", "As Dr. Shiva Balaghi, a historian of the modern Middle East at Brown University, writes in the catalogue essay: “In his art, Hassanzadeh works with the pictorial language that surrounds him. He recombines the familiar to create art that reasserts notions of manhood taken from Iranian history and popular culture. His intervention on gender and representation is ultimately a pictorial conversation that recasts Iranian cultural paradigms.”", "About the artist", "Born in Tehran in 1963, Khosrow Hassanzadeh lives and works in both Tehran and London. He studied painting at Mojtama-e Honar University, Tehran (1989–91), and Persian literature at Azad University, Tehran. His work has been shown at institutions across the Middle East, Europe, and the U.S., including the British Museum, London; the Tropenmuseum, Amsterdam; the Tehran Museum of Contemporary Art; the Chelsea Art Museum, New York; and the World Bank, Washington, DC."]}, {"title": "Ran Hwang — Transition", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Ran Hwang’s ‘Transition’ — works built from thousands of buttons, beads, pins and thread.", "why": "Thousands of buttons and pins becoming one image — the small unit building the whole.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/1_2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_05.png", "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/2_2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_05.png", "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/3_2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_06.png", "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_04.jpg"], "vids": [], "bodyp": ["Ran Hwang: Transition was on view at Leila Heller Gallery, 568 West 25th Street, New York, from April 5 through 27, 2012. A fully illustrated catalogue with an essay by Barbara Pollack accompanied the exhibition.", "Hwang composes large-scale panels from thousands of buttons, beads, and pins fixed onto wood and Plexiglas. Works such as East Wind (2012), Ephemeral Blossoms (2012), Whimsical Dream (2011), and Garden of Water (2010) build ornate blossoms and figures from these spare, repetitive materials — the hammering of each pin a slow, meditative labor that mirrors the work’s themes of permanence, impermanence, and the transience of life.", "About the artist", "Ran Hwang lives and works between Seoul and New York City. She holds a BFA from the School of Visual Arts, New York, and an MFA from the Graduate School of Arts at Chung-Ang University, Seoul. Her work has been exhibited internationally, including at Leila Heller Gallery, New York, and Hakgojae Gallery, Seoul."], "pdf": "SA_WEBSITE/30-2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork/2012_Gallerist_Ran-Hwang_Leila-Heller_NewYork_doc_01.pdf", "pdflabel": "Catalogue"}, {"title": "Ayad Alkadhi — Umbilical", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Ayad Alkadhi’s “Umbilical” — charcoal and acrylic on Arabic newspaper, on life under Saddam, war and exile. His first solo in New York.", "why": "Painting on the newspaper that reported the war he lived — the record and the wound on one surface.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/1_2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_05.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_04.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_06.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_07.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_08.jpg", "SA_WEBSITE/29-2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork/2012_Gallerist_Ayad-Alkadhi_Leila-Heller_NewYork_09.jpg"], "vids": [], "bodyp": ["Ayad Alkadhi’s first solo exhibition in New York City, Umbilical, was on view at Leila Heller Gallery’s Chelsea location, 568 West 25th Street, from February 2 through 25, 2012. A fully illustrated catalogue accompanied the exhibition.", "The new series of recent paintings and works on paper explores Alkadhi’s experiences under the rule of Saddam Hussein, the casualties of war, and the Arab Spring, ultimately confronting immigration and assimilation. Within these broad parameters, the artist weaves personal reflections using sarcasm, humor, anger, sex, and “an honest dose of reality,” Alkadhi notes.", "Alkadhi’s paintings, and the process to create them, embody human struggle: each mark on the canvas is an indication of the artist’s presence, his body and his hand, wrestling with his histories, his ghosts, and his materials.", "Linda Komaroff, Curator of Islamic Art at the Los Angeles County Museum of Art, writes in the catalogue essay: “We share an interest in the manifold graphic possibilities of Arabic writing, which he freely employs with his own calligraphy as well as with newspaper that often functions as the support for his compositions. The words are not mere decoration but merge with and amplify his emotionally charged images inspired by the dreadful aftermath of the American-led invasion of Iraq, his homeland, and by his quest for identity as an Arab artist living in post-9/11 New York. He has produced a remarkable body of work that is intensely personal, often tinged with anger but never despondent, and deeply compelling. His is the visual testimony of a self-described survivor.”", "The layering of such personal and historical content is reflected in the artist’s mark-making, where strata upon strata of content are buried beneath successive layers. The works typically start with Alkadhi’s signature base of yellowed newspapers pasted onto canvas, upon which he sketches in black and sanguine: bodies, embryos, faces, thoughts, and scribbled notes.", "About the artist", "Born in Iraq in 1971, Ayad Alkadhi lives and works in New York City. He received an MFA from the Tisch School of the Arts at New York University. Alkadhi left Iraq in 1994 and has lived in England, the United Arab Emirates, Jordan, and New Zealand. His work has been shown at institutions across the Middle East, Europe, and the U.S., including the Queens Museum of Art and the Austrian Cultural Forum, New York; the Station Museum of Contemporary Art, Houston; and the Regis Center for Art, Minneapolis."]}, {"title": "Elizabeth Thompson — Stories from the Everglades", "year": "2012", "cat": "Gallerist", "type": "Press release", "what": "Elizabeth Thompson’s ‘Stories from the Everglades’ — paintings of the fragile South Florida wilderness.", "why": "A fragile wilderness painted before it’s gone — the overlooked ecosystem.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/28-2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork/1_2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/28-2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork/2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/28-2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork/2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/28-2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork/2012_Gallerist_Elizabeth-Thompson_Leila-Heller_NewYork_04.jpg"], "vids": [], "bodyp": ["Recent paintings by Elizabeth Thompson were on view at Leila Heller Gallery from January 7 through 28, 2012. Celebrating a primeval wilderness, Stories from the Everglades presented paintings and watercolors depicting the vast, serene, and fragile ecosystem of South Florida; a portion of the proceeds benefited conservation of the Everglades. Inspired by the beauty of this “river of grass” unique to North America, Thompson moved from New York City to a small town in Florida in 2006 after an artist residency at Everglades National Park. The exhibition included nine large oil paintings on linen alongside smaller works and watercolors.", "“My current paintings continue to explore my fascination with the Everglades, but now include possible but improbable narratives. They continue the theme of poetic isolation. I regularly visit different parts of the Everglades, and this place always offers inspiration, peace, and spiritual comfort,” Thompson notes.", "In this body of work, Thompson calls attention to man’s dynamic yet troubled relationship to nature: an abandoned Mercedes half-submerged in a swamp in Cocaine Cowboy (2011), the non-native pythons that dangerously offset the ecosystem, and a nude post-modern couple shaken by man’s destruction of the natural world in Expulsion of Adam and Eve from the Everglades (2011). Yet there is optimism too — a delicate coexistence of man and nature in The Encounter (2011), a nude beauty beside a downy white egret.", "“My hope is that the paintings plant seeds of appreciation for this amazing ecosystem. These paintings also act as a protest, a warning that this unique habitat might be lost,” she writes.", "About the artist", "Elizabeth Thompson lives in Ocean Ridge, Florida, and Paris. Her work has been shown at institutions including the Norton Museum of Art, Palm Beach; the McNay Art Museum, San Antonio; and the Museum of Modern Art, Rio de Janeiro. In 1976 she won a competition to paint a series of oil tanks on the Hudson River, and has since completed mural commissions in Zimbabwe and Mexico City, among others. In the early-to-mid 1980s she was an artist in residence at MoMA PS1, Long Island City, and the Centre Georges Pompidou, Paris."]}, {"title": "The Mask and the Mirror — curated by Shirin Neshat", "year": "2011", "cat": "Gallerist", "type": "Press release", "what": "Self-portraits by 17 artists curated by Shirin Neshat — Marina Abramović, Cindy Sherman, Matthew Barney, Robert Mapplethorpe and Andy Warhol among them.", "why": "Seventeen ways of facing yourself, chosen by Shirin Neshat.", "who": "Gallery & curatorial assistant — Leila Heller", "imgs": ["SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/1_2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2_2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_23.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/3_2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_25.png", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_04.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_05.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_06.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_07.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_08.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_09.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_10.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_11.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_12.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_13.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_14.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_15.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_16.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_17.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_18.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_19.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_20.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_21.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_22.jpg", "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_24.jpg"], "vids": [], "bodyp": ["The Mask and the Mirror, an exhibition of self-portraits curated by artist Shirin Neshat, was on view at Leila Heller Gallery in Chelsea — in the gallery’s new space at 568 West 25th Street — from November 3 through December 21, 2011. It presented photographs and paintings by seventeen artists, some internationally iconic, others emerging and shown in New York for the first time, from the United States, the Middle East, Africa, and Pakistan. An illustrated catalogue accompanied the exhibition.", "Highlights included Matthew Barney’s Drawing Restraint 13: Instrument of Surrender (2006), the artist in full military uniform flanked by soldiers; an untitled 2000 color print by Cindy Sherman in a yellow wig and clown makeup; and photographs by Van Leo (1921–2002), whose Hollywood-inspired images of Cairo’s belle époque are considered unrivaled in the Arab world.", "As Neshat writes, the exhibition grew from her long interest as a Middle Eastern artist in how the West has influenced non-Western cultures and their ways of picturing the self.", "Artists in the exhibition", "Marina Abramović, Matthew Barney, Paolo Canevari, Feridoun Ghaffari, Ramin Haerizadeh, Lyle Ashton Harris, Y.Z. Kami, Shahram Karimi, Robert Mapplethorpe, Youssef Nabil, Nicky Nodjoumi, Bahar Sabzevari, Cindy Sherman, Shahzia Sikander, Iké Udé, Van Leo, and Andy Warhol."], "pdf": "SA_WEBSITE/27-2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork/2011_Gallerist_Mask-And-Mirror_Leila-Heller_NewYork_doc_01.pdf", "pdflabel": "Catalogue"}, {"title": "Proje4L/Elgiz Museum- Private Collection", "year": "2011", "cat": "Gallerist", "type": "", "what": "Proje4L / Elgiz Museum, Istanbul. Turkey’s first private contemporary art museum.", "why": "The place that existed before there was one. Opened in 2001 as Proje4L to give young Turkish artists space and international visibility when the country had no institution for contemporary art at all, and later became Turkey’s first private contemporary art museum.", "who": "Director Assistant & Coordinator", "imgs": ["SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/1_2010_Gallerist_Direction_Elgiz_Istanbul_04.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_01.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_02.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_03.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_05.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_06.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_07.jpg", "SA_WEBSITE/26-2011_Gallerist_Direction_Elgiz_Istanbul/2010_Gallerist_Direction_Elgiz_Istanbul_08.jpg"], "vids": [], "bodyp": []}, {"title": "Peter Kogler", "year": "2011", "cat": "Gallerist", "type": "Press release", "what": "Peter Kogler at Dirimart — the Austrian pioneer of computer-based installation, whose work is held by MoMA, Centre Pompidou and Mamco.", "why": "Ants, veins, brain folds and tubes spreading across the walls — the individual mapped inside social structures and digital data flows.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/1_2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/25-2011_Gallerist_Peter-Kogler_Dirimart_Istanbul/2011_Gallerist_Peter-Kogler_Dirimart_Istanbul_08.jpg"], "vids": [], "bodyp": ["Peter Kogler, whose works are now included in the collections of some of the world’s most important institutions such as MoMA (New York), Centre Pompidou (Paris), Mamco (Geneva), Zagreb Museum of Contemporary Art, and ING Art Center (Brussels), was born in Innsbruck in 1959. Since the 1980s, he has placed the computer at the center of artistic production. He transformed the computer into the language of artistic production through the relationships he established between graphics, architecture, and new media. Kogler’s work features recurring visuals such as ants, brain folds, veins, and tubes. These elements function as metaphors for the individual’s position within social structures, mental processes, and digital data flows."]}, {"title": "Ekrem Yalcindag", "year": "2011", "cat": "Gallerist", "type": "Press release", "what": "", "why": "", "who": "", "imgs": ["SA_WEBSITE/24-2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul/1_2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/24-2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul/2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/24-2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul/2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/24-2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul/2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/24-2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul/2011_Gallerist_Ekrem-Yalcindag_Dirimart_Istanbul_05.jpg"], "vids": [], "bodyp": ["The name of the exhibition emphasizes the artist’s interest in Impressionism. Rhythm and the liveliness of the colours by Robert Delaunay and the effective perception of the colour sequence by George Seurat have been the major sources of the art of Yalçındağ. The exhibition is composed of seven works with rounded forms in diameter of two meters. The union between the form of canvas and patterns on the surface has significant importance for the artist. Besides “watching everyday life as colours” brings a pop character into the paintings, usage of contrasts such as light and dark, warm and cold generates an optic effect. These rounded formed paintings that Yalçındağ has worked on at particular intervals since 1997 are displayed together in an exhibition for the first time.", "About the artist", "Born in Gölbaşı, Turkey, in 1964, Ekrem Yalçındağ lives and works in Frankfurt and Istanbul. He studied at Dokuz Eylül University in Izmir and later at the Städelschule in Frankfurt, under Hermann Nitsch and Thomas Bayrle. His work has been exhibited at Istanbul Modern and the Museum Haus Konstruktiv, Zurich, and is held in collections including Istanbul Modern and the Goetz Collection, Munich."]}, {"title": "Sabine Boehl", "year": "2011", "cat": "Gallerist", "type": "Press release", "what": "Sabine Boehl’s “How Many” at Dirimart — bead-and-thread reliefs charged by the intensity of Istanbul.", "why": "Istanbul’s fleeting impressions fixed as questions in bead — calligraphy reversed, so the letters dissolve back into images.", "who": "Institutional Communication & PR — Dirimart", "imgs": ["SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/1_2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_02.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_01.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_03.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_04.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_05.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_06.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_07.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_08.jpg", "SA_WEBSITE/23-2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul/2011_Gallerist_Sabine-Boehl_Dirimart_Istanbul_09.jpg"], "vids": [], "bodyp": ["More than anything else, Sabine Boehl’s latest works were created in light of the overwhelming impression Istanbul has made on her. We can almost talk of an inspirational burst triggered by the energetic megapolis. The works are marvelously concentrated and penetratingly intense. They describe the restless endeavor to capture the beauty of the moment and reflect it in images and words. The title of the series, “How Many”, refers to the fleeting impressions that we find fixed on the canvas in the form of questions. These are wonderfully poetic notations of ethereal lightness that now take their place on the oscillating monochrome of the canvas. The words link up as if freed of gravity’s pull. To choose just one example from the canon of the series: “How Many Rose Petals Left Their Spirit To Be Transformed Into Rose Water?”", "A vibrant deep red based on a square. Not least the “all over” of the red bead relief can be read as an homage to the pioneers of color field painting. The legibility of the empty spaces framed by fragile bead borders that then form the letter is essentially unintentional. We can clearly discern the influence of Islamic calligraphy here. But while the hand of the calligrapher generated letters from images, the letters in Sabine Boehl’s works turn into the images. Like the words carved on archaeological finds, we have to expose them letter by letter to find the added poetic value they have.", "Even the role of art as the visualization of a stance toward life and the world as championed by Albers at Black Mountain College does not do justice to this approach. The piece goes beyond the individual representation of the present as considered by many to be the status quo. As in physics, the artist seems here to be searching for a universal formula that encapsulates all the allusions and references. Beneath the glittering reflections of the sea of beads, unfathomable images appear, sending the viewer crashing into a vortex of present and past, myths, ideas, and references. We can speak here of a catharsis of the eye that sensitizes us to taking an undistorted view of how we address the past, in fact, enables us to do so in the first place.", "Let us not forget that the unmistakable character of Sabine Boehl’s images results above all from the fact that she has found a way out of the dilemma of the zeitgeist and avoids a mere repetition of what previous generations attempted. Sol Lewitt once captured this with great trenchancy when he said: “Every generation renews itself in its own way; there’s always a reaction against whatever is standard.”", "About the artist", "Sabine Boehl lives and works in Berlin. She studied at the Hochschule für Gestaltung in Offenbach and the Kunstakademie Düsseldorf, where she became a master student of Gerhard Merz. She is known for images made by sewing thousands of glass beads onto canvas."]}, {"title": "Users Manual", "year": "2010", "cat": "Writer", "type": "Essay", "what": "Essay on Altındere and Evren’s “User’s Manual,” a survey of contemporary art in Turkey, 1986–2006.", "why": "Twenty years of Turkish contemporary art built like a manual — conceptual art, the biennials, artists turning gallerists — told first-hand by the seventy-eight who lived it. A way to read Turkey’s political and cultural upheavals since the 1980s through its art.", "who": "Author", "imgs": ["SA_WEBSITE/22-2010_Wri
