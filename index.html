ic Eisenhower jacket silhouette, this piece combines classic style with a thought-provoking message. “Humans are nature’s greatest achievement. They can turn forests into desert.”", "why": "Wears the warning. The same human genius that builds is the one that turns forest into desert — carried on the body, not preached.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/102-2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork/2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork_01.jpg", "SA_WEBSITE/102-2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork/2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork_02.jpg", "SA_WEBSITE/102-2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork/2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork_03.jpg", "SA_WEBSITE/102-2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork/2023_Creative-Director_C16_Forest2DesertJacket_10AM_NewYork_04.jpg"], "vids": [], "bodyp": ["Customized Dickies Jacket.\nIntroducing our customized Dickies Jacket, featuring a unique embroidered design that makes a powerful statement: \"Humans are nature's greatest achievement. They can turn forests into desert.\"\nCrafted with the iconic Eisenhower jacket silhouette, this piece combines classic style with a thought-provoking message. Made with durable materials and meticulous attention to detail, it offers both timeless appeal and practical functionality.\nWith its quilted taffeta lining, this jacket provides lightweight warmth for everyday wear. The addition of multiple pockets, including a hidden interior pocket, ensures convenience and versatility on the go."]}, {"title": "C15 Basic SW", "year": "2023", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 15th collection, the basic sweatshirt.", "why": "Silence, in a sweatshirt — for the times you show up without a word.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/101-2023_Creative-Director_C15_Basic-SW_10AM_NewYork/1_2023_Creative-Director_C15_Basic-SW_10AM_NewYork_02.png", "SA_WEBSITE/101-2023_Creative-Director_C15_Basic-SW_10AM_NewYork/2023_Creative-Director_C15_Basic-SW_10AM_NewYork_01.png", "SA_WEBSITE/101-2023_Creative-Director_C15_Basic-SW_10AM_NewYork/2023_Creative-Director_C15_Basic-SW_10AM_NewYork_03.png", "SA_WEBSITE/101-2023_Creative-Director_C15_Basic-SW_10AM_NewYork/2023_Creative-Director_C15_Basic-SW_10AM_NewYork_04.png", "SA_WEBSITE/101-2023_Creative-Director_C15_Basic-SW_10AM_NewYork/2023_Creative-Director_C15_Basic-SW_10AM_NewYork_05.png"], "vids": [], "bodyp": []}, {"title": "C14 Basic Tee", "year": "2023", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 14th collection, the basic tee.", "why": "There are times you want to go quiet and just feel it, without saying anything — like when people changed their profile to black. You don’t need to be loud; you need to be there. This is that.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/1_2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_02.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_01.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_03.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_04.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_05.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_06.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_07.jpg", "SA_WEBSITE/100-2023_Creative-Director_C14_Basic-Tee_10AM_NewYork/2023_Creative-Director_C14_Basic-Tee_10AM_NewYork_08.jpg"], "vids": [], "bodyp": []}, {"title": "C13 Placebo Effect", "year": "2023", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 13th collection, Placebo Effect. It says: this pill contains no drugs at all. It will relive headeches and other pains.", "why": "Puts belief itself on the garment. Meaning does the work, even when the substance is empty. Thoughts become things.A drug without drugs is called a placebo. It works on the mind, not the body — and yet the body responds. Headaches lift. Pain fades. The pill contains nothing, and still, something happens.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/99-2023_Creative-Director_C13_Placebo-Effect_10AM_Istanbul/1_2023_Creative-Director_C13_Placebo-Effect_10AM_Istanbul_02.jpg", "SA_WEBSITE/99-2023_Creative-Director_C13_Placebo-Effect_10AM_Istanbul/2023_Creative-Director_C13_Placebo-Effect_10AM_Istanbul_01.jpg", "SA_WEBSITE/99-2023_Creative-Director_C13_Placebo-Effect_10AM_Istanbul/2023_Creative-Director_C13_Placebo-Effect_10AM_Istanbul_03.jpg"], "vids": [], "bodyp": ["A pill with nothing in it that still works. A drug without drugs, acting on the mind, not the body.The Placebo T-Shirt is a heavyweight 100% cotton T-shirt designed as a conceptual garment that questions how meaning is constructed in clothing.\nIt does not rely on a graphic, slogan, or visual message. Instead, it is built around the idea of perception: how a garment can feel meaningful without explicitly stating anything.\nThe concept references the psychological “placebo effect,” where belief creates experience. In the same way, this T-shirt proposes that interpretation completes the design. What you project onto it becomes part of what it is.", "Puts belief itself on the garment. Meaning does the work, even when the substance is empty.With a dose of irony, this design challenges societal expectations surrounding comfort and validation. It encourages wearers to reflect on the illusions we often accept as solutions in our daily lives."]}, {"title": "C11 The Portrait Of Society", "year": "2022", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 11th collection, The Portrait of Society. Sun smells different these days, what happened to flowers, people see what they wanna see.", "why": "Holds a mirror to the moment without a verdict. It records the unease rather than resolving it.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/1_2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_07.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2_2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_05.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/3_2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_04.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_01.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_02.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_03.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_06.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_08.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_09.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_10.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_11.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_12.jpg", "SA_WEBSITE/98-2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul/2022_Creative-Director_C12_The-Portrait-Of-Society-II_10AM_Istanbul_13.jpg"], "vids": [], "bodyp": ["The second portrait. Call me if you get lost. Knowing nothing as the new cool. A left-hand drawing. Red flowers smell too.\nSTORY: \"Beauty is the finite manifestation of the infinite,\" says Kant. It emphasizes the experience of beauty here. The experience itself, rather than the subject or object, is considered. Contrary to the generalization that flowers are beautiful, this sweatshirt is designed to ask what is beautiful.\nThere’s something about the 10AM design that draws people in. It’s minimal with intention, as it has long been made with simplistic artistry. The signature of 10AM printed design is showcased at back and center. The long-sleeve top is constructed of organic cotton, with a relaxed fit and boxy shape.", "Knowing Nothing Is the New Cool Sweatshirt: This sweatshirt humorously embraces the value of uncertainty, pushing back against the pressure to always have the answers in a fast-paced, information-heavy world. It invites discussions on generational differences in knowledge and the merits of embracing ignorance.", "Extends the first with more doubt and more play. It sits with being lost and makes that the honest position."]}, {"title": "C12 The Portrait Of Society II", "year": "2022", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 12th collection, The Portrait of Society II. “Knowing nothing is the new cool.” “Until you discover”.", "why": "Extends the first with more doubt and more play. It sits with being lost and makes that the honest position.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/1_2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_06.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_01.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_02.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_03.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_04.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_05.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_07.png", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_08.png", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_09.png", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_10.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_11.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_12.jpg", "SA_WEBSITE/97-2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul/2022_Creative-Director_C11_The-Portrait-Of-Society_10AM_Istanbul_13.jpg"], "vids": [], "bodyp": ["Society as a portrait. Right, wrong, neither. People see what they want. Even the sun smells different now.\nSun smells different these days.\nA small sentence for a quiet shift. The air feels off. The light hits differently. Nothing is named, nothing is announced — just the slow recognition that the world around us is not what it was.\nWhat happened to flowers?\nSomething is shifting and we don't have the words for it yet. Categories blur, meanings drift, the things we thought we understood quietly become something else. We point at it and the sentence won't finish.\nPeople see what they wanna see, right wrong neither.", "Holds a mirror to the moment without a verdict. It records the unease rather than resolving it."]}, {"title": "C10 Raw And Sexy", "year": "2022", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 10th collection, Raw & Sexy.", "why": "Plays in tone and color instead of argument. The statement is attitude, raw and easy. It was a test, how can one simple form can be sexy with tiny touches and comfortable at the same time.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/1_2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_03.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2_2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_06.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/3_2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_02.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_01.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_04.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_05.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_07.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_08.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_09.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_10.jpg", "SA_WEBSITE/96-2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul/2022_Creative-Director_C10_Raw-And-Sexy_10AM_Istanbul_11.jpg"], "vids": [], "bodyp": ["A set of moods, not a thesis. Not Risky, Apple Bite, Ms Dreamy, Surreal But Nice, Warm Brown, Ice Ice Baby.As 10:AM team, you now know very well that comfort and wearability are always the most important criteria for us when designing our products. With Raw&Sexy collection, you can swim as you wish without sacrificing your comfort and sexiness, and you can sunbathe without being exposed to any unnecessary tan lines.\nWhy we named our collection Raw&Sexy?\nRaw means being in or nearly in the natural state: not processed or purified\nArguing that comfort and wearability are the most important criteria in all its products, 10:AM offers a raw world by avoiding artificiality in both its products and the visual world.", "Plays in tone and color instead of argument. The statement is attitude, raw and easy."]}, {"title": "C9 Fear Of What", "year": "2022", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 9th collection, Fear of What.", "why": "Removes the permission you were waiting for. You can live as you desire, and no one can stop you taking what is yours. This design has ideology of social animals exhibiton behind it.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2_2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_01.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/3_2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_05.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/4_2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_06.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_02.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_03.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_04.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_07.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_08.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_09.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_10.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_11.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_12.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_13.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_14.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_15.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_16.jpg", "SA_WEBSITE/95-2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul/2022_Creative-Director_C9_Fear-Of-What_10AM_Istanbul_18.jpg"], "vids": [], "bodyp": ["The ninth launch, a call from your own nature, not the earth's. A garden you are allowed to cut from. Fear of what?\n10AM loves to spread the idea..\nThe image we have created in our story is almost ready. This is our 9th launch and we are so proud to share with you. In our 9th launch, you have a call from nature. Not an earth nature, your own nature, We invite you to reflect on who you are… Reflecting back something to society together.  We are always afraid about our ideas, our lives and ourselves. But It's 2022;\nYou can live as you desire, your fairytale, your game…", "Removes the permission you were waiting for. You can live as you desire, and no one can stop you taking what is yours."]}, {"title": "C8 Love Yourself", "year": "2022", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 8th collection, Love Yourself.", "why": "Self-sufficiency worn lightly. The brand says the thing you should be saying to yourself. And love goes beyond the surface when you ask the right question.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/94-2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul/1_2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul_01.jpg", "SA_WEBSITE/94-2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul/2_2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul_02.jpg", "SA_WEBSITE/94-2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul/3_2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul_03.jpg", "SA_WEBSITE/94-2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul/4_2022_Creative-Director_C8_Love-Yourself_10AM_Istanbul_04.jpg"], "vids": [], "bodyp": ["One line, half joke, half instruction. 10AM loves you, you don't need anyone else. We did an amazing shooitng creative directing by me and the amazing blood shade of red adn fully covered people, all the people in this prject were celebrities, more tha million reach people and i covered their faces adn make the interview with them asking their personal life or thoughts without showing their faces. So they get to be the thmelselves and that why we diid this tote bag with a strap says,10amloves you you dont need anyone else. And it was probably our most loved project", "Self-sufficiency worn lightly. The brand says the thing you should be saying to yourself."]}, {"title": "Johnnie Walker", "year": "2022", "cat": "Creative Director", "type": "Collection", "what": "10:AM × Johnnie Walker — her first design collaboration outside her own brand. Kafka’s “Paths Are Made by Walking” turned into streetwear: her hand-drawn four walkers, cream embossing on black, launched at The Walkers’ New Year market, Zorlu Center, Istanbul.", "why": "Johnnie Walker’s “Keep Walking” and 10:AM’s “Always Forward” are the same sentence. Designing for someone else for the first time only worked because the language already matched.", "who": "Creative Director & Designer", "imgs": ["SA_WEBSITE/93-2022_Creative-Director&Designer_Johnnie-Walker_Istanbul/2_2022_Creative-Director&Designer_Johnnie-Walker_Istanbul_01.png", "SA_WEBSITE/93-2022_Creative-Director&Designer_Johnnie-Walker_Istanbul/3_2022_Creative-Director&Designer_Johnnie-Walker_Istanbul_02.png", "SA_WEBSITE/93-2022_Creative-Director&Designer_Johnnie-Walker_Istanbul/2022_Creative-Director&Designer_Johnnie-Walker_Istanbul_03.png", "SA_WEBSITE/93-2022_Creative-Director&Designer_Johnnie-Walker_Istanbul/2022_Creative-Director&Designer_Johnnie-Walker_Istanbul_04.png"], "vids": [], "bodyp": ["Kafka-inspired designs by Secil Alkis... The founder of 10:AM and designer Secil Alkis collaborate with a brand other than her own brand 10:AM for fashion design for the first time. At the request of Johnnie Walker, designer combines the two brands in the street wear world. We are curious about the future collaborations of the designer. The designer used Franz Kafka's motto \"Paths Are Made by Walking\" in the sweatshirts and t-shirts for The Walkers world. Secil Alkis combined the motto with her own hand drawing and a design of four figures walking on the road. Secil Alkis, who always prefers cream color applied with the cream embossing technique on black, continue the effect of her previous The designer, who frequently uses mottos such as \"Always Forward\" and \"Keep Walking\" in the 10:AM brand, says; \"I think the world of 10:AM is very close with The Walkers family, both in terms of language and community-building. For this reason, it was very enjoyable for me to design for a brand with the same priorities. I'm excited to be collaborating with a brand other than 10:AM for the first time, and that brand is The Walkers.\""]}, {"title": "C7 Times Are Hard For Dreamers", "year": "2021", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 7th collection, “Times Are Hard for Dreamers.”", "why": "Names the difficulty without surrendering to it. The dreamer keeps building anyway.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/1_2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_09.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/2_2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_10.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/3_2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_06.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/4_2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_04.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/5_2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_05.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/6_2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_08.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_01.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_02.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_03.jpg", "SA_WEBSITE/92-2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul/2021_Creative-Director_C7_Times-Are-Hard-For-Dreamers_10AM_Istanbul_07.jpg"], "vids": [], "bodyp": ["For the dreamers in a hard year. Build your own fairytale, and still, everything is beautiful.\nBlue Daisy\nAfter all, everything is beautiful.\nDaisies are definitely beautiful and fragile at the same time.\nEvery day is a gift and every gift is beautiful in its own way. Sometimes the gifts are not directly received or given from one person to another, but they are simply all around us.\nEvery day is full of fragments that we can appreciate and cherish. This product is only produced for appreciation of life.", "Brown rabbit\nTimes are hard for dreamers.\nRabbits are cute, rabbits are easy to handle, rabbits are a perfect size, rabbits are compressible, rabbits are quiet, rabbits are good-natured. What if a brown rabbit dreams to be different?\nAre you a brown rabbit or not?\nNo one is going to understand the full extent of your dreams. \nThey're not going to understand your wants, your desires, and what makes you tick. \nTimes are hard but times are WORTH IT.", "Green Mushroom\nYou can create your own fairytale.\nVisualisation is the art of mental imagery – where you put your focus entirely on achieving a dream and actualizing it to become your own fairytale. This product dedicated for believers.", "Names the difficulty without surrendering to it. The dreamer keeps building anyway."]}, {"title": "C6 Fly Me", "year": "2021", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 6th collection, Fly Me.", "why": "Borrows the pin every pilot pulls before takeoff and makes it about readiness. Take it out, leave the ground.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/1_2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_03.jpg", "SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/2_2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_01.jpg", "SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_02.jpg", "SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_04.jpg", "SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_05.jpg", "SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_06.jpg", "SA_WEBSITE/91-2021_Creative-Director_C6_Fly-Me_10AM_Istanbul/2021_Creative-Director_C6_Fly-Me_10AM_Istanbul_07.jpg"], "vids": [], "bodyp": ["Aviation language turned personal. Fly me. Remove before flight. With patches reading 'fly' on both elbows and 'me' across the back, this jacket was our challenge for another product line, and we sold out in two weeks.", "10:AM opens the 'Back to School' season, itself a stand-in for the return to normal, with the 'FLY ME' jacket, inspired by the Harvard University baseball team jacket worn as a uniform in 1865. However nice the idea of going back to school sounds in our newly normalized lives, we at 10:AM keep asking the questions sitting in our subconscious, and keep underlining them. As we pass through a time when ideas like going back to school, going back to life, and normalization have lost their meaning, we wanted to begin our scattered world of thought with something colourful. 10:AM, a brand bold with colour, this time brings all the opposing colours together and asks us to see the beauty inside the chaos. In these days when we feel we are on the edge of a radical change, we wait ready for takeoff, without knowing the answer to the question: what is waiting for us in the future?", "Borrows the pin every pilot pulls before takeoff and makes it about readiness. Take it out, leave the ground."]}, {"title": "C5 We Can Chance Our World", "year": "2021", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s 5th collection, We Can Change Our World.", "why": "A dare in one line — don’t wait for the world to change, change it.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/1_2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_03.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/2_2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_04.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/3_2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_01.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/4_2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_02.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/5_2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_05.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/6_2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_06.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_07.jpg", "SA_WEBSITE/90-2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul/2021_Creative-Director_C5_We-Can-Chance-Our-World_10AM_Istanbul_08.jpg"], "vids": [], "bodyp": []}, {"title": "C4 Proud To Be Me", "year": "2021", "cat": "Creative D WEBSITE/87-2020_Creative-Director_C2_We-Have-It-All_10AM_Istanbul/2020_Creative-Director_C2_We-Have-It-All_10AM_Istanbul_10.jpg", "SA_WEBSITE/87-2020_Creative-Director_C2_We-Have-It-All_10AM_Istanbul/2020_Creative-Director_C2_We-Have-It-All_10AM_Istanbul_11.jpg", "SA_WEBSITE/87-2020_Creative-Director_C2_We-Have-It-All_10AM_Istanbul/2020_Creative-Director_C2_We-Have-It-All_10AM_Istanbul_12.jpg"], "vids": [], "bodyp": ["Released into 2020's new normal. Ordinary people changing the world with what they have, and a question mark over whether having it all is the win.", "Turns the new normal into a dare. Act with what you have, shock the comfortable, hold the love and hate you feel for your own generation."]}, {"title": "C1 This Is My Game", "year": "2020", "cat": "Creative Director", "type": "Collection", "what": "10:AM’s first collection, This Is My Game.", "why": "Plants the flag. Setting the rules of your own life and claim the future as already yours.", "who": "Founder & Creative Director", "imgs": ["SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/1_2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_01.jpg", "SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_02.jpg", "SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_03.jpg", "SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_04.jpg", "SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_05.jpg", "SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_06.jpg", "SA_WEBSITE/86-2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul/2020_Creative-Director_C1_This-Is-My-Game_10AM_Istanbul_07.jpg"], "vids": [], "bodyp": ["The first collection. Ownership as a stance: this is my game, we are future, ever thine ever mine ever ours. First collection ever, first textile production with a start of 4000 products and next day corona shut down. Started challenged.", "Plants the flag. You set the rules of your own life and claim the future as already yours."]}, {"title": "Tugberk Selcuk", "year": "2018", "cat": "Gallerist", "type": "", "what": "Tuğberk Selçuk’s ‘İçten Yanmalı’ (Internal Combustion) — his fifth solo exhibition, managed by Secil Alkis — first show in a nightclub in Turkey.", "why": "the exhibition examines the cultural and emotional legacy of the internal combustion engine, reflecting on its profound influence on modern life as humanity approaches a new technological era.", "who": "Artist Manager", "imgs": ["SA_WEBSITE/84-2018_Gallerist_Tugberk-Selcuk_Istanbul/1_2018_Gallerist_Tugberk-Selcuk_Istanbul_01.png", "SA_WEBSITE/84-2018_Gallerist_Tugberk-Selcuk_Istanbul/2018_Gallerist_Tugberk-Selcuk_Istanbul_02.png", "SA_WEBSITE/84-2018_Gallerist_Tugberk-Selcuk_Istanbul/2018_Gallerist_Tugberk-Selcuk_Istanbul_03.png", "SA_WEBSITE/84-2018_Gallerist_Tugberk-Selcuk_Istanbul/2018_Gallerist_Tugberk-Selcuk_Istanbul_04.png", "SA_WEBSITE/84-2018_Gallerist_Tugberk-Selcuk_Istanbul/2018_Gallerist_Tugberk-Selcuk_Istanbul_05.png"], "vids": [], "bodyp": ["At a time when art is increasingly confined to autonomous spaces, sterile exhibition halls, and digital interfaces—removed from the rhythms of everyday life—Tuğberk Selçuk invites viewers into an environment charged with the visceral energy of an eight-cylinder drag race, where the scent of engine oil and the force of acceleration become part of the exhibition itself.", "Production and artistic direction: Secil Alkis, Internal Combustion, Selçuk’s fifth solo exhibition, opens on October 3, 2018, at Fırın, one of Istanbul’s leading nightlife venues. Presented during a period marked by the gradual transition toward renewable energy, the exhibition examines the cultural and emotional legacy of the internal combustion engine, reflecting on its profound influence on modern life as humanity approaches a new technological era.", "Sponsored by Kutnia, Massdirect, and Fırın @the Cemetery, and organized by Uğurhan Akdeniz, the exhibition dissolves the conventional boundaries between artwork, audience, and exhibition space. Rather than existing as isolated objects, the works expand into the surrounding environment, transforming the entire venue into a single immersive installation.", "Internal Combustion pays tribute to the hidden labor performed beneath the hood—the engine as the anonymous workhorse of modernity. By foregrounding this often-overlooked relationship, Selçuk offers a gesture of appreciation toward a technology that has shaped contemporary civilization and now stands on the threshold of historical transition.", "Central to Selçuk’s practice is an evolving interest in participation and interaction. The exhibition brings together kinetic works, deconstructive objects, and installations infused with humor, encouraging visitors to engage physically as well as intellectually. Conceived as a one-night pop-up exhibition, Internal Combustion draws from the rich visual and cultural language surrounding automotive history to create an experience that is both playful and reflective.", "The exhibition exemplifies Selçuk’s broader artistic approach. By working with a familiar and widely accessible subject, he constructs works that initially appear straightforward, yet gradually reveal multiple layers of meaning. What first resembles a complete image unfolds into something closer to a crossword puzzle, inviting viewers to actively complete the work through their own interpretations.", "For Selçuk, the act of production is itself an artistic medium. Echoing automotive designer Carroll Shelby’s famous statement, “Performance is my business,” he approaches the creative process as a performative act. Driving a vehicle whose tires have been coated in paint, the artist traces symbolic routes through the landscape of motor culture, transforming movement itself into a mark-making process.", "Based in Istanbul, Tuğberk Selçuk studied Industrial Design at Yeditepe University before continuing his education at Marmara University’s Faculty of Fine Arts. Since 2012, he has presented four solo exhibitions and participated in numerous group exhibitions in Istanbul as well as internationally, including London, Seoul, Milan, and Basel.", "Incorporating elements of popular culture into his practice, Selçuk resists overtly politicizing his work, instead viewing the act of creation as inherently political. He regards artistic production as an intensely personal process and rejects the tendency of professional art discourse to over-intellectualize creative practice. Guided by the belief that conceptual depth should never compromise accessibility, his works bring the classical into dialogue with the contemporary, the ordinary with the refined, producing layered works that remain firmly rooted in craftsmanship and aesthetic precision.", "Critical of the insulated culture that increasingly surrounds contemporary art and its reception, Selçuk continues to challenge the separation between artwork and audience through interactive installations that invite viewers to become active participants in the experience.", "About the artist", "Born in Istanbul in 1986, Tuğberk Selçuk lives and works in Istanbul. After studying in the US and the UK, he studied industrial design at Yeditepe University and sculpture at Marmara University. He has held solo exhibitions internationally, including in London, Seoul, Milan, and Basel, and has shown at the Elgiz Museum, Istanbul."]}, {"title": "Halil Vurucuoğlu — Reborn", "year": "2016", "cat": "Gallerist", "type": "", "what": "Halil Vurucuoğlu attempts to fold the pages of an ancient and ever-contemporary mythology. However with a mass that is visible only when inspected closely and slanted... The architecture of peinture and painting. Perhaps a collective subconscious emerging exponentially...", "why": "Cave, wet, protective and a place to return to. “Reborn” paintings by Halil Vurucuoğlu presents us with this primordial archetype. The womb of Rebirth as well as its primordial source...", "who": "Artist Manager", "imgs": ["SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/1_2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_07.jpg", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2_2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_06.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/Screen Shot 2026-07-08 at 20.08.19.png", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/Screen Shot 2026-07-08 at 20.08.39.png", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_01.jpg", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_02.jpg", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_03.jpg", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_04.jpg", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_05.jpg", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_09.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_10.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_11.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_12.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_13.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_14.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_15.webp", "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_16.jpeg"], "vids": [], "bodyp": ["Galerist hosted Halil Vurucuoğlu’s sixth solo exhibition, Reborn, from 7 April to 7 May 2016. Taking its starting point from Carl Gustav Jung’s archetype of the same name, the show breaks down the mysterious layers of the subconscious, using representative images and symbols to examine a person’s inner world and the questions of why and how.", "Playing with the viewer’s perception of space, the artist re-stages the subconscious in different forms, setting out to uncover the hidden truths behind appearances — psychological expressions, the inner contradictions between heart and mind, and the relationships of cause and effect. Out of this intense mental process, he decides to seek the manifestation of the resulting emotional state by returning to the most fundamental source: nature, the origin of our existence.", "Examining human and non-human conditions in parallel with his own life, Vurucuoğlu questions the tides between matter, meaning, mind, and emotion in order to understand the conditions that shape human behavior. In his multi-layered, hand-cut watercolor works, he lifts images of mountain, sea, and sky out of the merely visual and turns them into multi-dimensional expressions that symbolize the masculine and feminine substrata the subconscious holds.", "The installation Reborn, which gives the exhibition its name, gathers this search to understand and give voice to the subconscious into a single space.", "About the artist", "Halil Vurucuoğlu was born in İzmir in 1984. He received his BA from Dokuz Eylül University, Faculty of Fine Arts, Department of Painting."], "pdf": "SA_WEBSITE/83-2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul/2016_Gallerist_Halil-Vurucuoglu_Galerist_Istanbul_doc_04.pdf", "pdflabel": "Catalogue"}, {"title": "Robert Montgomery", "year": "2016", "cat": "Gallerist", "type": "Press release", "what": "One of the largest permanent public artworks in Turkey — Robert Montgomery’s Izmir light poem on the Point Bornova rooftop, “Quietly before morning, the sea must have dreamed the city,” produced with the artist in Istanbul and installed in Secil’s hometown, visible across the city.", "why": "Montgomery’s poetic light-text carried into the everyday fabric of the city — a permanent public poem she produced end to end, from fabrication in Istanbul to installation in her hometown, Izmir.", "who": "Gallery Director — Istanbul’74", "imgs": ["SA_WEBSITE/82-2016_Gallerist_PublicArt_Robert-Montgomery_Istanbul74_Izmir/1_2016_Gallerist_Robert-Montgomery_Istanbul74_Izmir_03.jpg", "SA_WEBSITE/82-2016_Gallerist_PublicArt_Robert-Montgomery_Istanbul74_Izmir/2_2016_Gallerist_Robert-Montgomery_Istanbul74_Izmir_01.webp", "SA_WEBSITE/82-2016_Gallerist_PublicArt_Robert-Montgomery_Istanbul74_Izmir/3_2016_Gallerist_Robert-Montgomery_Istanbul74_Izmir_05.jpg", "SA_WEBSITE/82-2016_Gallerist_PublicArt_Robert-Montgomery_Istanbul74_Izmir/4_2016_Gallerist_Robert-Montgomery_Istanbul74_Izmir_06.jpg"], "vids": [], "bodyp": ["ISTANBUL'74 presents a large-scale outdoor site-specific art project by Robert Montgomery — the artist's first in Izmir, realized for Point Bornova. One of the largest permanent public art installations in Turkey, the work brings Montgomery's signature poetic light-text language into the public space of the city.", "The project was produced from start to finish by Secil Alkis: developed and fabricated in Istanbul and installed on site in Izmir — her hometown. From production through to installation, the work was carried through every stage as a single continuous undertaking, culminating in one of the country's most ambitious public art works.", "Robert Montgomery brings a poetic voice and public-interventionist strategy to the tradition of contemporary text art, working across light installations, billboard pieces, fire poems, woodcuts and watercolours. Sited outdoors at scale, the Point Bornova installation extends that practice into the everyday fabric of the city, where its text meets the public directly.", "About the artist", "Born in Scotland in 1972, Robert Montgomery lives and works in London. He studied fine art at Edinburgh College of Art. Known for text-based light and billboard “poems,” he participated in the 2011 Venice Biennale and the 2012 Kochi-Muziris Biennale."]}, {"title": "Gail Albert Halaban", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "Gail Albert Halaban’s “Out My Window” — focuses on the paradox of life in urban societies, where people go about their everyday lives with no interaction with one another. Her first Istanbul project.", "why": "focuses on the paradox of life in urban societies, where people go about their everyday lives with no interaction with one another.", "who": "Gallery Director — Istanbul’74", "imgs": ["SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/1_2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_25.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2_2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_18.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/3_2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_19.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_01.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_02.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Hal Albert-Halaban_Istanbul74_Istanbul_20.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_21.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_22.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_23.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_24.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_26.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_27.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_28.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_29.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_30.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_31.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_32.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_33.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_34.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_35.jpg", "SA_WEBSITE/81-2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul/2015_Gallerist_Gail-Albert-Halaban_Istanbul74_Istanbul_36.jpg"], "vids": [], "bodyp": ["ISTANBUL'74 is pleased to present the first photography project, 'Out My Window' — Istanbul, by Gail Albert Halaban in Istanbul, Turkey. After the international success of the series on NYC and Paris, Gail Albert Halaban shot around the city of Istanbul in September 2015 and showed her works at the ISTANBUL'74 Galatasaray Gallery from November 20th, 2015 to January 23rd, 2016.", "Through 'Out My Window,' the artist brings together neighbors who have never met and invites them to stand in each other's shoes for the time of a photoshoot, transforming their relationships with each other and the local urban community.", "Gail Albert Halaban focuses on the paradox of life in urban societies, where people go about their everyday lives with no interaction with one another. The artist sheds light on the unseen of city life and plays with the notion of collective voyeurism. The project creates an interaction between the participants by sharing their intimate and private life and encourages them to explore the distance among them.", "After completing projects in New York City and Paris, which have been exhibited internationally and published as monographs, Gail Albert Halaban found inspiration in Istanbul for the new series. ISTANBUL'74 published a book of the project after the exhibition.", "About the artist", "Born in Washington, D.C., in 1970, Gail Albert Halaban lives and works in New York. She earned her BA at Brown University and an MFA in photography from the Yale University School of Art. Known for the series Out My Window, her work is held in collections including the George Eastman Museum, the J. Paul Getty Museum, and the Nelson-Atkins Museum of Art."]}, {"title": "Robert Montgomery", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "Robert Montgomery’s first solo show in Turkey — light installations, watercolours, woodcuts and fire poems, supported by Audemars Piguet.", "why": "Poems as public objects. Turkey hadn’t met this voice; it needed to.", "who": "Gallery Director — Istanbul’74", "imgs": ["SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/1_2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_25.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_21.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_22.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_23.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_24.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_26.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_27.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_28.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_29.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_30.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_31.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_32.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_33.jpg", "SA_WEBSITE/80-2015_Gallerist_Robert-Montgomery_Istanbul74_Paris/2015_Gallerist_Robert-Montgomery_Istanbul74_Paris_34.jpg"], "vids": [], "bodyp": ["CHAPTER 6 IN WHICH WE SIT LIKE DOCILE CATTLE WHILE YOU USE THE AESTHETICS OF PUNK ROCK TO SELL CREDIT CARDS BACK TO US", "In partnership with Galerie Nuke and ARTCOP21 of the COP21 climate conference; held during Paris FIAC.", "ISTANBUL'74 and Galerie Nuke celebrated the opening of Robert Montgomery's \"Chapter 6\" exhibition in Paris on October 20, 2015. The latest show of Montgomery's work in Paris, realised in partnership with ARTCOP21 of the COP21 climate conference, took place during the Paris FIAC. The exhibition officially opened to the public on October 21st with several new works that build on Montgomery's ongoing engagement with the seminal text \"The Society of the Spectacle\" by situationist philosopher Guy Debord.", "On Tuesday, October 20th, a private preview was followed by an intimate dinner at Chez Castel in Paris, hosted by Demet Müftüoğlu Eseli (Co-Founder of ISTANBUL'74 and of the Istanbul International Arts and Cultural Festival) and Jenny Mannerheim (Founder and Creative Director of EachxOther).", "Scottish artist and poet Robert Montgomery follows a tradition of conceptual art, his work bringing a poetic voice to the discourse of text art. In Chapter 6, Montgomery explores ecological and social concerns through watercolours, woodcuts, energy-efficient light panels, and a new installation piece made from copper, recycled glass, and 12-volt LED lighting.", "The exhibition showcases works that build on Montgomery's engagement with \"The Society of the Spectacle.\" We currently find ourselves in the middle of chapter 6, \"Spectacular Time,\" in which every last vestige of our lives has become commodified. Media and consumerism are on post-industrialisation overdrive, and we are no longer aware of ourselves or of the impact we exert on the world around us. With subtle references to Jack Kerouac and Ezra Pound, Montgomery's work implores us to take note of environmental and ecological issues, alluding to the unsustainability of the electric city we have developed and highlighting the necessity of a radical change in lifestyle — a pertinent theme given that the United Nations Climate Change Conference would unfold in Paris later that year.", "About the artist", "Born in Scotland in 1972, Robert Montgomery lives and works in London. He studied fine art at Edinburgh College of Art. Known for text-based light and billboard “poems,” he participated in the 2011 Venice Biennale and the 2012 Kochi-Muziris Biennale."]}, {"title": "Leo Lunatic", "year": "2015", "cat": "Gallerist", "type": "", "what": "Graffiti artist Leo Lunatic’s cult-cinema wall project through the Esas 14 Burda mall in Bolu — film-poster street art at architectural scale, centred on the cinema floor.", "why": "Street art brought indoors and blown up to building scale — Leo Lunatic’s “Angry Panda” language turned onto a single subject, a continuous tribute to the icons of Turkish and world cinema running through a shopping mall.", "who": "Gallery Director-Istanbul’74", "imgs": [], "vids": [], "bodyp": ["The Esas 14 Burda shopping mall in Bolu — three floors, 120 stores — opened in November 2015. Its walls were decorated by graffiti artist Leo Lunatic with imagery drawn from the most iconic cult films of Turkish and world cinema. The film-poster graffiti runs through the building and centers on the cinema floor (today Paribu Cineverse), turning the mall's interior into a continuous tribute to classic cinema.", "Leo Lunatic is a street and graffiti artist best known for his \"Angry Panda\" (Kızgın Panda) characters, which appear across Istanbul — most visibly in Beyoğlu and Cihangir — in many guises, often holding a spray can or wearing a fez. The 14 Burda commission moved that street-art language indoors and at architectural scale, applying it to a single unifying subject: cinema.", "[Compiled from press coverage: Milliyet (7 Nov 2015), avmdergi (5 Nov 2015), 14 Burda AVM. Artist bio details such as birthplace/year were unverified and intentionally omitted.]"], "name": "Gallerist_Public-Art_Leo-Lunatic", "num": 79, "ig": ""}, {"title": "JR", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "The Istanbul screening of JR’s Ellis Island film ‘Ellis’ — starring Robert De Niro, written by Eric Roth, scored by Woodkid — after its New York premiere.", "why": "A film about the people history files under “denied entry.” Exactly who the eye keeps going to.", "who": "Gallery Director", "imgs": ["SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/1_2015_Gallerist_JR_Istanbul74_Istanbul_01.webp", "SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/2015_Gallerist_JR_Istanbul74_Istanbul_02.jpg", "SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/2015_Gallerist_JR_Istanbul74_Istanbul_03.jpg", "SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/2015_Gallerist_JR_Istanbul74_Istanbul_04.jpg", "SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/2015_Gallerist_JR_Istanbul74_Istanbul_05.webp", "SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/2015_Gallerist_JR_Istanbul74_Istanbul_06.png", "SA_WEBSITE/78-2015_Gallerist_JR_Istanbul74_Istanbul/2015_Gallerist_JR_Istanbul74_Istanbul_07.jpg"], "vids": [], "bodyp": ["The short film stars Academy Award winner Robert De Niro, was written by Academy Award winner Eric Roth, and is directed by the artist JR, whose Unframed art installations in the abandoned Ellis Island hospital complex serve as the set for this powerful and timely film. For millions of immigrants entering the United States in the early twentieth century, Ellis Island was the gateway to a new life. Upon arrival, some travelers were approved, but many — due to illness or simply fatigue — were denied access and hospitalized.", "Ellis, a fourteen-minute film, tells the elusive story of countless immigrants whose pursuit of a new life led them to the now-shuttered Ellis Island Immigrant Hospital. Following its opening in 1902, approximately 1.2 million people passed through the facility, where the Statue of Liberty can be seen from the windows. Languishing in a sort of purgatory awaiting their fate, many were never discharged.", "De Niro stars as an immigrant whose pursuit of a new life expired at Ellis Island. Shot on location, the film shows him deliberately traversing the abandoned hospital complex, accompanied by fellow ghosts of Ellis Island in the form of portraits pasted to the walls, windows and doors in JR's signature black-and-white style. Collectively titled Unframed, each picture was made from archival photographs of immigrants and hospital patients taken over a century ago.", "JR is known for public installations of large-scale, black-and-white portraits, such as Portrait of a Generation. Combining a sense of place, history, and documentary images, Ellis nudges our collective memory, evoking the countless individuals who seek freedom from persecution and poverty, abandoning their homes and families for a chance at a better, if uncertain, future.", "About the artist", "Born in Paris in 1983, JR lives and works between Paris and New York. A photographer and street artist who describes himself as a “photograffeur,” he is known for large-format black-and-white portraits pasted in public space and projects including Inside Out and Women Are Heroes. His work has been shown at the Brooklyn Museum and the Saatchi Gallery, London."]}, {"title": "Robert Montgomery", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "Robert Montgomery’s ‘Chapter 6’ with Galerie Nuke, Paris — staged during FIAC and as part of ARTCOP21 around the COP21 climate summit.", "why": "Text art pushed onto the street during the climate summit — the message meeting its moment.", "who": "Gallery Director — Istanbul’74", "imgs": ["SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/1_2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_10.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_01.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_08.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_09.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_11.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_12.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_13.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_14.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_15.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_16.jpg", "SA_WEBSITE/77-2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul/2015_Gallerist_Robert-Montgomery_Istanbul74_Istanbul_17.jpg"], "vids": [], "bodyp": ["\"Istanbul has inspired me since my first visit in 2010. I love the mixture of voices and the mixture of cultures — the call to prayer at sunset mixing with the sound of Nirvana songs from the cafes of Galata for me sums up the wonderful cultural diversity and spirituality of the city. I was introduced to Istanbul 74 through their IST Festival, which I think is one of the most important festivals of contemporary culture in the world. I am delighted to return to Istanbul properly to work with Demet and the team for my first solo show in Turkey.\" — Robert Montgomery", "ISTANBUL'74 is pleased to present the first solo show of Robert Montgomery in Istanbul, Turkey. The exhibition, including the artist's works in different techniques — from light installations to watercolor paintings — will be on display between March 19th and April 18th.", "Montgomery is known for keeping conceptual art traditions alive by using texts and poems as the base of his works. Wood engraving, watercoloring, flames, light installations and billboard installments are some of his prominent techniques. In the belief that poems will find their place back in today's very contemporary world, Montgomery's works reflect intensely with poetry. Strengthened through collective subliminal topics, they attract a wide range of audiences with their strong texts and unique presentations.", "Presenting a wide range of media used by Robert Montgomery, the show features a number of his major light installations produced in the last 5 years, along with some of his woodcuts, a series of watercolors, the prints of the LA Billboard poems on huge billboards in Los Angeles, and documentation of the Fire Poem produced in the gardens of the Louvre.", "About the artist", "Born in Scotland in 1972, Robert Montgomery lives and works in London. He studied fine art at Edinburgh College of Art. Known for text-based light and billboard “poems,” he participated in the 2011 Venice Biennale and the 2012 Kochi-Muziris Biennale."]}, {"title": "TheChicken And The Egg", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "RODEO’s “The Chicken and the Egg” in London — fifteen artists across film and installation, including Turner Prize winner Duncan Campbell.", "why": "Fifteen ways of circling cause and effect — refusing the easy answer.", "who": "Istanbul Gallery Director — RODEO", "imgs": ["SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/1_2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_02.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_01.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_04.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_05.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_06.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_07.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_08.jpg", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_09.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_11.jpg", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_12.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_14.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_15.webp", "SA_WEBSITE/76-2015_Gallerist_TheChicken-And-The-Egg_RODEO_London/2015_Gallerist_TheChicken-And-The-Egg_RODEO_London_18.webp"], "vids": [], "bodyp": ["Mark Aerial Waller has been using cinema as material for his videos, be that film or films and videos by other artists. Mostly known for his interventionist film installations where the material world and the filmic merge through a magical moment of some sort of effect. Mark Aerial Waller studied Fine Art (Film & Video) at Central Saint Martins College of Art, London (BA Hons). His solo exhibitions include SO-LA, Cell Projects, London (2012); Offering Transmissions, Rodeo, Istanbul (2012); The Cassiopeia Plan, Wysing Arts Centre, Cambridge (2010); Resistance Domination Secret (event), 0-60, ICA, London (2008). His group exhibitions include Assembly. A Survey of Recent Artists’ Film and Video in Britain, Tate Britain, London (2014); Random Acts, ICA, London (2013); Baltic Triennial, CAC Vilnius, Lithuania (2012); Superpower: Science Fiction in Africa, Arnolfini, Bristol (2012); More Soup & Tart (sculptural performance), Barbican, London (2011); Performing Presence, The National Centre for Contemporary Art, St Petersburg (2010); This Place You See Has No Size At All…, Kadist Foundation, Paris (2009); Heaven, 2nd Athens Biennale, Athens (2009); You Have Not Been Honest, Museo d’Arte Contemporanea Donnaregina, Naples (2007); Changing Times, Tate Britain, London (2003). Mark Aerial Waller participated in the Wysing Arts Centre residencyin 2009-2010, and received the Elephant Trust Award (2009).", "His practise traverses installation, video and sculpture, in order to examine the structural and material circulations of objects, people, histories and economy. A common thread amongst his various works is the reworking of existing structures and the making images of images in ways that eventually erase or replace the original. Eventually it becomes unclear what is the original and what is the copy. Shadi Habib Allah studied at Bezalel Academy of Arts and Design, Jerusalem (BFA) and School of the Arts, Columbia University, New York (MFA). His solo exhibitions include Asparagus Pimp, Reena Spaulings Fine Art, New York (2014); Evacuated Containers, Green Art Gallert, Dubai (2013); 99, Nashashibi Center, Jerusalem (2005); Untitled 2004, sponsored by A.M. Qattan Foundation, Al-Hajaj Gallery, Ramallah (2004). His group exhibitions include New Museum Triennial, New York (2015); Nouvelles Vagues, Palais de Tokyo, Paris (2013); Frozen Lakes, Artists Space, New York (2013); Caravan, Maraya Art Centre, Sharjah (2011); 3rd Riwaq Biennale, Ramallah (2009); Palestine c/o Venice, Venice Biennale, Venice (2009); In Focus, Tate Modern, London (2007). Shadi Habib Allah was twice awarded Second Prize in the Young Artist Award from the A.M. Qattan Foundation, and has attended residencies at Cittadelarte, Fondazione Pistoletto in Biella, Italy and Gasworks in London, England. He has works in the collections of Zabludowicz Collection, London and the Barjeel Art Foundation, Sharjah. Shadi Habib Allah was nominated for the Luma Award (2011), and was also the 2012 recipient of the Louis Comfort Tiffany Award.", "A painter by introductions, his real preoccupations are architecture, disegno and real beauty.Lukas Duwenhögger studied at the Kunstakademie München, Munich and the Kunstakademie Düsseldorf, Düsseldorf. His solo exhibitions include Made in Hot Weather, Rodeo, London (2014); Prinzenbad, Kunstverein Hamburg, Hamburg (2004); Malmö Museet, Malmö (1997); Künstlerhaus Stuttgart, Stuttgart (1995). His group exhibitions include Signs Taken in Wonder, MAK, Vienna and Kunstverein Hannover, Hannover (2013); Disidentification, Göteborgs Konsthall, Göteborg (2010); dOCUMENTA (12), Kassel (2007); The Subversive Charm of the Bourgeoisie, Van Abbemuseum, Eindhoven (2006); 9th International Istanbul Biennial, Istanbul (2005); The Undiscovered Country, Hammer Museum, Los Angeles (2004); Organized Conflict, Proje41, Istanbul Museum of Contemporary Art, Istanbul (2003); The Passion and The Wave, 6th International Istanbul Biennial, Istanbul (1999); From The Corner of The Eye, Stedelijk Museum, Amsterdam (1998); Oh Boy…It’s A Girl, Kunstverein München, Munich (1994). Future solo shows include Artists Space, New York (March 2016) and Raven Row, London (June 2016). His work is in several private collections.", "A collector by nature, Epaminonda gathers elements stemming from all civilizations and times. Working with paper, photography, video and bringing all sometimes in what we want to call installations, her work can also be seen as an endless performance. The found world in abysmally new constellations handled with immense sensitivity and humour, like someone making a bouquet of rare flowers. Haris Epaminonda studied at Chelsea College of Art & Design, London, Kingston University, London and Royal College of Art, London.", "Apostolos Georgiou (b. 1952, Thessaloniki) lives and works in Athens and Skopelos.", "His large-scale paintings are staged performances of the unconscious. Events we see and moments that happen and we don’t see. The scale of the paintings magnify the emotional scale of the state of the everyday. The men and the women are cartoons stuck in real dramas with the men go through an endless existential caricature for a life. Apostolos Georgiou studied Architecture at Hochschule für Angewandte Kunst, Vienna and Accademia di Belle Arti di Firenze, Florence. His solo exhibitions include Lost Dreams, AD Gallery, Athens (2015); Everyday A Stage, Rodeo, Istanbul (2014); Apostolos Georgiou, gb agency, Paris (2014); Macedonian Museum of Contemporary Art, Thessaloniki (2012); Apostolos Georgiou. Painting, EMST, Athens (2011). His group exhibitions include Burning Down The House, 10th Gwangju Biennale, Gwangju (2014); This is not my Beautiful House, Kunsthalle Athena, Athens (2014); Everywhere But Now, 4th Thessaloniki Biennale, Thessaloniki (2013); Who Is There?, Macedonian Museum of Contemporary Art, 1st Thessaloniki Biennale, Thessaloniki (2007). He has works in the collections of Pompidou, Paris; Collection Pinault, Venice; and the National Gallery of Victoria, Melbourne.", "Preoccupied with archaeology and technologies of advance and progress, the work is deeply rooted in the Modern. Man’s journeys into the unknown, his failures and achievements come together in the drawings and sculptures that usually become elements of the dystopia that hovers the work. Playful and sad, miniature and grand cohabit the universe of an old but young man. Emre Hüner studied at the Brera Academy of Fine Arts, Milan. His solo exhibitions include Floating Cabin Rider Capsule Reactor Cycle, CCA, Kitakyushu (2015); Mam Project 019: Emre Hüner, Mori Art Museum, Tokyo (2013); Aeolian, Rodeo and Nesrin Esirtgen Collection, Istanbul (2013); Salt 6, Utah Museum of Fine Arts, Salt Lake City (2012); The New Horizon, Stroom Den Haag, The Hague (2010); Juggernaut, Rodeo, Istanbul (2009). His group exhibitions include 14th Istanbul Biennial (2015 – upcoming); Approximately Infinite Universe, Museum of Contemporary Art San Diego, San Diego (2013); Signs Taken In Wonder, Mak Austrian Museum of Applied Arts / Contemporary Art, Vienna (2013); Station K43, Remap, Athens (2013);", "Doris Duke’s Shangri La, New York Museum of Art and Design, New York (2012); Manifesta 9, Genk (2012); In 15 minutes Everyone Will Be In The Future, Center for Contemporary Art, Ancient Baths, Plovdiv (2012); Out of here, Van Abbemuseum, Eindhoven (2011); Paradise Lost, Istanbul Modern, Istanbul (2011); The Future Of Tradition, Haus Der Kunst, Munich (2010); Living In Evolution, Busan Biennal, Busan (2010); The Generational: Younger Than Jesus, New Museum, New York (2009); Apt, 6th Asia Pacific Triennial of Contemporary Arts, Queensland (2009); Moment Of Agency, Kunsthalle Basel & Kunstmuseum Basel, Basel (2008); Module 1 / Carte Blanche À L’Association DCA, ‘Fear And Desire’, Palais de Tokyo, Paris (2008); 10th Istanbul Biennial, Istanbul (2007). His works are in the collections of Tate, London; Princeton University Museum, New Jersey; and The Spencer Museum, Lawrence. Hüner participated in the Rijksakademie Van Beeldende Kunsten residency, Amsterdam (2010).", "Picks up forgotten stories from the streets and places that provide the past in vast quantities. A conservator who restores stories and brings back ghosts forgotten and unseen, his paintings, sculptures and installations are immersive fragments of a past most of us recognise and relate to. Eftihis Patsourakis studied Fine Art at Athens University of Fine Arts, Athens (BA) and at Central Saint Martins College of Art and Design, London (MA). His solo exhibitions include Doings on Time and Light, two-person exhibition with Michael Anastassiades, Rodeo, Istanbul (2014); Desire For Truth, Eleni Koroneou Gallery, Athens (2010); Problems Of Everyday Life, Rodeo, Istanbul (2008); History In Memory, Eleni Koroneou Gallery, Athens (2007); Xippas Gallery, Paris & Athens (2005). His group exhibitions include “Nautilus” Navigating Greece, BOZAR, Brussels (2014); Double Double, Workplace Gallery, Gateshead (2011); Une Idee, Une Forme, Un Etre -Poesie/Politique du corporel, Migros Museum, Zurich (2010); BYOB, Kunsthalle Athena, Athens (2010); Paint-Id, Macedonian Museum of Contemporary Art, Athens (2009); Expanded Ecologies, National Museum of Contemporary Art, Athens (2009). His work is in the collection of the Migros Museum, Zurich. Eftihis Patsourakis is the recipient of the DESTE Prize, Museum of Cycladic Art / DESTE Foundation, Athens (2001).", "The videos that he composes are emotional explosions made of images that come from our collective unconscious. Tough and popular by first sight what hides underneath are a blossoming flowers lying in the mud. The work goes from video and sound to layers of images on top of each other, work with fabrics and weaving patterns he gathers from books, videotapes and poetry. James Richards studied Fine Art at Chelsea School of Art and Design, London (BA). His solo exhibitions include James Richards, Kunstverein München, Munich (2015); The Screens, Rodeo, Istanbul (2013); James Richards, CCA, Kitakyushu (2012); Not Blacking Out, Just Turning The Lights Off, Chisenhale Gallery, London (2011); Art Now: Clunie Reid and James Richards, (with Clunie Reid), Tate Britain, London (2010); Call and Bluff, Tramway, Glasgow (2009). His group exhibitions include Aleksandra Domanović, Yngve Holen and James Richards: Ars Viva 2014/2015, Bonner Kunstverein, Bonn (2015); Biennale of Moving Images 2015, Museum of Old and New Art, Tasmania, Australia (2015); Ars Viva 2014/2015, Hamburger Kunsthalle, Hamburg (2014); Moving Images at the Heart of the Centre. Biennale of Moving Images 2014, Centre d’art contemporain, Geneva (2014); Cut to Swipe, MoMA, New York (2014); Burning Down the House, 10th Gwangju Bienniale, Gwangju (2014); Turner Prize 2014, Tate Britain, London (2014); Looking Back: The Eighth White Columns Annual, White Columns, New York (2014); Meanwhile … Suddenly and Then, 12th Biennale de Lyon, Lyon (2013); Otherwise Unexplained Fires, Malmö Konsthall, Malmö (2013); The Encyclopaedic Palace, 55th Venice Biennale, Venice (2013); Frozen Lakes, Artist Space, New York (2013); The Imaginary Museum, Kunstverein München, Munich (2012); Coming After, The Power Plant, Toronto (2011); Generational: Younger Than Jesus, The New Museum Of Contemporary Art, New York (2009). His work is in the collections of MoMA, New York; Zabludowicz Collection, London; FRAC Midi-Pyrenees, Toulouse; Collection Louis Vuitton, Paris; Arts Council England, London; and Tate, London. Richards is the recipient of the Ars Viva Prize (2014), DAAD Artist in Berlin Programme (2013-2014) and the Derek Jarman Award (2012). He was shortlisted for the Turner Prize (2014)."]}, {"title": "The Fall", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "RODEO’s ‘The Fall’ — a nine-artist show taking apart patriarchy and hegemony across two spaces, including the Haerizadeh brothers. *add artist names.", "why": "Nine artists taking apart the systems we’re told are natural.", "who": "Istanbul Gallery Director — RODEO", "imgs": ["SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/1_2015_Gallerist_The-Fall_RODEO_Istanbul_18.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2_2015_Gallerist_The-Fall_RODEO_Istanbul_12.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/3_2015_Gallerist_The-Fall_RODEO_Istanbul_03.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/4_2015_Gallerist_The-Fall_RODEO_Istanbul_06.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_02.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_05.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_08.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_09.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_10.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_11.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_14.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_16.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_20.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_21.webp", "SA_WEBSITE/75-2015_Gallerist_The-Fall_RODEO_Istanbul/2015_Gallerist_The-Fall_RODEO_Istanbul_23.jpg"], "vids": [], "bodyp": ["In an effort to deconstruct patriarchy and structures based on hegemonic practices, Rodeo brings together a group exhibition that will take place in two spaces; the gallery on Sıraselviler Caddesı no 49 and the space of Near East magazine and projects in Dolaptere.", "THE FALL is never ending and this exhibition could be material that constantly changes as the current historical moment requires. The artists’ list could be endless and its (sexual) identity more mixed but at this first stage no woman is part of it. Not that the feminine doesn’t come hand in hand with hegemony or that women are innocent. From Cleopatra to Maggie Thatcher, from Empress Theodora to Angela Merkel; and on and on. But this exhibition is not about that. John DeLorean, national symbols, Archbishop Makarios, a cable conduit, a series of family photos and Abdulah Ocalan, become the begining of a story that is a proposal without an end of how we can deal with the world we inherited and the one we keep pushing. It is (not) one way of seeing things. But how to continue from here? And how to deal with what’s been already achieved? And what is left to do?", "MAKE IT NEW JOHN (200
