9) by Duncan Campbell portrays the failure of engineering genius John DeLorean. The son of a Romanian immigrant, after quitting from General Motors convinced the British Labour Government to fund his new project; a factory in Belfast that manufactures a new sports car. Despite the success of the attractive model with thousands of sales, the company could not generate profits and the factory shut under Thatcher in 1982, and the glamorous DeLorean was arrested by the FBI.", "Lukas Duwenhögger’s UFO STAR (2014), a sculpture made for the artist’s solo show in London with Rodeo, is an assemblage. Commandante Che invites us in the comforting climatized hall, placed on a box of an UFO heater, surrounded by shinny bits of reds, blues and blacks. A sweet gesture from an alienated leader at a neoliberal time.", "The sculptures of Ramin Haerizadeh, Rokni Haerizadeh and Hesam Rahmanian are the perfect damaged heroes. The practice of the three artists as a group, as any collaborative act, is by default an ego-less, anti-hierarchical gesture. While having independent practices the three artists, who live and work in the same house and make work together, respond to politics and war with a sense of joy and hallucination. Accidents become part of the work and spontaneity and humour is crucial to the sculptures. The material for the works on paper come from personal family photos as well as newspaper clippings the artists collect.", "I LAND (2010) is the last piece of a trilogy that is the result of a series of research carried out by Christodoulos Panayiotou in various archives in Cyprus. Found in the Press and Information Office in Nicosia, these photographs follow and document the public life of the leader of the country between 1960 and 1977. While recording the public life of Archbishop Makarios, the photographer in his free time was shooting scenes of leisure, beauty and daily life writing a parallel history to the official one he was hired to do.", "INTERMEDIATE PREVENTIVE (2014) is a work by Cameron Rowland that has a mirrored self work that will be exhibited at Rodeo, London as part of the exhibition The Chicken and the Egg, A Chicken (opening June 6 2015). While the work in Istanbul is available for sale the work in London is a rental. Common in Rowland’s practice is to engage the buyer of his work in a dialogue about ownership, rights and responsibility over the work one gets. Conduits cover electrical cables that run on buildings’ facades which mainly power security lights or surveillance cameras. Intermediate Preventive consists of conduit, cable, and a high-pressure sodium wall pack. The light fixture is not shown and will never be in the custody of the collector, but will remain in the possession of the artist.", "A starting point for this exhibition has been John Smith’s FLAG MOUNTAIN (Southern Nicosia, looking towards the border with the Turkish Republic of Northern Cyprus) (2010). Life in Nicosia goes on while an ‘invisible’ dramaturgy takes place every day, as the carved flag on the mountain Exadaktylos appears with the daylight and disappears while appearing stronger with the lit elements at night. Smith’s sense of humour and strong visual language compose a perfect deconstructed monument, be it a National Anthem and a Flag.", "Vangelis Vlahos’ IS THERE ANY OVERSIGHT ON OCALAN? (2009-2011) consists of 119 images recreating Kurdish leader Abdulah Öcalan’s known and rumored route before his capture outside the Greek ambassador’s residence in Nairobi on February 15, 1999 and his transfer to Turkey. The work arranged formally on a 23 meter long wall-mounted shelf is consisted of landscape, cityscape, aerial and architecture images of Moscow, Rome, Athens, Minsk and Nairobi, where Öcalan hid or tried unsuccessfully to find political asylum after he left Damascus, Syria on October 1998. The photographs are presented in a row and the order follows Öcalan’s journey. For the localization of these pictures and the exact conditions (weather etc) existing during the period Öcalan was there, Vlahos used testimonies and articles related to the case, given that the photographic coverage of the route is very limited to non existent. Most of the images included were found in touristic guides and magazines of the late 1990’s and on the Internet.", "Ramin Haerizadeh (b. 1975, Tehran) lives and works in Dubai. He has exhibited in Charles Saatchi’s Unveiled: New Art from the Middle East, London (2009); Sharjah Biennial 10 (2011); The Trees Set Forth to Seek for a King at the Museum on the Seam, Jerusalem (2014). He has had three solo exhibitions at Gallery Isabelle van den Eynde and a solo at Gallery Nathalie Obadia, Paris (2012). His works are held in a number of significant collections including Guggenheim Abu Dhabi, the British Museum, the Devi Art Foundation and the Rubell Family Collection. Haerizadeh has staged two collaborative exhibitions with Rokni Haerizadeh and Hesam Rahmanian at Gallery Isabelle van den Eynde, Dubai (2012, 2014) and one at Kunsthalle Zürich (2015). In 2014, the three artists participated as a collective in the Robert Rauschenberg Foundation’s residency in Captiva, Florida."]}, {"title": "Murat Pulat — Surface-Sequence", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "Murat Pulat’s ‘Surface Sequence’ — his painted film-still portraits, shown in the Netherlands.", "why": "The artist combines cinema, the art of the new age, with traditional materials such as canvas and oil paint, he saves viewers from being imprisoned in new technologies of visualization.", "who": "Artist Manager", "imgs": ["SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/1_2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_02.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_01.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_03.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_04.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_05.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_06.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_07.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_08.jpg", "SA_WEBSITE/74-2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland/2015_Gallerist_Murat-Pulat_MPV-Gallery_Netherland_09.jpg"], "vids": [], "bodyp": ["Murat Pulat, one of the most sought-after contemporary artists in Turkey in recent years, opened his first solo show in continental Europe at Mark Peet Visser Gallery in the Netherlands on 4 October 2015. His work had drawn worldwide collector attention through international auctions between 2011 and 2014 and strong interest at Contemporary Istanbul across those years, following the success of his January 2014 New York solo show, which brought his work into important private collections in the United States. Pulat is especially drawn to movie sequences by New Wave directors. Reproducing these scenes on canvas, he brings the images back into life, combining cinema — the art of the new age — with traditional materials such as canvas and oil paint, and freeing the viewer from being imprisoned in new technologies of visualization. Surface-Sequence is a large-scale show of Pulat’s most recent works. In this series he boldly deploys multi-layered fields of color; each work is at once calm, passionate, and vivid. As sequences from film move into a new aesthetic context, a new category of art emerges. About the artist Born in Akşehir, Turkey, in 1978, Murat Pulat lives and works in Istanbul. He studied Fine Art at Marmara University. His work has been exhibited internationally, including in Istanbul, London, Dubai, Los Angeles, and New York."]}, {"title": "Ceylan Öztürk — history in lowercase", "year": "2015", "cat": "Gallerist", "type": "Press release", "what": "Ceylan Öztürk’s “history in lowercase” at ALAN — the artist as historian, writing history from one subjective point of view.", "why": "History written from one person’s subjective view — the making of the show becomes its own documented history, and the viewer walking through becomes part of the writing.", "who": "Gallery Director — Curator — ALAN İstanbul", "imgs": ["SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/1_2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_01.jpg", "SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/2_2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_03.jpg", "SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/3_2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_04.jpg", "SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_02.jpg", "SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_05.jpg", "SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_06.jpg", "SA_WEBSITE/73-2015_Gallerist_History-In-Lowercase_ALAN_Istanbul/2015_Gallerist_History-In-Lowercase_ALAN_Istanbul_07.jpg"], "vids": [], "bodyp": ["For her fourth solo show, history in lowercase, Ceylan Öztürk — known for the scope of her exhibitions and for her installation and intervention works — assumes the role of a historian, addressing the writing of history from the subjective point of view of an individual artist.", "The works seek out similarities between the writing of history and the artist’s own practice, then combine them. Encapsulating a process within themselves, they also copy the abstract forms of certain social spaces, opening a space for movement in which viewers can spend their time productively. Allowing the viewer to become part of it, this new space becomes a mutual environment.", "Öztürk builds a structure inside the exhibition that lives with the space and keeps the process going. The making of the show itself becomes part of the work: she presents documents about the show’s own history, visualizing subjective history-writing. Ready-mades, images made by the artist, videos, and documents come together in a large installation that spreads through the whole space, relating the viewer’s movement and perception to the process of writing history.", "About the artist"]}, {"title": "Hayal Pozanti", "year": "2015", "cat": "Writer", "type": "Interview", "what": "Interview with Hayal Pozantı on her move from digital collage to abstraction and her dialogue with technology, for WARHOLA.", "why": "Abstraction taught to herself in conversation with the machine.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/72-2015_Writer_Hayal-Pozanti_WARHOLA/1_2015_Writer_Hayal-Pozanti_WARHOLA_01.png", "SA_WEBSITE/72-2015_Writer_Hayal-Pozanti_WARHOLA/2_2015_Writer_Hayal-Pozanti_WARHOLA_02.png", "SA_WEBSITE/72-2015_Writer_Hayal-Pozanti_WARHOLA/3_2015_Writer_Hayal-Pozanti_WARHOLA_03.png"], "vids": [], "bodyp": ["Secil Alkis: To begin with, can you talk a bit about yourself?", "Hayal Pozantı: I was born in Istanbul. I’m the only child of a father who works as a manager in the field of medicine and a mother who works as a data processing director in the same field. Following an elementary education in Houston, I graduated from Robert College in 2000 and the Visual Arts and Visual Communication Design department of Sabanci University in 2004. Then I started working as creative staff at Beymen. For two years I designed/created display windows, worked on interior designs for Beymen and Club Beymen; and I made drawings and designs for T-Box. As my personal artistic work began to become more intensive, I quit my full time job and started working freelance. Earning money by working for the fashion and music industries, I also began to take part in many exhibitions both in Turkey and abroad. Shortly after beginning to work full time as an artist, I applied for various Master programs abroad and I was accepted into the Painting/ Printmaking program of Yale University in 2009 with full scholarship, where I studied intensively with Peter Halley. After graduating from this program in 2011, I moved to New York and rented a studio in Bushwick. A few months after my move, I began to work with San Fransisco based Jessica Silverman Gallery. I worked as an assistant with Nathan Carter for a brief period, and then with Glenn Ligon for a longer time. Over the last two years, I’ve been working independently in my own studio. I still live in New York and have shows both in the US and in various cities worldwide. The most recent of these were: solo booth at Armory 2014 in New York with Jessica Silverman Gallery (March), solo show with Sussanne Vielmetter in Los Angeles (November), solo show in Duve in Berlin in November. In October my works will be on display at Prospect, the New Orleans biennial.", "S.A.: Your earlier work focused on digital collages, however your recent output comprises rather abstract works. Can you elaborate a bit on this transition?", "H.P.: As a result of being raised by a mother who works as a computer engineer, I have an unusual relationship and communication with technology. Since I was a child, I was raised with the motto “computers are the future”. Therefore I find it important that my works maintain a dialogue with technology. Studying at Sabanci University also had a significant influence in this regard. The fine arts program is in no way limited to just painting or sculpture. The education process has an emphasis on multimedia and focuses especially on conceptual art. Thus, long before I started painting, I was working a lot with computers. I worked mainly with programming, digital photography and installation in physical spaces. After a while, I began to spend increasingly more of time in front of a computer, which was also a result of the office life I found myself in after graduation. Around the time I started studying at Yale, it had turned into an addiction. Especially an addiction to the internet. I realized that I had began to spend all my time in front of the computer screen, withdrawing myself from the physical real life. This made me a slave to the technology behind the screen and prevented me from utilizing my body in the creative process. When the trouble of not being able to bring these computer-created images to life without a printer began to disturb me, I realized it was high time to get away from the computer. In a way, I stopped working with computer and began to use my hands again; the basis of creativity.", "S.A.: You were born and raised in Istanbul, but you now live in New York. Let’s talk about how it affects your art. Is this a deliberate preference?", "H.P.: Maybe I’d be repeating a cliche, but New York is really the center of the art world. Even the artists, curators and writers who don’t live here, make sure to stop by, make connections, and visit the most contemporary shows here. When I had the opportunity to stay here after completing my Master’s studies, I of course wanted to make use of it. As a result, I had the pleasure of meeting numerous people and sharing my works with them.", "S.A.: In another interview you told that; as you were working in the fields of fashion and music, your focus shifted rapidly towards art. Can you elaborate on that?", "H.P.: The fundamental reason why I was working in the fashion and music industries was to support myself financially while at the same time working as an artist. I needed to earn money, I knew many people in the fields of fashion and music, and therefore I had to opportunity of working in these fields. Music is still a very important part of my life, I’m still passionate about it. If I could be making music, I don’t know whether I’d be working in the field of visual arts at all.", "S.A.: Though your works are silent and calm, they also feature bold brush strokes. Can you tell us a bit about your paintings?", "H.P.: My interest in the concepts of silence and tranquility results rather from the effects of the computer screen on our concentration. Our relationship to visual data has completely changed with the emergence of the internet. The shock we experienced with the increased amount of data was similar to what the previous generations experienced with television. Suddenly, all our time was filled with equipment that offered to tickle us visually, 24 hours a day. Under such circumstances it became almost impossible to focus and look at one single thing serenely for a long time. Our gaze now jumps from one browser window to another, then to another program, then to the cellphone screen and then to the TV. As our eyes kept moving from one screen to another, we weren’t sure anymore –we even forgot–, what we’d focus our attention on, and especially how we’d accomplish that. In this regard, I feel that it’s now more important to paint or to create physical objects – just so that the artist can focus on a single point for a long time, and the viewers can pause for a moment in their busy lives and breathe. Silence and tranquility are essential in order for us to focus our minds, come up with new ideas, and –maybe the most important of all– to perceive and interpret the things going on around us.", "S.A.: You work with Jessica Silverman Gallery which is located in San Fransisco. Why are you working with a gallery outside New York?", "H.P.: In this age galleries aren’t limited to the physical spaces they exist in. There’s an increasing number of fairs and biennials around the world. Jessica Silverman is in this regard very active. Working with them, I had the opportunity of exhibiting my work in New York, Chicago and Dallas in addition to San Fransisco. We’ll be showing my works in Paris in October. I also had many solo and group shows in numerous galleries that I got to know with the help of Jessica Silverman Gallery. It’s of course my greatest wish to work with a New York gallery, as it’s where I live. But the most important thing is to build long-term relationships on solid foundations, and not to hurry. Therefore I’m sure that I’ll soon come across an opportunity.", "S.A.: Do you have any shows or projects in the near future?", "H.P.: Just this last week I had a solo booth at the Armory show with Jessica Silverman Gallery. In October, my works will be shown at the New Orleans biennial titled “Prospect”."]}, {"title": "Sanatorium", "year": "2015", "cat": "Writer", "type": "Interview", "what": "An interview with Feza Velicangil and Adnan Yerebakan of Sanatorium gallery, for WARHOLA.", "why": "A gallery that refuses to romanticize itself — openly commercial, wanting even the hardest work (video, installation, conceptual) to sell, and treating every boundary it pushes as a small shift in what collectors will accept.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/71-2015_Writer_Sanatorium_WARHOLA/1_2013_Writer_Sanatorium_WARHOLA_01.png", "SA_WEBSITE/71-2015_Writer_Sanatorium_WARHOLA/2_2013_Writer_Sanatorium_WARHOLA_02.png"], "vids": [], "bodyp": ["Warhola: Gallery space is a meeting point for artists, artworks, exhibitions, viewers and art professionals. Can you tell us about the location and the gallery space of Sanatorium?", "Feza Velicangil - Adnan Yerebakan: We love our gallery space. We’re aware that there are some problems; but still, when we compare its advantages to its disadvantages, we feel lucky. The location of the gallery is really good; people can find it easily. Thanks to our display window, we can attract the attention of people walking by. The fact that the exhibition space is divided into two floors makes its possible for us to make two simultaneous solo exhibitions. Artists usually like the scale and the indented shape of the gallery. Though the exhibition space is really important, it’s the office where we spend all our time. We tried to make the office as comfortable as possible. And I think we have succeeded, as it turned into a space in which we can have long conversations and establish contact with artists, viewers, collectors and people from the art scene.", "W: Sanatorium is one of the prominent galleries with its fitting and characteristic attitude in selecting the artists it works with. What is your approach?", "F.V.: We’re a little curious. Regardless of whether we work together with them or not, we like to meet all artists, see their works. This surely widens our perspectives.", "We try to provide as much support as possible to our artists with their artistic development. We try to keep sharing, keep in contact. The rest develops naturally.", "This is a continuous process and our ultimate goal is that, every kind of work we exhibit whether it’s conceptual art, a video or an installation– should be able to sell. We think that every time we push boundaries, we make small differences in the perceptions of art viewers and collectors. sanatorium", "W: Normally artists are asked about how they think a gallerist should be. However, how do you think an artist should be?", "F.V.: We feel an artist should be a little brave, he shouldn’t be afraid to make mistakes. He should keep working even if he doesn’t share the results with others; and regardless of whatever comes out of the creative process, he should not give up. It’s highly likely that the mistakes of today can turn into a basis for future works. The greatest problem for young artists is economic issues. Our advice to them would be: we know that it’s difficult, but you should have realistic expectations.", "W: As a gallerist you face the conflicts between the ethical and the aesthetic, the commercial and the managerial fields of art. How do you balance it?", "F.V.:  As a gallery, we’re a commercial institution. From the beginning we decided to be on the commercial side of the art scene. From time to time, we make exhibitions, in which there are works that we know will be hard to sell under the current conditions in Turkey. Our intention isn’t to create a balance between art-commerce, nor for redemption. This is a continuous process and our ultimate goal is that, every kind of work we exhibit –whether it’s conceptual art, a video or an installation– should be able to sell. We think that every time we push boundaries, we make small differences in the perceptions of art viewers and collectors.", "W: How can new galleries come up with alternatives to the relationship networks of older and settled art dealers?", "F.V.: We actually don’t know much about the relationships of settled and older galleries. Every person or institution would have different experiences. As a young gallery, we’ve set up our own network of connections according to the characteristics of Sanatorium and we’re expanding it. But it doesn’t comprise just collectors.", "This network began 2.5 years ago and continues to grow; it consists of artists, collectors, friends from academic institutions, viewers and of course our staff.", "Warhola: How is your relationship with the gallery you’re working with?", "Erol Eskici: The artists who played a role in the foundation of Sanatorium were close friends of mine, therefore we had a long-term relationship. We have established a similar friendship with Mrs Velicanlıgil as well. When I compare it to my relationships with the previous galleries I worked with, I can say that our relationship is much more transparent and democratic as a result of many factors such as us having known each other for a long time, the fact that there’s not a significant age difference between us, and that we’re open. It’s beneficial to think of a gallery as a form of function and a collection of relationships with its gallerist and artists and all staff, rather than as a vague and abstract institution.", "W: What’s your mutual perspective and plans for the future with the gallery?", "E.E.: We learn together and we try to solve problems together. Everybody has a lot to learn. One should be tolerant and take responsibility. I find out about my share of responsibility and try to carry it. Sanatorium is a young gallery and I enjoy taking part in structures, together with which I feel that I’m progressing and developing. I think that I should continue with this kind of attitude and try a bit hard.", "W: How is your relationship with the gallery you’re working with?", "Yağız Özgen: I’m working with a quite young gallery and I don’t have any experience with any other gallery. My only expectation from the gallery is that we work together for a good presentation of my artistic production. It is of course the artist who makes all the decisions, but it’s impossible for the artist to do everything. I for myself think that I witnessed this kind of effort and intention while working with", "The fact that Sanatorium is a gallery with initiative-roots plays an important role in that. It’s a blessing to be able to work with a gallery, which can look at things from the artist’s perspective when at the same time working at a commercial level.", "In other words, I’m working with a gallery that knows how complex the process of creating something or attempting it, is. It’s quite important for the artist to be able to comfortably let the gallery deal with things concerning his presentation.", "Y.Ö.: To create, to be more active, to try hard, to do something. Just like what Beuys had said to his students: go and create something. Act. I wasn’t his student, but this doesn’t prevent me from agreeing with him and following his advice. I have no plans other than being active and taking part in activities. As for the gallery, they must plan to do what they can in order to make this process as visible as necessary and then act accordingly."]}, {"title": "Issue07", "year": "2015", "cat": "Editor", "type": "Issue", "what": "WARHOLA Issue 07 — now bilingual with a new website, reaching readers in Istanbul and New York.", "why": "The issue that sets WARHOLA’s purpose in writing: to become “a published resource for the writing of art history,” presenting current shows and building a space for ideas around them. It proves the ambition on the page — Istanbul and New York shows side by side (Sanatorium and ALAN in Istanbul; Alice Neel at Zwirner, MoMA’s “Forever Now” and “Look at Me” at Leila Heller in New York), plus an interview with Istanbul-born, New York–based Hayal Pozantı.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/1_2015_Editor_WARHOLA_Issue07_Cover.png", "SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/2_2015_Editor_WARHOLA_Issue07_01.png", "SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/3_2015_Editor_WARHOLA_Issue07_02.png", "SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/4_2015_Editor_WARHOLA_Issue07_03.png", "SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/5_2015_Editor_WARHOLA_Issue07_04.png", "SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/2015_Editor_WARHOLA_Issue07_05.png"], "vids": [], "bodyp": [], "pdf": "SA_WEBSITE/70-2015_Editor_WARHOLA_Issue07/2015_Editor_WARHOLA_Issue07_doc_01.pdf", "pdflabel": "Issue"}, {"title": "Intentional Overdose", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "“Intentional Overdose” brings together Istanbul-based, internationally-renowned contemporary artists, who are gradually coming into prominence in the World Contemporary Art scene. *Add artist names.", "why": "It’s the experience of how the works of contemporary artists communicate with one another within the space of OVERTHOSE. “Intentional Overdose” is the sum of the loud and high-voltage images contained within.", "who": "Gallery Director", "imgs": ["SA_WEBSITE/69-2014_Gallerist_Intentional-Overdose_ALAN_Istanbul/1_2014_Gallerist_Intentional-Overdose_ALAN_Istanbul_01.jpg", "SA_WEBSITE/69-2014_Gallerist_Intentional-Overdose_ALAN_Istanbul/2014_Gallerist_Intentional-Overdose_ALAN_Istanbul_02.jpg", "SA_WEBSITE/69-2014_Gallerist_Intentional-Overdose_ALAN_Istanbul/2014_Gallerist_Intentional-Overdose_ALAN_Istanbul_03.jpg"], "vids": [], "bodyp": ["OVERTHOSE — the new culture, arts, and events space in Nişantaşı — and ALAN Istanbul presented Intentional Overdose, bringing together Istanbul-based, internationally recognized contemporary artists gaining prominence on the world stage. Rather than foreground each artist’s individual statement, the show aimed for visual integrity within contemporary aesthetics.", "So what does “intentional overdose” mean? A common trait of prominent two-dimensional work in contemporary art is that the image is released from the limits of two dimensions and acquires a three-dimensional quality through color, texture, or technique — an approach that prioritizes space and makes space part of the work. Such works deserve to be read through their overdosed interventions into the surrounding space rather than in isolation.", "Intentional Overdose focuses on what happens to viewers when works take on the space as if in a show of strength — the experience of how these works communicate with one another within OVERTHOSE. It is the sum of the loud, high-voltage images it contains.", "Artists in the exhibition", "Kezban Arca Batıbeki, İsmet Doğan, Komet, Ayline Olukman, Ardan Özmenoğlu, Murat Pulat, Merve Şendil, and Halil Vurucuoğlu."]}, {"title": "Merve Şendil — What If", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "The third solo show of Merve Sendil. Narrated in the form of a story of the artist’s return from the Orion Nebula back to Earth, this new universe is imagined as one of the infinite variations of the reality we’re currently living in.", "why": "Sharing a common memory with viewers and carrying over to contemporary art the sensations of fairy tales of especially western origin, this is a unique and special show unlike the ones we’ve encountered before.", "who": "Gallery Director — Curator", "imgs": ["SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/1_2014_Gallerist_Merve-Sendil_ALAN_Istanbul_06.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_01.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_02.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_03.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_04.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_05.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_07.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_08.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_09.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_11.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_12.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_13.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_14.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_15.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_16.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_17.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_18.jpg", "SA_WEBSITE/68-2014_Gallerist_Merve-Sendil_ALAN_Istanbul/2014_Gallerist_Merve-Sendil_ALAN_Istanbul_19.jpg"], "vids": [], "bodyp": ["For her third solo show, What If, Merve Şendil presents the traces of her imagination through a range of mediums, inviting us into a world unlike the one we know. Narrated as the story of the artist’s return from the Orion Nebula back to Earth, this new universe is imagined as one of the infinite variations of the reality we currently live in — allowing both artist and viewer to recreate perceptions that are coded into identities and accepted as real.", "Within the gallery, Şendil uses three-dimensional objects, painting, and sound installation to build this world through works that are at times surreal, at times mysterious. Each functions on its own while operating as part of the whole, in dialogue with the other parts. Carrying the sensations of fairy tales, especially of western origin, into contemporary art, she avoids exaggerating the scale of objects so as to keep the distance between fantasy and reality — the moment when “the things that hide in darkness” emerge faintly, like silhouettes.", "Alongside the knittings and cable-sound installations seen in her earlier shows, What If presents oil paintings on canvas, custom-designed ready-made sculptures, and framed visual works of her own design, shown across both the main gallery and the project room of ALAN Istanbul.", "About the artist"]}, {"title": "You Are Here", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "The exhibition entitled “You Are Here” features the significant Turkish contemporary artists Ramazan Bayrakoğlu, İrfan Önürmen, Ardan Özmenoğlu and Halil Vurucuoğlu curated by Secil Alkis.", "why": "A show that reverses the usual order. Art normally begins in the gallery and ends in print; here it began with the magazine and ended in the exhibition — the walls read as magazine pages, the viewer made part of the work, the space itself turned into the artwork. Staged as WARHOLA released its seventh issue across Istanbul and New York.", "who": "Gallery Director — Curator — ALAN İstanbul", "imgs": ["SA_WEBSITE/67-2014_Gallerist_You-Are-Here_ALAN_Istanbul/2014_Gallerist_You-Are-Here_ALAN_Istanbul_01.webp"], "vids": [], "bodyp": ["With You Are Here, ALAN Istanbul invited viewers into an experience staged for the first time — one focused on the relationship between art and space, among the most important questions in contemporary art. Making the viewer part of the show, the works reached beyond their own boundaries and turned the space itself into a “work” of art.", "The exhibition reversed the usual sequence. Where art normally begins in the gallery and ends in published media, here the course began with the magazine and ended with the exhibition: the walls were treated as the pages of a magazine, letting a two-dimensional publication extend past its boundaries into a spatial experience. WARHOLA released its seventh issue at the same moment, distributed in Istanbul and New York.", "You Are Here featured the Turkish contemporary artists Ramazan Bayrakoğlu, İrfan Önürmen, Ardan Özmenoğlu, and Halil Vurucuoğlu, curated by Secil Alkis and realized with graphic designer Bürkan Özkan."]}, {"title": "Kezban Arca Batibeki", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "Kezban Arca Batıbeki’s ‘Dolls’ — hand-painted photographs of her own dimmed-down pop world.", "why": "The artist inspiration comes from consumer society and pop images, she re-transforms these images to suit her artistic intentions, placing her works in a wide social context.", "who": "Gallery Director", "imgs": ["SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/1_2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_01.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_02.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_03.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_04.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_05.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_06.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_07.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_08.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_09.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_10.jpg", "SA_WEBSITE/66-2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul/2014_Gallerist_Kezban-Arca-Batibeki_ALAN_Istanbul_11.jpg"], "vids": [], "bodyp": ["Offering viewers a scene full of symbols, the objects form a setting that keeps the artist’s memory alive. In “Dolls”, Batıbeki presents this repertoire with a technique she utilizes for the first time, painting over printed photographs to take a new visual direction with this series. Kezban Arca Batıbeki is also an artist of Leila Heller Gallery, one of the notable galleries in New York. The exhibition can be seen at ALAN İstanbul until June 28, 2014.", "About the artist", "Born in Istanbul in 1956, Kezban Arca Batıbeki lives and works in Istanbul. She graduated from the Graphic Arts Department of the Faculty of Fine Arts at Marmara University. A painter, photographer, and filmmaker whose work explores the female figure and empowerment, she has exhibited at the Elgiz Museum of Contemporary Art, Istanbul, among other venues."]}, {"title": "Ardan Ozmenoglu", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "Ardan Özmenoğlu’s “Sculptures” — her first three-dimensional Post-it works, after New York.", "why": "The disposable made monumental — the throwaway insisted upon.", "who": "Gallery Director — ALAN İstanbul", "imgs": ["SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/1_2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_06.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2_2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_04.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/3_2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_07.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/4_2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_09.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_01.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_02.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_03.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_05.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_08.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_10.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_11.jpg", "SA_WEBSITE/65-2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul/2014_Gallerist_Ardan-Ozmenoglu_ALAN_Istanbul_12.jpg"], "vids": [], "bodyp": ["By means of a technical execution which makes simpler but more striking the colors and images from a visual world constructed of post-it pieces, the artist carries her artistic production to a new aesthetic level. Spreading in the form of fragments on transparent surfaces that repeat in equal dimensions and intervals, the imagery in the works forms a holistic work. The distance between the pieces helps the works possess a depth of time-imagery, and results in a striking aesthetic perception on the viewers.", "The artist presents her works in the main gallery room of ALAN İstanbul with a specific setting that enforces the relationship between the works and the space by means of lighting and positioning. Ardan Özmenoğlu’s “SCULPTURES” exhibition can be seen at ALAN İstanbul between April 17 and May 17, 2014.", "About the artist", "Born in Ankara in 1979, Ardan Özmenoğlu lives and works in Istanbul and New York. She earned her BFA and MFA at Bilkent University, Ankara. Known for silkscreen works on Post-it notes, glass, and neon, she has undertaken residencies at the Kala Art Institute, Berkeley, and Glasstress, Murano."]}, {"title": "Perception Machine", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "Group Show — Bahadır Colak, Ceylan Öztürk, Sevgi Kesmen — on Plato’s perfect forms and the world of objects.", "why": "Plato’s perfect forms against the mess of real objects — what’s real versus what we’re shown.", "who": "Gallery Director — ALAN İstanbul", "imgs": ["SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/1_2014_Gallerist_Perception-Machine_ALAN_Istanbul_07.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_01.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_02.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_03.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_04.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_05.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_06.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_08.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_09.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_10.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_11.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_12.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_13.jpg", "SA_WEBSITE/64-2014_Gallerist_Perception-Machine_ALAN_Istanbul/2014_Gallerist_Perception-Machine_ALAN_Istanbul_14.jpg"], "vids": [], "bodyp": ["ALAN İstanbul brings together 3 prominent artists of contemporary art — Bahadır Çolak, Ceylan Öztürk and Sevgi Kesmen — for the exhibition Perception Machine.", "“Let no one ignorant of geometry enter here.” was engraved on the door of Plato’s school. According to Plato, there exists a perfect world of forms beyond our world of daily perceptions. This perfect world contains the idealized forms of our imperfect lives. Though this concept survived through the ages as a reflection of the male intelligence of Western metaphysics, it was deconstructed by a series of art and thought movements that arose within 19th and 20th century modernism. As the claustrophobic solidness of the world of perfect forms evaporated, a new ethical and aesthetic perspective affirming life has influenced our age.", "The relation of contemporary art to life is far from being a relationship of contrast. It is a space of production in which sometimes the positive powers of life are revealed, and which sometimes carries the codes of constant structures’ lines of flight. Is there a way of preventing the alienation to the world of objects that surround us, that become spatial and take over all our senses? Why do we insistently prefer to live as happy or unhappy slaves to the cultural world that we ourselves created?", "Perception Machine is an exhibition in which 3 young contemporary artists deal with these questions by means of various tools and media. Bahadır Çolak, Ceylan Öztürk and Sevgi Kesmen bring together visual abstractions and works related to ALAN İstanbul’s architectural and spatial equation within the human scale. Thus the viewer is invited to a process of experience in which the virtual and the actual exist together. Perception Machine can be seen between March 6, 2014 and April 12, 2014 in ALAN İstanbul.", "Artists in the exhibition", "Bahadır Çolak, Ceylan Öztürk, and Sevgi Kesmen."]}, {"title": "The Spirit of Paper — Paper Works of 27 Contemporary Artists", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "The group show ‘The Spirit of Paper’ at ALAN İstanbul by 20 contemporary artists in order to pay respects to the immortal spirit of paper. *Add artist names.", "why": "Does this new method of consumption of visual information give birth to a new kind of devalued aesthetics that, as Baudrillard stated, neither includes or excludes us? And why does paper still keep resisting?", "who": "Gallery Director — Curator — ALAN İstanbul", "imgs": ["SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/1_2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_04.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_01.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_02.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_03.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_05.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_06.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_07.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_08.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_09.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_10.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_11.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_12.jpg", "SA_WEBSITE/63-2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul/2014_Gallerist_Spirit-Of-Paper_ALAN_Istanbul_13.jpg"], "vids": [], "bodyp": ["Digital technology has imprisoned almost the whole world within the boundaries of virtual reality. The transfer of newspapers, periodicals, and even libraries onto the web has made the circulation of information easier, but it has also begun to threaten the close relationship humankind has held with paper for thousands of years. As tactile and olfactory senses lose their connection with visual presentation, does this new mode of consumption give birth to a devalued aesthetics that, as Baudrillard said, neither includes nor excludes us? And why does paper still resist — is it a romantic, temporary effort, or will paper coexist as long as humankind exists?", "Unlike the many magazines published on the web, WARHOLA — the contemporary art magazine at the center of this show — is presented on paper. Its distinguished design makes it an object in itself, prioritizing the possibilities of paper and combining visual presentation with tactile experience, what Pallasmaa calls “the eyes of the skin.” Distributed in both Istanbul and New York, WARHOLA crosses the distance between continents to arrive in the new world as a physical magazine.", "The Spirit of Paper is an exhibition dedicated to WARHOLA. Works on paper by contemporary artists were shown across the main gallery of ALAN Istanbul, gathering the print culture the magazine champions into one room.", "Artists in the exhibition", "A. Cem Şahin, Aslı Biçer, Ayşegül Sağbaş, Bahar Oganer, Berkay Tuncay, Bora Başkan, Cüneyt Aksoy, Çağlar Kırtı, Fulden Aran, Gökçe Süvari, Hüseyin Rüstemoğlu, Ilgın Seymen, İnci Furni, İpek Kurşuncu, İrfan Önürmen, Komet, Merve Şendil, Nejat Satı, Nermin Er, Ozan Oganer, Sevil Tunaboylu, Tufan Baltalar, Turgut Yüksel, Yunus Emre Erdoğan, Ramazan Bayrakoğlu, Halil Vurucuoğlu, and Ümit Can Gören."]}, {"title": "Halil Vurucuoglu", "year": "2014", "cat": "Writer", "type": "Interview", "what": "Interview with Halil Vurucuoğlu on his paper works, his sketch-diaries, and his anti-hero’s view of the art world.", "why": "The artist who traded heroes for anti-heroes — working paper to its limit, keeping diaries that expose “what leaves you queasy,” and measuring a work by how much it’s loved, not what it sells for.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/62-2014_Writer_Halil-Vurucuoglu_WARHOLA/1_2014_Writer_Halil-Vurucuoglu_WARHOLA_01.png", "SA_WEBSITE/62-2014_Writer_Halil-Vurucuoglu_WARHOLA/2_2014_Writer_Halil-Vurucuoglu_WARHOLA_02.png", "SA_WEBSITE/62-2014_Writer_Halil-Vurucuoglu_WARHOLA/3_2014_Writer_Halil-Vurucuoglu_WARHOLA_03.png", "SA_WEBSITE/62-2014_Writer_Halil-Vurucuoglu_WARHOLA/3_2014_Writer_Halil-Vurucuoglu_WARHOLA_04.png"], "vids": [], "bodyp": ["Secil Alkis: If we're sitting here a year from now, celebrating what a great year it's been for you, what did you achieve?", "Halil Vurucuoğlu: I have a lot of new plans for the next year. Though the material (paper) I'm working with is delicate, it offers many possibilities and I like to experiment and come up with new ways of utilizing it. I assume I will have completed the paintings for a project exhibition that I wanted to work on but have been postponing for a while. We celebrate the opening of this project show –accompanied with live music– comprising three paintings and installations. I also intend to work on a solo show in New York, which I think is the most important art center of the world. I start working on it, everything is going well, and if we can agree on the details, it will be possible to realize this show in 2015. The exhibition goes as planned, then I start filming music videos for the bands that I like: I make a music video for “Federaller”, a band comprising four beautiful people, and we watch it together.", "S.A.: I'm sure you've had many beautiful things in your life; but when have you been most satisfied?", "H.V.: I've had many moments of satisfaction, I don't know which was the happiest of those. Life would be better without expectations, but they exist unfortunately. If you're aware of your expectations and ready to be satisfied, then you'll be happy. On the other hand, I've also had experiences I wasn't satisfied or happy with.", "S.A.: Are there things that you don't like to do?", "H.V.: Arguing; having to argue with someone. Speaking the same language but not being able to communicate; the moments when one can't keep calm; I find these situations unacceptable. And postponing things, places, people or plans.", "S.A.: We know that you had many solo and group exhibitions. Can you tell us about the project or accomplishment that you find the most important?", "H.V.: Though I should accept that art fairs, shows and auctions abroad help a lot with my career, I'd like to talk about my project exhibition “Intoxication” that took place in the Elgiz Museum in 2010 – it was a special show for me. I had prepared its preliminary sketches four years ago, and had been waiting till I found the right time and space to realize it. Focusing on the adaptation problem the modern human has with the dilemma of city vs nature; the exhibition comprised light and sound installations in such a way that they pulled the viewer in – thus the works spread over three rooms were perceived like a single work consisting of paintings, light and sounds. In order to emphasize how the modern citizen can't adapt himself to neither the city nor nature; and the disorientation and chaos he finds himself in; I wanted to name the exhibition “Intoxication”. It was good to see this project come alive after it had been waiting for so many years.", "S.A.: You have a diary of drawings, which inspire many of your works, and sometimes they are transferred directly to your paintings. How do you define these diaries?", "H.V.: It's true that I have notebooks, diaries that I sketch on whenever I'm not working on a painting, to calm my mind down. With my diaries I wanted to expose the guts of everything that leaves one breathless, makes one queasy, or causes blackouts. Of course, in this country with a constantly changing agenda, the crappy news I read or hear about help with this process as well. The corruption of the public, the fetishism for power and the games played on the perception of the masses were issues that I've been thinking about for a long time. With the “Discharge” exhibition I created pictures of those wearing ties on TV, who are only as respectable as sewer pipes beneath asphalt; each portrait came from drawings in these notebooks that I drew in the last few years.", "S.A.: Tell me about a recent project or problem that you made better, faster, smarter, more efficient.", "H.V.: I try to be more practical when I make a mural using stencils outdoors (anywhere outside my studio), In my studio I find solutions that will minimize problems concerning time and space, and then I apply these solutions outside. For example, I needed eight stencils for eight different colors for the work I created for the shop window of my close friend Hair Mafia, but I found a practical solution and created the mural using only three stencils. This way, it's been a project that was completed in a short time and was pleasant for both me and them. It was a good and different experience to prepare for and realize this project.", "S.A.: I know that you have your own unique, individual and secret world. Super heroes are also important for you. Do you think that you possess any super powers?", "H.V.: I sometimes think it would be quite nice to be Wolverine. Till the age of four I thought everybody in the world including me were super heroes, I was surprised to hear that it wasn't the case. As I grew up and found out that life is different from that in comics, I began to draw pictures of heroes. Later I liked anti-heroes more than heroes. Maybe this is a super power in today's world; I find easily what I look for; or maybe my power could be to turn things into different things, to transform them...", "S.A.: Can you summarize your story for someone who has never met you?", "H.V.: My story is about the battle of the good and the bad, just like all the old stories. Though I may get madly excited or make excessive leaps from time to time, I'm after calm happiness and peace. I sometimes feel as if I'm the soundtrack for a good movie, which is interesting. Vibrations are always there, but I still try to find my inner balance.", "S.A.: The most disturbing thing about the art world is...", "H.V.: It's good that you said “art world” as I don't like the word “market”, “art market” doesn't sound good at all. There is no union in the art world that really encompasses, supports and reassures the artists, I think of this as quite an important shortcoming. And if I were to talk about what I find disturbing; there are moments when people forget we're creating art. Even if it has a material dimension, I find it unnatural when people discuss numbers instead of the pleasure they get from a work. As Eileen Fray stated, the value of an artwork is determined by how much it's loved.", "S.A.: Do you like to snack while working?", "H.V.: Yes, I always have dried fruits, nuts, pretzels, carrots, brownies and croissants in my studio.", "S.A.: If I were to ask whether you have a question for our readers?", "H.V.: When was the last time you raised your gaze to the sky?"]}, {"title": "Kara Walker", "year": "2014", "cat": "Writer", "type": "Essay", "what": "Essay on Kara Walker, her silhouettes, and the controversy over how she handles race and stereotype, for WARHOLA.", "why": "The artists who make you uncomfortable, met head-on instead of smoothed over. . In her hands, clichés full of hatred turn into fertile fields that help evaluate the ways with which pictures can become means of control.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/61-2014_Writer_Kara-Walker_WARHOLA/1_2014_Writer_Kara-Walker_WARHOLA_01.png", "SA_WEBSITE/61-2014_Writer_Kara-Walker_WARHOLA/2_2014_Writer_Kara-Walker_WARHOLA_02.png", "SA_WEBSITE/61-2014_Writer_Kara-Walker_WARHOLA/3_2014_Writer_Kara-Walker_WARHOLA_03.png"], "vids": [], "bodyp": ["Walker has exhibited widely in the US, and at 27 (she's now 44) became the youngest person ever to receive the prestigious MacArthur Foundation's \"genius grant\" scholarship. But she has also caused controversy. Exhibitions of her work often provoke strong feelings: staff at a library in Newark, New Jersey, recently reacted with outrage when one of her drawings was displayed there, prompting the head librarian to cover it up. And back when she received the MacArthur grant, she was lambasted by several older African-American artists, including Betye Saar and Howardena Pindell. \"There were two strains of criticism,\" Walker says. \"One was about the work, and who was looking at it, and me feeding into the viewing audience's preconceived ideas about black people. And the other was that I was just some highfalutin so-and-so.\"", "Kara Walker is an African American artist who works across many media, exploring controversial themes of race, gender, sexuality, and violence. She is best known for her appropriation of the silhouette, which she has used in room-sized installations, sculptures, and smaller works on paper.", "In her installations, film, wall texts, and drawings, Kara Walker uses imagery that seems, at first, old fashioned and quite charming - thus the title of her Slavery! Slavery! Presenting a GRAND and LIFE LIKE Panaromic Journey İnto Picturesque Southern Slavery or “Life at ‘Ol’ Virginny’s Hole’ (Sketches From Plantation Life).” See the Peculiar Institution as Never Before! All Cut from Black Paper by the Able Hand of Kara Elizabeth Walker, an Emancipated Negress and a Leader in Her Cause (1997). Adapting vignettes of working life and leisure from Eastman Johnson’s 1859 painting Old Kentucky Home - Negro Life at the South, this 85-foot-wide mural is laced with acts oppressive and erotic,showing the labor and sexual economies of the antebellum South to be two sides of the same human coin. Of her favorite technique, Walker says: “The silhouette says a lot with very little information,but that’s also what the stereotype does. So l saw the silhouette and the stereotype as linked.” Her work is dedicated to no-holds-barred attack upon stereotypes, including those that would constrain the aggressiveness of black Americans in the name of avoiding conformity to those very stereotypes. It has, as a result, been extremely controversial, not least among other African-American artists”", "Kara Walker is an artist painting dramatic murals that attempt to make permanent the most striking clichés regarding black children, poets and reckless slaves in the age of slavery. Her female figures especially are depicted in poses that are sexually degrading and disturbing. Walker presents these stories as cut-out shadow pictures that intentionally reference their inspirations such the Mother Goose illustrations or the shadow portraits of the Victorian era. This format preference by the artist creates a specific kind of disconnection between the nasty content of the pictures and the form of presentation that has good associations. With discordant carelessness, Walker presents scenes that depict lynching, beating and rape. For example in Dance de la Nubienne Nouveaux (1998) a young slave girl dives into a witch's cauldron with the enthusiasm of a circus performer. Other works emphasize sexual clichés such as a very big African man or an African woman with huge thighs. Still, these pictures imply a childish admiration towards chaos, anarchy and obscenity; instead of reflecting terror or anger. It's a world in which all the obstacles towards a desired civilized act are removed; left behind are only the repulsive and the most degrading instincts. As an Afro-American herself, Walker is free to develop these pictures to a point no other white artist can. In her hands, clichés full of hatred turn into fertile fields that help evaluate the ways with which pictures can become means of control.", "Walker's works imply that the Afro-American body is a prisoner of systems of oppression. Also working on this subject, Lorna Simpson had first become renowned in the 1980s with her works that combined short texts with intentionally flattened photographs of black women. These “anti-portraits” showed only the backs of people and were usually presented as a series. The texts accompanying the pictures pointed out the invisibility of black women in American society by intentionally not telling us anything about the woman in the picture; and as such weren't much more informing than sayings or widespread clichés such as “as black as coal” or “as beautiful as a picture”. In the work Guarded Conditions (1989), a series of pictures repeating the image of a black woman whose hands are tied behind her back were accompanied by the texts “sex attacks” and “skin attacks” that pointed out the double weakness of Afro-American women. In her later works, Simpson focused on body details in connection with the experiences of African Americans. She came up with quite clinical definitions regarding black hair, which had influenced a surprisingly wide range of academic literature as it's a symbol of status in Afro-American identity. Her other works take the female body as their subject matter by focusing on objects such as high-heeled shoes. The emphasis here is on the skillful tricks utilized by women in the name of womanliness. Sometimes the body disappears entirely and appears only in mysterious passages and street scenes, as if to denote its absence. The body returns with videos such as Corridor (1993) which was filmed in both a room from the 17th century and a modernist house. This two-channel projection presents a narrative based on two young black women dressed in the clothes of two different periods, doing routine housework in accordance with the era they're living in. When the two time periods are considered together, the emphasis is on how the models of behavior concerning gender don't change even though the periods change.", "Walker is at her most provocative when interrogating the stereotyping that defined race relations in the antebellum south, and still exists today. The largest room in her show is lined with \"wall samplers\": the cut-out silhouettes that show figures engaged in violent or exaggerated acts: a man bending down to fellate an oversized phallus; a woman in a wide-skirted dress holding a severed head. The effect is to make us question not only the cultural representations of black people (there is, as Walker points out, a whiff of \"minstrels and blackface\" about some of the figures) but also our assumptions about how skin color defines anyone's physical characteristics and behavior.", "Walker sees a direct line between the racist historical attitudes she examines in her work and current events. She took a road trip last year with her daughter from Brooklyn, where she lives, to the southern states. They visited diners where the heads of old white men turned to give them \"the 20-second stare\". They swam in a motel pool, watching the other (white) bathers suddenly vanish; Walker heard a small girl say to her father: \"I thought there were no niggers here.\"", "Then there is the rise of the Tea Party movement, and the distasteful obsession with Barack Obama's skin color. \"There's so much suspicion around having a biracial president,\" she says, \"around Obama's presence on the world stage – the fact that the Tea Party gets coverage as anything other than a fringe group. There's nothing Obama can say or do as a black man that they're [willing] to hear.\""]}, {"title": "Issue06", "year": "2014", "cat": "Editor", "type": "Issue", "what": "WARHOLA Issue 06 — the magazine’s sixth issue, distributed bilingually across Istanbul and New York.", "why": "After five issues under the banner of “making place for criticism,” the sixth reaches art-lovers in both Istanbul and New York and turns to artists on the rise — the first being Murat Pulat, an Istanbul-based artist with a solo at a significant New York gallery.", "who": "Editor in Chief", "imgs": ["SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/1_2013_Editor_WARHOLA_Issue06_Cover.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2_2013_Editor_WARHOLA_Issue06_12.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_01.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_02.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_03.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_04.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_05.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_06.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_07.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_08.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_09.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_10.png", "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_11.png"], "vids": [], "bodyp": [], "pdf": "SA_WEBSITE/60-2014_Editor_WARHOLA_Issue06/2013_Editor_WARHOLA_Issue06_doc_01.pdf", "pdflabel": "Issue"}, {"title": "Murat Pulat — Image-Animal", "year": "2014", "cat": "Gallerist", "type": "Press release", "what": "Murat Pulat’s “Image-Animal” — ten paintings of old Hollywood and French New Wave film stills. His first New York solo Show.", "why": "To be communicating from within the peinture...Or more indirectly, to be “protecting” the peinture... In other words, each external influence that has been attributed (willingly or unwillingly) to the peinture is presented as a distinction of “imitation”, and an “awareness” again within the peinture... An artistic discipline can only exist with an “awareness” of an external influence. It’s only when an artistic discipline contains each external influence that it’s exposed to with an “awareness” that it can exist. — Emre Zeytinoglu.", "who": "Gallery Director- ALAN", "imgs": ["SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/1_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_17.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_09.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/3_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_10.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/4_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_11.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/5_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_12.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/6_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_13.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/7_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_14.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/8_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_15.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/9_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_16.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/10_2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_01.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_02.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_03.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_04.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_05.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_06.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_07.jpg", "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_08.jpg"], "vids": [], "bodyp": ["Turkish artist Murat Pulat’s first solo show in New York City was on view at Leila Heller Gallery in Chelsea, 568 West 25th Street, from January 16 through February 15, 2014. Image-Animal featured ten paintings depicting iconic scenes from old Hollywood movies, New Wave French films, and 1960s television, with a three-dimensional painting installation in the gallery’s front windows. A fully illustrated catalogue with an essay by Emre Zeytinoğlu accompanied the exhibition.", "Using oil on canvas, Pulat transforms the silver screen into fine art. Screen sirens such as Marilyn Monroe, Audrey Hepburn, and Mia Farrow appear as richly toned, textured paintings.", "Glass Studio (2013) depicts one of the most iconic scenes in Hollywood film — Janet Leigh behind the wheel of a Ford Sedan in Alfred Hitchcock’s Psycho. Working in tones of grey to reference the black-and-white original, Pulat breaks from the realism of the film still by highlighting Leigh’s face and the car’s rear window in saturated aquamarine and blue. This habit of referencing the antiquated features of an original film while introducing his own interpretation through color runs throughout his practice, reminding the viewer of something familiar and new at once.", "About the artist", "Born in Akşehir, Turkey, in 1978, Murat Pulat lives and works in Istanbul. He studied Fine Art at Marmara University. His work has been exhibited internationally, including in Istanbul, London, Dubai, Los Angeles, and New York."], "pdf": "SA_WEBSITE/59-2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork/2014_Gallerist_Murat-Pulat_Leila-Heller_NewYork_doc_01.pdf", "pdflabel": "Catalogue"}, {"title": "2013_Writer_Can Elgiz_WARHOLA", "year": "2013", "cat": "Writer", "type": "Interview", "what": "A conversation with architect, collector and museum owner Can Elgiz on how architects shape Turkish art, for WARHOLA.", "why": "The architect-collector on how the building now outshines the art inside it — and how, fifteen years ago, foreigners still asked whether Turkey made contemporary art at all.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/58-2013_Writer_Can Elgiz_WARHOLA/1_2013_Writer_Can Elgiz_WARHOLA_01.png", "SA_WEBSITE/58-2013_Writer_Can Elgiz_WARHOLA/2_2013_Writer_Can Elgiz_WARHOLA_02.png", "SA_WEBSITE/58-2013_Writer_Can Elgiz_WARHOLA/3_2013_Writer_Can Elgiz_WARHOLA_03.png"], "vids": [], "bodyp": ["Can Elgiz — On Architecture and Collecting", "Secil  Alkis:  It’s  been  known/said  for  a  long  time  that  architects  are  influential  in giving  direction  to  the  tendencies  in  Turkish  art.  As  an  architect/collector/museum owner,  what  do  you  think  about  this  notion?", "Can  Elgiz:  The  influence  of  architects  on  Turkish  art  begins  first  and  foremost  with  the works  they  place  in  architecture.  The  way  art  works  are  placed  in  the  space  (which  is now  a  part  of  interior  architecture)  has  become  quite  important.  I  think  the  contributions of  architects  to  contemporary  art  are  determined  by  the  art  works  they  place  in  spaces...", "We  can  see  this  in  a  larger  scale  in  the  world.  Religious  structures  used  to  be  the  structures  that  the  architects  designed  most  freely.  There  used  to  be  contests  between  architects involving  religious  structures,  for  which  they  came  up  with  various  projects.  Lately  the same  can  be  said  for  museum  buildings.  When  designing  museums,  architects  reach  the highest  point  of  their  skills.  This  is  the  source  of  the  word  starchitect.  Such  architecture has  lately  begun  to  attract  more  attention  than  the  works  shown  inside.  Even  though  the existence  of  these  structures  indicate  a  wide  support  for  art,  sometimes  the  negative  aspects  should  be  considered.", "S.A:    What’s  the  mission  and  attitude  of  Elgiz  Museum  of  Contemporary  Art  in  this context?", "C.E:  Our  goal  used  to  be  to  show  the  works  of  young  artists,  since  the  opening  in  2001 up  until  today.  During  the  period  we  worked  with  Vasıf  Kortun,  Fulya  Erdemci  amd  Melih", "Fereli,  our  intention  was  to  organize  curatorial  exhibitions  for  artists  who  weren’t  able to  show  their  works  in  any  gallery.  But  at  a  certain  point,  we  wanted  to  return  to  our collector  identity.  Meanwhile  galleries  and  institutions  had  begun  to  show  the  works  of the  artists  we  supported,    and  thus  we  put  our  emphasis  on  collecting,  which  is  what defines  this  institution.  But  in  addition  to  exhibiting  collections,  we  still  continue  to  organize  shows  in  our  project  rooms  that  support  young  artists.  We  have  a  new  terrace  that is  1500  square  meters  wide,  in  which  we  host  sculpture  exhibitions  of  works  selected  by a  committee  –  we  have  about  two  such  shows  a  year.  Thus,  to  a  certain  degree  we  keep pursuing  the  goal  that  we  set  out  in  the  beginning.", "“15  years  ago,  when  we  first  started  collecting  art  works,  foreign collectors  we  stumbled  upon  used  to  ask  if  there  was  any contemporary  art  made  in  Turkey.  Now  everybody  is  finding  out where  it’s  made,  and  how  much  of  it  is  made.”", "S.A:  As  an  architect,  which  artists  do  you  think  are  prominent  with  regard  to  their understanding  of  space  in  their  works?", "C.E:  Erol  Akyavaş  is  one  of  the  artists  I  find  significant,  as  he’s  an  architect.  He  organizes all  his  work  according  to  the  perception  of  space;  he  achieves  a  unity  with  the  space.    Regarding  this  criteria,  he’s  one  of  the  most  successful  artists,  as  he  became  an  artist  after working  as  an  architect.  His  exhibition  in  Aya  İrini  is  therefore  significant.  In  this  context, the  same  can  be  said  for  Mehmet  Gün.  Especially  due  to  the  material  he  used,  his  works looked  very  impressive  in  that  historical  space.  There  are  quite  a  number  of  artists  who  do this,  but  if  we  take  the  same  space  (the  Aya  İrini  church)  as  an  example,  Fabian  Marcaccio  is  also  one  of  the  prominent  artists.  His  works  were  hanged  ten  meters  high,  and  at the  same  time  the  work  of  Michael  Lee  covered  the  floor.  It  was  integrated  with  the  space in  such  a  way  that  the  visitors  could  lie  on  the  work  on  the  floor,  and  watch  the  ceiling.", "S.A:  Both  in  the  world  and  in  Turkey,  specifically  during  the  postmodern  era,  projects aimed  to  be  elite  and  unique,  and  this  turned  out  to  be  an  attractive  field  for  artistic and  architectural  concepts.  What  do  you  think  of  this,  and  of  the  examples  made?", "C.E: This  is  completely  an  architectural  movement.  As  Charles  Jencks  defines  the  history  of architecture;  We’re  living  a  life  that  has  already  been  lived  before  and  reproduced  bearing no  reality  except  the  recreation  of  an  image  of  the  past.  As  Postmodernism  isn’t  concerned with  destroying  the  past,  it  attempts  to  tell  of  today  and  the  past.  After  the  1970-80s,  during  a  movement  of  a  return  to  contemporary,  came  postmodernism,  an  era  with  emphasis  on  transforming  the  past,  adding  things  to  an  internalization  of  the  classic  period.", "Michael  Graves  is  a  significant  person  for  this  era.  But  I  think  this  era  is  now  coming  to an  end.  Now  a  contemporary  and  beyond-era  avant-garde  period  has  begun  again.  Things are  a  bit  different  now.  Postmodernism  has  been  a  period  of  transition.  The  same  can  be said  of  art.  It  affected  them  both.", "S.A:  As  an  Istanbul  based  organization,  and  concerning  how  the  city  changes  and  develops  with  respect  to  the  world,  what  is  the  planned  perspective  of  Proje  4L/Elgiz", "C.E:  It  should  be  accepted  that  Istanbul  is  a  rising  value.  In  addition  to  being  a  city  that attracts  quite  a  number  of  tourists,  it’s  also  a  city  that  combines  the  old  and  the  new.", "Therefore,  contemporary  art  is  a  good  match  for  Istanbul.  It’s  because  art  has  became a  rising  value  in  this  historical  city.  That’s  why  the  artists  living  in  this  peninsula  have an  advantage  concerning  creativity.  In  addition  to  the  artists  being  creative,  the  people visiting  the  city  also  want  to  see  contemporary  art.  15  years  ago,  when  we  first  started collecting  art  works,  foreign  collectors  we  stumbled  upon  used  to  ask  if  there  was  any contemporary  art  made  in  Turkey.  Now  everybody  is  finding  out  where  it’s  made,  and how  much  of  it  is  made.  They  now  have  a  more  concrete  idea.  As  for  the  future  plans  of", "Elgiz  Contemporary  Art  Museum;  we  would  like  to  continue  organizing  shows  comprising collections.  We  don’t  exhibit  anything  but  collections,  except  for  the  terrace  and  the  project rooms.  We  will  continue  hosting  project  and  terrace  exhibitions,  together  with  collection shows,  which  is  our  main  mission.", "“When  designing  museums,  architects  reach  the highest  point  of  their  skills."]}, {"title": "Neriman Polat", "year": "2013", "cat": "Writer", "type": "Interview", "what": "An interview with Neriman Polat, answered on the eve of the Gezi resistance, for WARHOLA.", "why": "An interview overtaken by Gezi — answered before, finished inside the resistance — by an artist of the city and demolition who found herself living her own subject.", "who": "Editor-in-Chief / Author", "imgs": ["SA_WEBSITE/57-2013_Writer_Neriman Polat_WARHOLA/1_2013_Writer_Neriman Polat_WARHOLA_01.png", "SA_WEBSITE/57-2013_Writer_Neriman Polat_WARHOLA/2_2013_Writer_Neriman Polat_WARHOLA_02.png"], "vids": [], "bodyp": ["As I answered the questions in this interview, the Taksim Resistance hadn’t started yet; and afterwards I couldn’t find neither the time to make any additions, nor the concentration to write something about myself. Today I’m a different person, as I’m one of the hundreds of thousands of people participating in the resistance. I’m both a witness and a part of the", "Gezi Park, that has spread everywhere; increasing in number and becoming larger as it spread. I’m more free and more hopeful than ever with the spirit of the resistance, solidarity and creativity; despite what the ruling government says. Living this indescribable experience which comprises collective art in addition to collective body, repeating what we’ve been screaming for years: Either all together, or none of us, there is no salvation alone.", "Secil Alkis: You are known for your works relating to city and urban sociology. Can you tell us a bit about these w
